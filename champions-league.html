<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champions League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .landing-container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            color: #fff;
        }
        .trophy-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .typewriter-container {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .typewriter-text {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 1px;
            border-right: 3px solid #ffd700;
            padding-right: 5px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 640px) {
            .typewriter-text { font-size: 1.8rem; }
        }

        .enter-btn {
            margin-top: 2.5rem;
            padding: 1rem 3rem;
            font-size: 1.25rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1e1e2f;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.6s ease, transform 0.4s ease, box-shadow 0.3s;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            pointer-events: none;
        }
        .enter-btn.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }

        .sub-text {
            font-size: 1rem;
            opacity: 0.7;
            margin-top: 1rem;
            opacity: 0;
            transition: opacity 1s;
        }
        .sub-text.show {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="trophy-icon">🏆</div>
        <div class="typewriter-container">
            <div id="typewriter" class="typewriter-text"></div>
        </div>
        <button id="enter-btn" class="enter-btn" onclick="goToTournament()">
            🌟 Enter Tournament
        </button>
        <p id="sub-text" class="sub-text">The ultimate club competition awaits.</p>
    </div>

    <script>
        // ✨ Add as many sentences as you like – each will be typed letter‑by‑letter
        const messages = [
            "Welcome to the Champions League",
            "The pinnacle of club football",
            "Where legends are made",
            "12 teams, 2 groups, 1 trophy",
            "Every match matters",
            "Glory awaits the brave",
            "The road to the final starts here",
            "Are you ready to witness history?"
        ];

        let msgIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let currentText = '';
        const typewriterEl = document.getElementById('typewriter');
        const enterBtn = document.getElementById('enter-btn');
        const subText = document.getElementById('sub-text');

        // Configurable speeds (milliseconds)
        const TYPING_SPEED = 80;        // how fast each letter appears
        const DELETING_SPEED = 40;       // how fast each letter disappears
        const PAUSE_AFTER_FULL = 2500;   // pause after a complete sentence

        function typeEffect() {
            const fullText = messages[msgIndex];

            if (!isDeleting) {
                // Typing phase
                currentText = fullText.substring(0, charIndex + 1);
                typewriterEl.textContent = currentText;
                charIndex++;

                if (charIndex === fullText.length) {
                    // Finished typing this sentence → pause, then delete
                    isDeleting = true;
                    setTimeout(typeEffect, PAUSE_AFTER_FULL);
                    return;
                }
                setTimeout(typeEffect, TYPING_SPEED);
            } else {
                // Deleting phase
                currentText = fullText.substring(0, charIndex - 1);
                typewriterEl.textContent = currentText;
                charIndex--;

                if (charIndex === 0) {
                    // Finished deleting – move to next sentence
                    isDeleting = false;
                    msgIndex++;
                    if (msgIndex >= messages.length) {
                        // All sentences shown → show the button and subtitle
                        typewriterEl.textContent = '';
                        enterBtn.classList.add('show');
                        subText.classList.add('show');
                        return;
                    }
                    // Slight pause before typing the next sentence
                    setTimeout(typeEffect, 500);
                    return;
                }
                setTimeout(typeEffect, DELETING_SPEED);
            }
        }

        // Start the typewriter effect after a short delay
        setTimeout(typeEffect, 600);

        function goToTournament() {
            window.location.href = 'champions-league-view.html';
        }
    </script>
</body>
</html>
