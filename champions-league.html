<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champions League – Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .landing-container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            color: #fff;
        }
        .message {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .message.show {
            opacity: 1;
            transform: translateY(0);
        }
        .message:nth-child(1) { color: #ffd700; } /* gold */
        .message:nth-child(2) { color: #f0f0f0; }
        .message:nth-child(3) { color: #a78bfa; }
        .message:nth-child(4) { color: #34d399; }
        .message:nth-child(5) { color: #fbbf24; }

        .enter-btn {
            margin-top: 2.5rem;
            padding: 1rem 3rem;
            font-size: 1.25rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1e1e2f;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.6s ease, transform 0.4s ease, box-shadow 0.3s;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }
        .enter-btn.show {
            opacity: 1;
            transform: scale(1);
        }
        .enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
        }

        .trophy-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .sub-text {
            font-size: 1rem;
            opacity: 0.7;
            margin-top: 1rem;
        }

        @media (max-width: 640px) {
            .message { font-size: 1.8rem; }
            .enter-btn { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="trophy-icon">🏆</div>
        <div id="message-container"></div>
        <button id="enter-btn" class="enter-btn" onclick="goToTournament()">
            🌟 Enter Tournament
        </button>
        <p class="sub-text" id="sub-text" style="display:none;">The ultimate club competition awaits.</p>
    </div>

    <script>
        // Array of messages to display sequentially
        const messages = [
            "Welcome to the Champions League",
            "The pinnacle of club football",
            "Where legends are made",
            "12 teams, 2 groups, 1 trophy",
            "Experience the journey"
        ];

        let index = 0;
        const container = document.getElementById('message-container');
        const enterBtn = document.getElementById('enter-btn');
        const subText = document.getElementById('sub-text');

        function showNextMessage() {
            if (index < messages.length) {
                const div = document.createElement('div');
                div.className = 'message';
                div.textContent = messages[index];
                container.appendChild(div);
                // Trigger reflow for animation
                requestAnimationFrame(() => {
                    div.classList.add('show');
                });
                index++;
                setTimeout(showNextMessage, 800); // adjust speed
            } else {
                // All messages shown – reveal button and subtext
                enterBtn.classList.add('show');
                subText.style.display = 'block';
                subText.style.opacity = '0';
                setTimeout(() => {
                    subText.style.transition = 'opacity 1s';
                    subText.style.opacity = '0.7';
                }, 200);
            }
        }

        // Start after a short delay
        setTimeout(showNextMessage, 600);

        // Navigate to the detailed tournament view
        function goToTournament() {
            window.location.href = 'champions-league-view.html';
        }
    </script>
</body>
</html>
