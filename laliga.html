<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laliga</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>

/* ============================================================
   RESET & BASE
   ============================================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem;
}

/* ============================================================
   HEADER
   ============================================================ */
.league-header {
    background: linear-gradient(135deg, #37003c, #6a1b6e, #00a3e0);
    border-radius: 20px;
    padding: 2rem 2.5rem;
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    box-shadow: 0 8px 40px rgba(55, 0, 60, 0.25);
    position: relative;
    overflow: hidden;
}

.league-header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 300px;
    height: 300px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 50%;
}

.league-header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: #ffffff;
    position: relative;
    z-index: 1;
}

.league-header .emblem {
    font-size: 2.8rem;
}

.league-header .header-sub {
    color: rgba(255, 255, 255, 0.7);
    font-weight: 400;
    font-size: 1rem;
    margin-top: 0.25rem;
    position: relative;
    z-index: 1;
}

.pl-badge {
    background: #ffd700;
    color: #37003c;
    padding: 0.3rem 1.2rem;
    border-radius: 30px;
    font-weight: 800;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
}

/* ============================================================
   TABS (Main Navigation)
   ============================================================ */
.tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    border-bottom: 2px solid #e5e7eb;
    padding-bottom: 0.5rem;
}

.tab-btn {
    padding: 0.7rem 2rem;
    border: none;
    border-radius: 12px 12px 0 0;
    background: transparent;
    color: #6b7280;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.tab-btn::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 3px;
    background: #37003c;
    border-radius: 3px;
    transition: 0.3s;
}

.tab-btn:hover {
    color: #1a1a2e;
    background: #f8f9fa;
}

.tab-btn.active {
    color: #37003c;
    background: #ffffff;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
}

.tab-btn.active::after {
    width: 60%;
}

.tab-content {
    display: none;
    animation: fadeIn 0.4s ease;
}

.tab-content.active {
    display: block;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ============================================================
   STANDINGS TABLE
   ============================================================ */
.card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    border: 1px solid #e5e7eb;
    padding: 1.5rem;
    margin-bottom: 2rem;
    transition: all 0.3s;
}

.card:hover {
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
}

.table-wrap {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
}

th {
    text-align: left;
    padding: 0.8rem 0.5rem;
    color: #6b7280;
    font-weight: 600;
    border-bottom: 2px solid #e5e7eb;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
}

td {
    padding: 0.8rem 0.5rem;
    border-bottom: 1px solid #f0f2f5;
}

tr:hover {
    background: #fafafa;
}

tr:nth-child(even) {
    background: #fafafa;
}

tr:nth-child(even):hover {
    background: #f5f5f5;
}

.pos {
    font-weight: 700;
    width: 30px;
    text-align: center;
}

/* Top 4 positions */
.pos-1 {
    color: #37003c;
}
.pos-2 {
    color: #6a1b6e;
}
.pos-3 {
    color: #00a3e0;
}
.pos-4 {
    color: #6b7280;
}

.team-name {
    font-weight: 600;
    cursor: pointer;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.team-name:hover {
    color: #37003c;
}

.pts {
    font-weight: 800;
    font-size: 1.1rem;
    color: #37003c;
}

.form-dots {
    display: flex;
    gap: 4px;
}

.form-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
    color: #ffffff;
}

.dot-w {
    background: #22c55e;
}
.dot-d {
    background: #94a3b8;
}
.dot-l {
    background: #ef4444;
}

/* ============================================================
   FIXTURE TABS (Horizontal scrollable)
   ============================================================ */
.fixture-tabs-wrapper {
    overflow-x: auto;
    padding-bottom: 0.5rem;
    margin-bottom: 1.5rem;
    -webkit-overflow-scrolling: touch;
}

.fixture-tabs-wrapper::-webkit-scrollbar {
    height: 4px;
}

.fixture-tabs-wrapper::-webkit-scrollbar-track {
    background: #f0f2f5;
    border-radius: 10px;
}

.fixture-tabs-wrapper::-webkit-scrollbar-thumb {
    background: #37003c;
    border-radius: 10px;
}

.fixture-tabs {
    display: flex;
    gap: 0.5rem;
    min-width: max-content;
    padding: 0.2rem 0;
}

.fixture-tab {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 30px;
    background: #f0f2f5;
    color: #6b7280;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: 0.3s;
    white-space: nowrap;
    font-family: inherit;
}

.fixture-tab:hover {
    background: #e5e7eb;
    color: #1a1a2e;
}

.fixture-tab.active {
    background: #37003c;
    color: #ffffff;
    box-shadow: 0 4px 15px rgba(55, 0, 60, 0.25);
}

/* ============================================================
   FIXTURE CONTENT
   ============================================================ */
.fixture-content {
    animation: fadeIn 0.3s ease;
}

.fixture-week-group {
    margin-bottom: 1.5rem;
    background: #ffffff;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
}

.fixture-week-group:last-child {
    margin-bottom: 0;
}

.fixture-week-header-compact {
    padding: 1rem 1.2rem;
    background: #f8f9fa;
    border-bottom: 1px solid #e5e7eb;
}

.fixture-week-title {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
}

.week-badge {
    font-weight: 700;
    font-size: 1rem;
    color: #1a1a2e;
}

.week-status-badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.15rem 0.8rem;
    border-radius: 20px;
}

.week-status-badge.completed {
    background: #dcfce7;
    color: #16a34a;
}

.week-status-badge.live {
    background: #fef3c7;
    color: #d97706;
}

.week-status-badge.upcoming {
    background: #e5e7eb;
    color: #6b7280;
}

.fixture-list {
    padding: 0.5rem 1.2rem 1.2rem 1.2rem;
}

.fixture-card-compact {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.7rem 1rem;
    margin-bottom: 0.4rem;
    border-radius: 10px;
    background: #fafafa;
    border-left: 4px solid #37003c;
    transition: all 0.2s;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.fixture-card-compact:hover {
    background: #f5f5f5;
    transform: translateX(4px);
}

.fixture-card-compact:last-child {
    margin-bottom: 0;
}

.fixture-teams-compact {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 500;
    font-size: 0.9rem;
    flex: 1;
    min-width: 150px;
}

.team-name-compact {
    font-weight: 500;
}

.vs-compact {
    color: #94a3b8;
    font-size: 0.7rem;
    font-weight: 400;
}

.fixture-result-compact {
    display: flex;
    align-items: center;
    gap: 0.8rem;
}

.fixture-score-compact {
    font-weight: 700;
    font-size: 1rem;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0.05rem 0.8rem;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
    min-width: 50px;
    text-align: center;
}

.fixture-score-compact.unplayed {
    color: #94a3b8;
    font-weight: 400;
    background: transparent;
    border: 1px dashed #d1d5db;
}

.fixture-result-compact .report-btn {
    font-size: 0.6rem;
    padding: 0.15rem 0.6rem;
}

/* ============================================================
   REPORT BUTTON
   ============================================================ */
.report-btn {
    background: #e5e7eb;
    border: none;
    border-radius: 6px;
    padding: 0.15rem 0.6rem;
    color: #6b7280;
    cursor: pointer;
    font-size: 0.6rem;
    transition: all 0.2s;
    font-weight: 600;
    white-space: nowrap;
    font-family: inherit;
}

.report-btn:hover {
    background: #37003c;
    color: #ffffff;
    transform: scale(1.05);
}

.report-btn.has-report {
    background: #37003c;
    color: #ffffff;
}

.report-btn.has-report:hover {
    background: #6a1b6e;
}

/* ============================================================
   LOADING
   ============================================================ */
.loading {
    text-align: center;
    padding: 2rem;
    opacity: 0.6;
    font-style: italic;
    color: #6b7280;
}

/* ============================================================
   TEAM MODAL
   ============================================================ */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
    animation: fadeIn 0.3s ease;
}

.modal-overlay.active {
    display: flex;
}

.modal {
    background: #ffffff;
    border-radius: 24px;
    border: 1px solid #e5e7eb;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 2.5rem;
    position: relative;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
    animation: modalIn 0.3s ease;
}

@keyframes modalIn {
    from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
    }
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

.modal::-webkit-scrollbar {
    width: 6px;
}

.modal::-webkit-scrollbar-track {
    background: #f0f2f5;
    border-radius: 10px;
}

.modal::-webkit-scrollbar-thumb {
    background: #37003c;
    border-radius: 10px;
}

.modal-close {
    position: absolute;
    top: 1.2rem;
    right: 1.5rem;
    background: #f0f2f5;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    color: #6b7280;
    font-size: 1.2rem;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
}

.modal-close:hover {
    background: #e5e7eb;
    color: #1a1a2e;
}

.modal-team-name {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 0.25rem;
    color: #1a1a2e;
}

.modal-team-sub {
    color: #6b7280;
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
}

.modal-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.8rem;
    margin-bottom: 1.5rem;
    background: #f8f9fa;
    border-radius: 16px;
    padding: 1.2rem;
}

.modal-stat {
    text-align: center;
}

.modal-stat .value {
    font-size: 1.5rem;
    font-weight: 700;
    color: #37003c;
}

.modal-stat .label {
    font-size: 0.6rem;
    text-transform: uppercase;
    color: #6b7280;
    letter-spacing: 0.5px;
}

.modal-section-title {
    font-weight: 600;
    color: #6b7280;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin: 1.2rem 0 0.6rem 0;
}

.modal-form-dots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.modal-form-dot {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: #ffffff;
}

.modal-fixture-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid #f0f2f5;
    font-size: 0.9rem;
}

.modal-fixture-item:last-child {
    border-bottom: none;
}

.modal-fixture-score {
    font-weight: 600;
    color: #37003c;
}

.modal-fixture-unplayed {
    opacity: 0.4;
}

.modal-btn {
    display: inline-block;
    background: #37003c;
    color: #ffffff;
    padding: 0.6rem 2rem;
    border-radius: 40px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.9rem;
    margin-top: 0.5rem;
    font-family: inherit;
}

.modal-btn:hover {
    transform: scale(1.02);
    background: #6a1b6e;
    box-shadow: 0 4px 20px rgba(55, 0, 60, 0.3);
}

.modal .no-data {
    color: #6b7280;
    font-style: italic;
    font-size: 0.9rem;
}

/* ============================================================
   MATCH REPORT MODAL (Redesigned)
   ============================================================ */
.report-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid #f0f2f5;
    flex-wrap: wrap;
    gap: 1rem;
}

.report-header .report-teams {
    font-size: 1.3rem;
    font-weight: 600;
}

.report-header .report-teams .home {
    color: #1a1a2e;
}

.report-header .report-teams .away {
    color: #6b7280;
}

.report-header .report-teams .vs {
    color: #d1d5db;
    margin: 0 0.5rem;
    font-weight: 400;
}

.report-header .report-meta {
    color: #6b7280;
    font-size: 0.85rem;
    margin-top: 0.2rem;
}

.report-header .report-score {
    font-size: 2.8rem;
    font-weight: 800;
    color: #37003c;
    background: #f8f9fa;
    padding: 0.2rem 1.5rem;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    min-width: 120px;
    text-align: center;
}

/* Full Comment with Horizontal Scroll */
.report-comment {
    background: #f8f9fa;
    padding: 1.2rem;
    border-radius: 16px;
    line-height: 1.9;
    white-space: pre-wrap;
    font-size: 0.95rem;
    border-left: 4px solid #37003c;
    max-height: 350px;
    overflow: auto;
    color: #1a1a2e;
    margin-bottom: 1rem;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.report-comment::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

.report-comment::-webkit-scrollbar-track {
    background: #f0f2f5;
    border-radius: 10px;
}

.report-comment::-webkit-scrollbar-thumb {
    background: #37003c;
    border-radius: 10px;
}

.report-comment::-webkit-scrollbar-thumb:hover {
    background: #6a1b6e;
}

.report-comment {
    scrollbar-width: thin;
    scrollbar-color: #37003c #f0f2f5;
}

.report-goal {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.4rem 0;
    font-size: 0.9rem;
    border-bottom: 1px solid #f0f2f5;
}

.report-goal:last-child {
    border-bottom: none;
}

.report-goal .minute {
    color: #37003c;
    font-weight: 700;
    min-width: 40px;
}

.report-goal .scorer {
    font-weight: 600;
}

.report-goal .assist {
    color: #6b7280;
    font-size: 0.8rem;
}

.report-card {
    display: inline-block;
    padding: 0.1rem 0.7rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    margin: 0 0.3rem;
}

.report-card.yellow {
    background: #fef3c7;
    color: #92400e;
}

.report-card.red {
    background: #fee2e2;
    color: #991b1b;
}

.report-card-text {
    color: #6b7280;
    font-size: 0.85rem;
}

.report-actions {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 2px solid #f0f2f5;
}

.report-actions .modal-btn-secondary {
    background: #e5e7eb;
    color: #1a1a2e;
}

.report-actions .modal-btn-secondary:hover {
    background: #d1d5db;
}

/* ============================================================
   TOAST
   ============================================================ */
#toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

#toast-container .toast {
    background: #1a1a2e;
    border: 1px solid #d1d5db;
    padding: 14px 24px;
    border-radius: 14px;
    color: #ffffff;
    font-size: 0.9rem;
    animation: slideIn 0.3s ease;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    max-width: 350px;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 1024px) {
    .fixture-week-column {
        min-width: 280px;
        max-width: 300px;
    }
}

@media (max-width: 768px) {
    .league-header {
        padding: 1.5rem;
    }

    .league-header h1 {
        font-size: 1.6rem;
    }

    .tab-btn {
        padding: 0.5rem 1.2rem;
        font-size: 0.8rem;
    }

    .fixture-tab {
        padding: 0.4rem 0.8rem;
        font-size: 0.7rem;
    }

    .fixture-card-compact {
        flex-direction: column;
        align-items: stretch;
        gap: 0.3rem;
        padding: 0.6rem 0.8rem;
    }

    .fixture-teams-compact {
        font-size: 0.8rem;
        min-width: auto;
        justify-content: center;
    }

    .fixture-result-compact {
        justify-content: center;
        gap: 0.5rem;
    }

    .fixture-score-compact {
        font-size: 0.9rem;
        min-width: 40px;
    }

    .fixture-week-title {
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .modal {
        padding: 1.5rem;
        margin: 1rem;
    }

    .modal-stats {
        grid-template-columns: repeat(2, 1fr);
    }

    .report-header {
        flex-direction: column;
        text-align: center;
    }

    .report-header .report-score {
        font-size: 2rem;
        padding: 0.2rem 1rem;
        min-width: auto;
    }

    .report-teams {
        font-size: 1rem !important;
    }

    th,
    td {
        padding: 0.4rem 0.25rem;
        font-size: 0.75rem;
    }

    .form-dot {
        width: 20px;
        height: 20px;
        font-size: 0.5rem;
    }

    .modal-stat .value {
        font-size: 1.2rem;
    }

    .report-btn {
        font-size: 0.5rem;
        padding: 0.15rem 0.5rem;
    }
}

@media (max-width: 480px) {
    .container {
        padding: 1rem;
    }

    .fixture-tab {
        padding: 0.3rem 0.6rem;
        font-size: 0.65rem;
    }

    .fixture-card-compact {
        padding: 0.5rem 0.6rem;
    }

    .fixture-teams-compact {
        font-size: 0.75rem;
    }

    .fixture-score-compact {
        font-size: 0.8rem;
        min-width: 35px;
        padding: 0.05rem 0.5rem;
    }

    .fixture-result-compact .report-btn {
        font-size: 0.5rem;
        padding: 0.1rem 0.4rem;
    }
}

    </style>
</head>
<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <header class="league-header">
            <div>
                <h1><span class="emblem"></span> Laliga</h1>
                <div class="header-sub">Standings &amp; Fixtures • <span id="yearDisplay"></span></div>
            </div>
            <div>
            </div>
        </header>

        <!-- ===== TABS ===== -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="standings">📊 Standings</button>
            <button class="tab-btn" data-tab="fixtures">📅 Fixtures</button>
        </div>

        <!-- ===== TAB: STANDINGS ===== -->
        <div id="tab-standings" class="tab-content active">
            <div class="card">
                <div id="standingsContainer"><div class="loading">Loading standings...</div></div>
            </div>
        </div>

        <!-- ===== TAB: FIXTURES ===== -->
        <div id="tab-fixtures" class="tab-content">
            <div class="card">
                <div id="fixturesContainer"><div class="loading">Loading fixtures...</div></div>
            </div>
        </div>

    </div>

    <!-- ===== TEAM MODAL ===== -->
    <div class="modal-overlay" id="teamModal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalContent">
                <div class="loading">Loading data...</div>
            </div>
        </div>
    </div>

    <script>

        // ============================================================
//  CONFIG
// ============================================================
const LEAGUE_KEY = 'laliga';

const firebaseConfig = {
    apiKey: "AIzaSyBmy0tmvaYcw9KsQQRH7RLKcXC8EN6WFqY",
    authDomain: "dls-premier-league.firebaseapp.com",
    projectId: "dls-premier-league",
    storageBucket: "dls-premier-league.firebasestorage.app",
    messagingSenderId: "975087030284",
    appId: "1:975087030284:web:7708718fffd9180c009e29"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allMatchweeks = {};
let allTeams = {};
let allStandings = [];

document.getElementById('yearDisplay').textContent = new Date().getFullYear();

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
    const container = document.getElementById('toast-container');
    if (!container) {
        const div = document.createElement('div');
        div.id = 'toast-container';
        document.body.appendChild(div);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}

// ============================================================
//  TAB SWITCHING
// ============================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        if (btn.dataset.tab === 'fixtures') renderFixtures();
    });
});

// ============================================================
//  STANDINGS COMPUTATION
// ============================================================
function computeStandings(matchweeks, teams) {
    const stats = {};
    const teamNames = Object.values(teams || {});
    for (const t of teamNames) {
        if (!stats[t]) stats[t] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0, results: [] };
    }

    const sortedWeeks = Object.keys(matchweeks || {}).sort((a, b) => Number(a) - Number(b));

    for (const wk of sortedWeeks) {
        const matches = matchweeks[wk]?.matches || [];
        for (const m of matches) {
            if (!m.played) continue;
            const h = m.home,
                a = m.away,
                hs = m.homeScore,
                as = m.awayScore;
            if (!stats[h]) stats[h] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0, results: [] };
            if (!stats[a]) stats[a] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0, results: [] };

            stats[h].played++;
            stats[a].played++;
            stats[h].gf += hs;
            stats[h].ga += as;
            stats[a].gf += as;
            stats[a].ga += hs;

            if (hs > as) {
                stats[h].won++;
                stats[h].pts += 3;
                stats[a].lost++;
                stats[h].results.push('W');
                stats[a].results.push('L');
            } else if (hs < as) {
                stats[a].won++;
                stats[a].pts += 3;
                stats[h].lost++;
                stats[a].results.push('W');
                stats[h].results.push('L');
            } else {
                stats[h].drawn++;
                stats[h].pts += 1;
                stats[a].drawn++;
                stats[a].pts += 1;
                stats[h].results.push('D');
                stats[a].results.push('D');
            }
        }
    }

    return Object.entries(stats)
        .map(([name, s]) => {
            const gd = s.gf - s.ga;
            const form = s.results.slice(-5).reverse();
            return { name, ...s, gd, form };
        })
        .sort((a, b) => {
            if (a.pts !== b.pts) return b.pts - a.pts;
            if (b.gd !== a.gd) return b.gd - a.gd;
            return b.gf - a.gf;
        });
}

function getFormDots(form) {
    if (!form || form.length === 0) return '<span style="opacity:0.4;">—</span>';
    return `<div class="form-dots">${form.map(r => `<span class="form-dot dot-${r.toLowerCase()}">${r}</span>`).join('')}</div>`;
}

// ============================================================
//  RENDER STANDINGS
// ============================================================
function renderStandings(standings) {
    allStandings = standings;
    if (!standings || standings.length === 0) return '<div class="loading">No matches played yet.</div>';
    let html = `<div class="table-wrap"><table>
        <thead><tr>
            <th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th>
            <th>GF</th><th>GA</th><th>GD</th><th>PTS</th><th>Form</th>
        </tr></thead><tbody>`;
    standings.forEach((s, i) => {
        const gdStr = s.gd > 0 ? `+${s.gd}` : `${s.gd}`;
        const posClass = i < 4 ? `pos-${i+1}` : '';
        html += `<tr>
            <td class="pos ${posClass}">${i+1}</td>
            <td class="team-name" onclick="openTeamModal('${s.name}')">${s.name}</td>
            <td>${s.played}</td><td>${s.won}</td><td>${s.drawn}</td><td>${s.lost}</td>
            <td>${s.gf}</td><td>${s.ga}</td><td>${gdStr}</td>
            <td class="pts">${s.pts}</td>
            <td>${getFormDots(s.form)}</td>
        </tr>`;
    });
    html += '</tbody></table></div>';
    return html;
}

// ============================================================
//  RENDER FIXTURES (Tab-based with expandable weeks)
// ============================================================
function renderFixtures() {
    const container = document.getElementById('fixturesContainer');

    if (!allMatchweeks || Object.keys(allMatchweeks).length === 0) {
        container.innerHTML = '<div class="loading">No fixtures generated yet.</div>';
        return;
    }

    const sortedWeeks = Object.keys(allMatchweeks).sort((a, b) => Number(a) - Number(b));

    // ============================================================
    // BUILD WEEK TABS (Horizontal scrollable - NO ICONS)
    // ============================================================
    let tabsHtml = `
        <div class="fixture-tabs-wrapper">
            <div class="fixture-tabs">
                <button class="fixture-tab active" data-week="all" onclick="switchFixtureWeek('all')">
                    All
                </button>
    `;

    for (const wk of sortedWeeks) {
        tabsHtml += `
            <button class="fixture-tab" data-week="${wk}" onclick="switchFixtureWeek('${wk}')">
                Week ${wk}
            </button>
        `;
    }

    tabsHtml += `
            </div>
        </div>
    `;

    // ============================================================
    // BUILD FIXTURES CONTENT (Shows all by default)
    // ============================================================
    let contentHtml = `
        <div id="fixture-content" class="fixture-content">
            ${buildWeekFixtures('all', sortedWeeks)}
        </div>
    `;

    container.innerHTML = tabsHtml + contentHtml;
}

// ============================================================
//  MATCH REPORT FUNCTIONS
// ============================================================
function openMatchReport(week, matchIndex) {
    const matches = allMatchweeks[week]?.matches || [];
    const match = matches[matchIndex];
    if (!match || !match.played) {
        showToast('This match has not been played yet');
        return;
    }

    const modal = document.getElementById('teamModal');
    const content = document.getElementById('modalContent');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    const report = match.report || {};

    // Get full comment
    let fullComment = report.fullComment || report.comment || report.summary || 'No match report available.';

    // Build goals HTML
    let goalsHtml = '';
    if (report.goals && report.goals.length > 0) {
        goalsHtml = report.goals.map(g => `
            <div class="report-goal">
                <span class="minute">${g.minute}'</span>
                <span class="scorer">${g.scorer}</span>
                ${g.assist ? `<span class="assist">(assist: ${g.assist})</span>` : ''}
                ${g.team === 'home' ? '🏠' : '✈️'}
            </div>
        `).join('');
    } else {
        goalsHtml = '<div class="no-data">No goals recorded</div>';
    }

    // Build cards HTML
    let cardsHtml = '';
    if (report.cards && report.cards.length > 0) {
        cardsHtml = report.cards.map(c => `
            <span class="report-card ${c.type}">${c.type === 'yellow' ? '🟨' : '🟥'} ${c.type.toUpperCase()}</span>
            <span class="report-card-text">${c.player} (${c.team === 'home' ? 'Home' : 'Away'})</span>
            <br>
        `).join('');
    }

    const isHomeWin = match.homeScore > match.awayScore;
    const isAwayWin = match.awayScore > match.homeScore;
    const resultText = isHomeWin ? `${match.home} won` : isAwayWin ? `${match.away} won` : 'Draw';

    content.innerHTML = `
        <div class="report-header">
            <div>
                <div class="report-teams">
                    <span class="home">${match.home}</span>
                    <span class="vs">vs</span>
                    <span class="away">${match.away}</span>
                </div>
                <div class="report-meta">Matchweek ${week} • ${resultText}</div>
            </div>
            <div class="report-score">${match.homeScore} – ${match.awayScore}</div>
        </div>

        <div style="margin-bottom:0.5rem;">
            <div style="font-weight:600; color:#6b7280; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:0.5rem;">📝 Match Report</div>
            <div class="report-comment">${fullComment.replace(/\n/g, '<br>')}</div>
        </div>

        <div style="margin-top:1rem;">
            <div style="font-weight:600; color:#6b7280; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:0.5rem;">⚽ Goals</div>
            <div style="background:#f8f9fa; padding:0.8rem 1rem; border-radius:12px; max-height:150px; overflow-y:auto;">
                ${goalsHtml}
            </div>
        </div>

        ${report.cards && report.cards.length > 0 ? `
        <div style="margin-top:1rem;">
            <div style="font-weight:600; color:#6b7280; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:0.5rem;">🟨 Cards</div>
            <div style="background:#f8f9fa; padding:0.8rem 1rem; border-radius:12px;">
                ${cardsHtml}
            </div>
        </div>
        ` : ''}

        <div class="report-actions">
            <button class="modal-btn" onclick="closeModal()">Close</button>
            <button class="modal-btn modal-btn-secondary" onclick="switchToFixtures('${match.home}')">📅 View All Fixtures</button>
        </div>
    `;
}

// ============================================================
//  TEAM MODAL
// ============================================================
function openTeamModal(teamName) {
    const modal = document.getElementById('teamModal');
    const content = document.getElementById('modalContent');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    const stats = allStandings.find(s => s.name === teamName);
    if (!stats) {
        content.innerHTML = `<div class="loading">No data found for ${teamName}</div>`;
        return;
    }

    const teamFixtures = [];
    for (const wk in allMatchweeks) {
        const matches = allMatchweeks[wk]?.matches || [];
        for (const m of matches) {
            if (m.home === teamName || m.away === teamName) {
                teamFixtures.push({ ...m, week: wk });
            }
        }
    }
    teamFixtures.sort((a, b) => Number(a.week) - Number(b.week));

    const recentMatches = teamFixtures.filter(m => m.played).slice(-5).reverse();
    const upcomingMatches = teamFixtures.filter(m => !m.played);

    const formDots = stats.form && stats.form.length > 0 ?
        stats.form.map(r => `<span class="modal-form-dot dot-${r.toLowerCase()}">${r}</span>`).join('') :
        '<span class="no-data">No matches yet</span>';

    let recentHtml = '';
    if (recentMatches.length === 0) {
        recentHtml = '<span class="no-data">No recent matches</span>';
    } else {
        recentHtml = recentMatches.map((m) => {
            const isHome = m.home === teamName;
            const opponent = isHome ? m.away : m.home;
            const score = `${m.homeScore} – ${m.awayScore}`;
            const result = isHome ?
                (m.homeScore > m.awayScore ? 'W' : m.homeScore < m.awayScore ? 'L' : 'D') :
                (m.awayScore > m.homeScore ? 'W' : m.awayScore < m.homeScore ? 'L' : 'D');
            const resultColor = result === 'W' ? '#22c55e' : result === 'L' ? '#ef4444' : '#94a3b8';
            const matches = allMatchweeks[m.week]?.matches || [];
            const matchIdx = matches.findIndex(mm => mm.home === m.home && mm.away === m.away);
            const hasReport = m.played && m.report;
            return `<div class="modal-fixture-item">
                <span>${isHome ? '🏠' : '✈️'} ${opponent}</span>
                <span>
                    <span style="color:${resultColor};font-weight:700;">${result}</span>
                    <span class="modal-fixture-score"> ${score}</span>
                    ${hasReport ? `<span style="font-size:0.7rem;color:#37003c;margin-left:0.5rem;cursor:pointer;" onclick="event.stopPropagation();openMatchReport('${m.week}', ${matchIdx})">📋</span>` : ''}
                </span>
            </div>`;
        }).join('');
    }

    let upcomingHtml = '';
    if (upcomingMatches.length === 0) {
        upcomingHtml = '<span class="no-data">No upcoming fixtures</span>';
    } else {
        upcomingHtml = upcomingMatches.slice(0, 5).map(m => {
            const isHome = m.home === teamName;
            const opponent = isHome ? m.away : m.home;
            return `<div class="modal-fixture-item">
                <span>${isHome ? '🏠' : '✈️'} ${opponent}</span>
                <span class="modal-fixture-unplayed">Week ${m.week}</span>
            </div>`;
        }).join('');
        if (upcomingMatches.length > 5) {
            upcomingHtml += `<div style="color:#6b7280;font-size:0.8rem;margin-top:0.3rem;">+ ${upcomingMatches.length - 5} more</div>`;
        }
    }

    content.innerHTML = `
        <div class="modal-team-name">${teamName}</div>
        <div class="modal-team-sub">Laliga • Season ${new Date().getFullYear()}</div>

        <div class="modal-stats">
            <div class="modal-stat">
                <div class="value">${stats.played}</div>
                <div class="label">Played</div>
            </div>
            <div class="modal-stat">
                <div class="value">${stats.won} / ${stats.drawn} / ${stats.lost}</div>
                <div class="label">W / D / L</div>
            </div>
            <div class="modal-stat">
                <div class="value">${stats.gf} / ${stats.ga}</div>
                <div class="label">GF / GA</div>
            </div>
            <div class="modal-stat">
                <div class="value" style="color:#ffd700;">${stats.pts}</div>
                <div class="label">Points</div>
            </div>
        </div>

        <div class="modal-section-title">📊 Recent Form</div>
        <div class="modal-form-dots" style="margin-bottom:1rem;">${formDots}</div>

        <div class="modal-section-title">📋 Recent Matches</div>
        <div style="margin-bottom:1rem;">${recentHtml}</div>

        <div class="modal-section-title">📅 Upcoming Fixtures</div>
        <div style="margin-bottom:1.5rem;">${upcomingHtml}</div>

        <button class="modal-btn" onclick="switchToFixtures('${teamName}')">📅 View All Fixtures</button>
    `;
}

function closeModal() {
    document.getElementById('teamModal').classList.remove('active');
    document.body.style.overflow = '';
}

function switchToFixtures(teamName) {
    closeModal();
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-tab="fixtures"]').classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-fixtures').classList.add('active');

    setTimeout(() => {
        renderFixtures();
        const items = document.querySelectorAll('.fixture-card');
        items.forEach(item => {
            const text = item.querySelector('.fixture-teams')?.textContent || '';
            if (text.includes(teamName)) {
                item.style.borderLeftColor = '#ffd700';
                item.style.background = '#fef9e7';
            } else {
                item.style.borderLeftColor = '#37003c';
                item.style.background = '#fafafa';
            }
        });
    }, 100);
}

// ============================================================
//  MODAL CLOSE EVENTS
// ============================================================
document.getElementById('teamModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

// ============================================================
//  MAIN LOADER
// ============================================================
function loadLeagueData() {
    const leagueRef = db.ref(`leagues/${LEAGUE_KEY}`);
    leagueRef.on('value', async (snapshot) => {
        const data = snapshot.val() || {};
        allTeams = data.teams || {};
        allMatchweeks = data.matchweeks || {};

        const standings = computeStandings(allMatchweeks, allTeams);
        allStandings = standings;
        document.getElementById('standingsContainer').innerHTML = renderStandings(standings);

        // Always render fixtures
        renderFixtures();
    });
}

loadLeagueData();
    </script>
