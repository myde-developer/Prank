<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premier League</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>

/* ============================================================
   RESET & BASE
   ============================================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem;
}

/* ============================================================
   HEADER
   ============================================================ */
.league-header {
    background: linear-gradient(135deg, #37003c, #6a1b6e, #00a3e0);
    border-radius: 20px;
    padding: 2rem 2.5rem;
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    box-shadow: 0 8px 40px rgba(55, 0, 60, 0.25);
    position: relative;
    overflow: hidden;
}

.league-header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 300px;
    height: 300px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 50%;
}

.league-header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: #ffffff;
    position: relative;
    z-index: 1;
}

.league-header .emblem {
    font-size: 2.8rem;
}

.league-header .header-sub {
    color: rgba(255, 255, 255, 0.7);
    font-weight: 400;
    font-size: 1rem;
    margin-top: 0.25rem;
    position: relative;
    z-index: 1;
}

.pl-badge {
    background: #ffd700;
    color: #37003c;
    padding: 0.3rem 1.2rem;
    border-radius: 30px;
    font-weight: 800;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
}

/* ============================================================
   TABS (Main Navigation)
   ============================================================ */
.tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    border-bottom: 2px solid #e5e7eb;
    padding-bottom: 0.5rem;
}

.tab-btn {
    padding: 0.7rem 2rem;
    border: none;
    border-radius: 12px 12px 0 0;
    background: transparent;
    color: #6b7280;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.tab-btn::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 3px;
    background: #37003c;
    border-radius: 3px;
    transition: 0.3s;
}

.tab-btn:hover {
    color: #1a1a2e;
    background: #f8f9fa;
}

.tab-btn.active {
    color: #37003c;
    background: #ffffff;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
}

.tab-btn.active::after {
    width: 60%;
}

.tab-content {
    display: none;
    animation: fadeIn 0.4s ease;
}

.tab-content.active {
    display: block;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ============================================================
   STANDINGS TABLE - REDESIGNED (No Badges)
   ============================================================ */
.standings-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 4px;
    font-size: 0.85rem;
}

.standings-table thead th {
    text-align: left;
    padding: 0.8rem 0.5rem;
    color: #6b7280;
    font-weight: 600;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 2px solid #e5e7eb;
    position: sticky;
    top: 0;
    background: #ffffff;
    z-index: 2;
}

.standings-table tbody tr {
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 10px;
    background: #ffffff;
}

.standings-table tbody tr:hover {
    background: #f8f9fa;
    transform: scale(1.01);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
}

.standings-table tbody td {
    padding: 0.7rem 0.5rem;
    border-bottom: 1px solid #f0f2f5;
    vertical-align: middle;
}

/* Position column - plain number */
.col-pos {
    width: 45px;
    text-align: center;
    font-weight: 700;
    font-size: 0.9rem;
    color: #1a1a2e;
}

/* Remove old badge styles */
.pos-badge,
.pos-badge.gold,
.pos-badge.silver,
.pos-badge.bronze {
    display: none;
}

/* Team column */
.col-team {
    min-width: 140px;
}

.team-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: #1a1a2e;
    transition: color 0.2s;
}

.team-name:hover {
    color: #37003c;
}

/* Stat columns */
.col-stat {
    text-align: center;
    font-weight: 500;
    color: #1a1a2e;
}

/* Goal difference */
.gd-positive {
    color: #22c55e;
    font-weight: 600;
}
.gd-negative {
    color: #ef4444;
    font-weight: 600;
}
.gd-zero {
    color: #6b7280;
}

/* Points column */
.col-pts {
    text-align: center;
    font-weight: 800;
    font-size: 1.1rem;
}

.pts-value {
    background: #f0f2f5;
    padding: 0.2rem 0.6rem;
    border-radius: 8px;
    color: #37003c;
    display: inline-block;
    min-width: 32px;
}

/* Form column */
.col-form {
    text-align: center;
    min-width: 120px;
}

.form-dots {
    display: flex;
    gap: 4px;
    justify-content: center;
}

.form-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
    color: #ffffff;
    transition: transform 0.2s;
}

.form-dot:hover {
    transform: scale(1.2);
}

.dot-w {
    background: #22c55e;
}
.dot-d {
    background: #94a3b8;
}
.dot-l {
    background: #ef4444;
}

/* Row color coding */
.row-champions {
    background: #f0f7ff;
}
.row-champions .pts-value {
    background: #dbeafe;
    color: #1d4ed8;
}
.row-relegation {
    background: #fef2f2;
}
.row-relegation .pts-value {
    background: #fee2e2;
    color: #dc2626;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .standings-table {
        font-size: 0.75rem;
    }

    .standings-table thead th,
    .standings-table tbody td {
        padding: 0.4rem 0.25rem;
    }

    .col-pos {
        width: 30px;
        font-size: 0.8rem;
    }

    .col-team {
        min-width: 80px;
    }

    .team-name {
        font-size: 0.8rem;
    }

    .col-pts {
        font-size: 0.9rem;
    }

    .pts-value {
        padding: 0.1rem 0.4rem;
        min-width: 24px;
    }

    .col-form {
        min-width: 80px;
    }

    .form-dot {
        width: 20px;
        height: 20px;
        font-size: 0.5rem;
    }
}

/* ============================================================
   STANDINGS TABLE - FULL MOBILE VIEW
   ============================================================ */
@media (max-width: 480px) {
    .standings-table {
        font-size: 0.6rem;
        min-width: 100%;
    }

    .standings-table thead th,
    .standings-table tbody td {
        padding: 0.25rem 0.1rem;
        white-space: nowrap;
    }

    .col-pos {
        width: 20px;
        font-size: 0.6rem;
        min-width: 20px;
    }

    .col-team {
        min-width: 50px;
        max-width: 80px;
    }

    .team-name {
        font-size: 0.6rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: inline-block;
        max-width: 60px;
    }

    .col-stat {
        font-size: 0.6rem;
        min-width: 18px;
    }

    .col-pts {
        font-size: 0.7rem;
    }

    .pts-value {
        padding: 0.05rem 0.3rem;
        min-width: 18px;
        font-size: 0.7rem;
    }

    .col-form {
        min-width: 50px;
    }

    .form-dot {
        width: 14px;
        height: 14px;
        font-size: 0.35rem;
    }

    .col-form .form-dots {
        gap: 2px;
    }
}

/* ============================================================
   FIXTURE TABS (Horizontal scrollable)
   ============================================================ */
.fixture-tabs-wrapper {
    overflow-x: auto;
    padding-bottom: 0.5rem;
    margin-bottom: 1.5rem;
    -webkit-overflow-scrolling: touch;
}

.fixture-tabs-wrapper::-webkit-scrollbar {
    height: 4px;
}

.fixture-tabs-wrapper::-webkit-scrollbar-track {
    background: #f0f2f5;
    border-radius: 10px;
}

.fixture-tabs-wrapper::-webkit-scrollbar-thumb {
    background: #37003c;
    border-radius: 10px;
}

.fixture-tabs {
    display: flex;
    gap: 0.5rem;
    min-width: max-content;
    padding: 0.2rem 0;
}

.fixture-tab {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 30px;
    background: #f0f2f5;
    color: #6b7280;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: 0.3s;
    white-space: nowrap;
    font-family: inherit;
}

.fixture-tab:hover {
    background: #e5e7eb;
    color: #1a1a2e;
}

.fixture-tab.active {
    background: #37003c;
    color: #ffffff;
    box-shadow: 0 4px 15px rgba(55, 0, 60, 0.25);
}

/* ============================================================
   FIXTURE CONTENT
   ============================================================ */
.fixture-content {
    animation: fadeIn 0.3s ease;
}

.fixture-week-group {
    margin-bottom: 1.5rem;
    background: #ffffff;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
}

.fixture-week-group:last-child {
    margin-bottom: 0;
}

.fixture-week-header-compact {
    padding: 1rem 1.2rem;
    background: #f8f9fa;
    border-bottom: 1px solid #e5e7eb;
}

.fixture-week-title {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
}

.week-badge {
    font-weight: 700;
    font-size: 1rem;
    color: #1a1a2e;
}

.week-status-badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.15rem 0.8rem;
    border-radius: 20px;
}

.week-status-badge.completed {
    background: #dcfce7;
    color: #16a34a;
}

.week-status-badge.live {
    background: #fef3c7;
    color: #d97706;
}

.week-status-badge.upcoming {
    background: #e5e7eb;
    color: #6b7280;
}

.fixture-list {
    padding: 0.5rem 1.2rem 1.2rem 1.2rem;
}

.fixture-card-compact {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.7rem 1rem;
    margin-bottom: 0.4rem;
    border-radius: 10px;
    background: #fafafa;
    border-left: 4px solid #37003c;
    transition: all 0.2s;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.fixture-card-compact:hover {
    background: #f5f5f5;
    transform: translateX(4px);
}

.fixture-card-compact:last-child {
    margin-bottom: 0;
}

.fixture-teams-compact {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 500;
    font-size: 0.9rem;
    flex: 1;
    min-width: 150px;
}

.team-name-compact {
    font-weight: 500;
}

.vs-compact {
    color: #94a3b8;
    font-size: 0.7rem;
    font-weight: 400;
}

.fixture-result-compact {
    display: flex;
    align-items: center;
    gap: 0.8rem;
}

.fixture-score-compact {
    font-weight: 700;
    font-size: 1rem;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0.05rem 0.8rem;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
    min-width: 50px;
    text-align: center;
}

.fixture-score-compact.unplayed {
    color: #94a3b8;
    font-weight: 400;
    background: transparent;
    border: 1px dashed #d1d5db;
}

.fixture-result-compact .report-btn {
    font-size: 0.6rem;
    padding: 0.15rem 0.6rem;
}

/* ============================================================
   REPORT BUTTON
   ============================================================ */
.report-btn {
    background: #e5e7eb;
    border: none;
    border-radius: 6px;
    padding: 0.15rem 0.6rem;
    color: #6b7280;
    cursor: pointer;
    font-size: 0.6rem;
    transition: all 0.2s;
    font-weight: 600;
    white-space: nowrap;
    font-family: inherit;
}

.report-btn:hover {
    background: #37003c;
    color: #ffffff;
    transform: scale(1.05);
}

.report-btn.has-report {
    background: #37003c;
    color: #ffffff;
}

.report-btn.has-report:hover {
    background: #6a1b6e;
}

/* ============================================================
   LOADING
   ============================================================ */
.loading {
    text-align: center;
    padding: 2rem;
    opacity: 0.6;
    font-style: italic;
    color: #6b7280;
}

/* ============================================================
   TEAM MODAL - REDESIGNED STYLES
   ============================================================ */

/* Team Header */
.modal-team-header {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1.2rem;
    border-bottom: 2px solid #f0f2f5;
}

.modal-team-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #37003c, #6a1b6e);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 800;
    flex-shrink: 0;
}

.modal-team-info {
    flex: 1;
}

.modal-team-name {
    font-size: 1.6rem;
    font-weight: 800;
    color: #1a1a2e;
}

.modal-team-sub {
    color: #6b7280;
    font-size: 0.85rem;
}

/* Stats Grid */
.modal-stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.8rem;
    margin-bottom: 1.2rem;
}

.modal-stat-card {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 0.8rem 0.5rem;
    text-align: center;
}

.modal-stat-value {
    font-size: 1.4rem;
    font-weight: 800;
    color: #37003c;
}

.modal-stat-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    color: #6b7280;
    letter-spacing: 0.5px;
    margin-top: 0.1rem;
}

/* Record Breakdown */
.modal-record-breakdown {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.5rem;
    margin-bottom: 1.2rem;
}

.modal-record-item {
    background: #f8f9fa;
    border-radius: 10px;
    padding: 0.5rem 0.3rem;
    text-align: center;
}

.modal-record-number {
    font-size: 1.1rem;
    font-weight: 700;
    display: block;
}

.modal-record-number.positive {
    color: #22c55e;
}
.modal-record-number.negative {
    color: #ef4444;
}

.modal-record-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    color: #6b7280;
    letter-spacing: 0.3px;
}

.modal-record-item.wins .modal-record-number { color: #22c55e; }
.modal-record-item.draws .modal-record-number { color: #94a3b8; }
.modal-record-item.losses .modal-record-number { color: #ef4444; }
.modal-record-item.goals-for .modal-record-number { color: #3b82f6; }
.modal-record-item.goals-against .modal-record-number { color: #f59e0b; }
.modal-record-item.goal-diff .modal-record-number { color: #8b5cf6; }

/* Modal Sections */
.modal-section {
    margin-bottom: 1.2rem;
}

.modal-section-header {
    font-weight: 600;
    color: #6b7280;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 0.6rem;
}

/* Fixture List in Modal */
.modal-fixture-list {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 0.5rem 0.8rem;
    max-height: 200px;
    overflow-y: auto;
}

.modal-fixture-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
    border-bottom: 1px solid #e5e7eb;
    font-size: 0.85rem;
}

.modal-fixture-item:last-child {
    border-bottom: none;
}

.modal-fixture-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.modal-fixture-location {
    font-size: 0.8rem;
}

.modal-fixture-opponent {
    font-weight: 500;
}

.modal-fixture-right {
    display: flex;
    align-items: center;
    gap: 0.6rem;
}

.modal-fixture-result {
    font-weight: 700;
    font-size: 0.8rem;
}

.modal-fixture-score {
    font-weight: 600;
    color: #37003c;
}

.modal-fixture-report {
    color: #37003c;
    cursor: pointer;
    font-size: 0.8rem;
    transition: transform 0.2s;
}

.modal-fixture-report:hover {
    transform: scale(1.2);
}

.modal-fixture-unplayed {
    color: #6b7280;
    font-size: 0.8rem;
}

.modal-fixture-more {
    text-align: center;
    color: #6b7280;
    font-size: 0.75rem;
    padding: 0.3rem 0;
}

/* Form Dots in Modal */
.modal-form-dots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.modal-form-dot {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: #ffffff;
}

.modal-form-dot.dot-w { background: #22c55e; }
.modal-form-dot.dot-d { background: #94a3b8; }
.modal-form-dot.dot-l { background: #ef4444; }

/* Modal Actions */
.modal-actions {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    margin-top: 1.2rem;
    padding-top: 1.2rem;
    border-top: 2px solid #f0f2f5;
}

.modal-btn-primary {
    background: #37003c;
    color: #ffffff;
    padding: 0.6rem 2rem;
    border-radius: 40px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.85rem;
    font-family: inherit;
}

.modal-btn-primary:hover {
    background: #6a1b6e;
    transform: scale(1.02);
}

.modal-btn-secondary {
    background: #e5e7eb;
    color: #1a1a2e;
    padding: 0.6rem 2rem;
    border-radius: 40px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.85rem;
    font-family: inherit;
}

.modal-btn-secondary:hover {
    background: #d1d5db;
    transform: scale(1.02);
}

/* Responsive Modal */
@media (max-width: 600px) {
    .modal-stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .modal-record-breakdown {
        grid-template-columns: repeat(3, 1fr);
    }

    .modal-team-avatar {
        width: 48px;
        height: 48px;
        font-size: 1.4rem;
    }

    .modal-team-name {
        font-size: 1.2rem;
    }

    .modal-actions {
        flex-direction: column;
    }

    .modal-actions button {
        width: 100%;
        text-align: center;
    }
}

/* ============================================================
   MATCH REPORT MODAL (Redesigned)
   ============================================================ */
.report-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid #f0f2f5;
    flex-wrap: wrap;
    gap: 1rem;
}

.report-header .report-teams {
    font-size: 1.3rem;
    font-weight: 600;
}

.report-header .report-teams .home {
    color: #1a1a2e;
}

.report-header .report-teams .away {
    color: #6b7280;
}

.report-header .report-teams .vs {
    color: #d1d5db;
    margin: 0 0.5rem;
    font-weight: 400;
}

.report-header .report-meta {
    color: #6b7280;
    font-size: 0.85rem;
    margin-top: 0.2rem;
}

.report-header .report-score {
    font-size: 2.8rem;
    font-weight: 800;
    color: #37003c;
    background: #f8f9fa;
    padding: 0.2rem 1.5rem;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    min-width: 120px;
    text-align: center;

    <script>
// ============================================================
//  CONFIG
// ============================================================
const LEAGUE_KEY = 'premier';

const firebaseConfig = {

};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allMatchweeks = {};
let allTeams = {};
let allStandings = [];

document.getElementById('yearDisplay').textContent = new Date().getFullYear();

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {

    if (!container) {

        div.id = 'toast-container';
        document.body.appendChild(div);

}

// ============================================================
//  TAB SWITCHING
// ============================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        if (btn.dataset.tab === 'fixtures') renderFixtures();
    });
});

// ============================================================
//  STANDINGS COMPUTATION
// ============================================================
function computeStandings(matchweeks, teams) {
    const stats = {};
    const teamNames = Object.values(teams || {});
    for (const t of teamNames) {
        if (!stats[t]) stats[t] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0, results: [] };
    }

    const sortedWeeks = Object.keys(matchweeks || {}).sort((a, b) => Number(a) - Number(b));

    for (const wk of sortedWeeks) {
        const matches = matchweeks[wk]?.matches || [];
        for (const m of matches) {
            if (!m.played) continue;
            const h = m.home,
                a = m.away,
                hs = m.homeScore,
                as = m.awayScore;
            if (!stats[h]) stats[h] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0, results: [] };
            if (!stats[a]) stats[a] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0, results: [] };

            stats[h].played++;
            stats[a].played++;
            stats[h].gf += hs;
            stats[h].ga += as;
            stats[a].gf += as;
            stats[a].ga += hs;

            if (hs > as) {
                stats[h].won++;
                stats[h].pts += 3;
                stats[a].lost++;
                stats[h].results.push('W');
                stats[a].results.push('L');
            } else if (hs < as) {
                stats[a].won++;
                stats[a].pts += 3;
                stats[h].lost++;
                stats[a].results.push('W');
                stats[h].results.push('L');
            } else {
                stats[h].drawn++;
                stats[h].pts += 1;
                stats[a].drawn++;
                stats[a].pts += 1;
                stats[h].results.push('D');
                stats[a].results.push('D');
            }
        }
    }

    return Object.entries(stats)
        .map(([name, s]) => {
            const gd = s.gf - s.ga;
            const form = s.results.slice(-5).reverse();
            return { name, ...s, gd, form };
        })
        .sort((a, b) => {
            if (a.pts !== b.pts) return b.pts - a.pts;
            if (b.gd !== a.gd) return b.gd - a.gd;
            return b.gf - a.gf;
        });
}

function getFormDots(form) {
    if (!form || form.length === 0) return '<span style="opacity:0.4;">—</span>';
    return `<div class="form-dots">${form.map(r => `<span class="form-dot dot-${r.toLowerCase()}">${r}</span>`).join('')}</div>`;
}

// ============================================================
//  RENDER STANDINGS (No badges, plain numbers)
// ============================================================
function renderStandings(standings) {
    allStandings = standings;
    if (!standings || standings.length === 0) return '<div class="loading">No matches played yet.</div>';

    const totalTeams = standings.length;
    const relegationZoneStart = totalTeams - 3; // Bottom 3

    let html = `<div class="table-wrap">
        <table class="standings-table">
            <thead>
                <tr>
                    <th class="col-pos">#</th>
                    <th class="col-team">Team</th>
                    <th class="col-stat">P</th>
                    <th class="col-stat">W</th>
                    <th class="col-stat">D</th>
                    <th class="col-stat">L</th>
                    <th class="col-stat">GF</th>
                    <th class="col-stat">GA</th>
                    <th class="col-stat">GD</th>
                    <th class="col-pts">PTS</th>
                    <th class="col-form">Form</th>
                </tr>
            </thead>
            <tbody>
    `;

    standings.forEach((s, i) => {
        const pos = i + 1;
        const isChampionsLeague = pos <= 4;
        const isRelegation = pos > relegationZoneStart;
        const gdStr = s.gd > 0 ? `+${s.gd}` : `${s.gd}`;
        const gdClass = s.gd > 0 ? 'gd-positive' : (s.gd < 0 ? 'gd-negative' : 'gd-zero');

        // Row class
        let rowClass = '';
        if (isChampionsLeague && pos <= 4) rowClass = 'row-champions';
        if (isRelegation) rowClass = 'row-relegation';

        html += `
            <tr class="${rowClass}" onclick="openTeamModal('${s.name}')">
                <td class="col-pos">
                    <span class="pos-number">${pos}</span>
                </td>
                <td class="col-team">
                    <span class="team-name">${s.name}</span>
                </td>
                <td class="col-stat">${s.played}</td>
                <td class="col-stat">${s.won}</td>
                <td class="col-stat">${s.drawn}</td>
                <td class="col-stat">${s.lost}</td>
                <td class="col-stat">${s.gf}</td>
                <td class="col-stat">${s.ga}</td>
                <td class="col-stat ${gdClass}">${gdStr}</td>
                <td class="col-pts"><span class="pts-value">${s.pts}</span></td>
                <td class="col-form">${getFormDots(s.form)}</td>
            </tr>
        `;
    });

    html += `
            </tbody>
        </table>
    </div>`;

    return html;
}

// ============================================================
//  RENDER FIXTURES (Tab-based with expandable weeks)
// ============================================================
function renderFixtures() {
    const container = document.getElementById('fixturesContainer');

    if (!allMatchweeks || Object.keys(allMatchweeks).length === 0) {
        container.innerHTML = '<div class="loading">No fixtures generated yet.</div>';
        return;
    }

    const sortedWeeks = Object.keys(allMatchweeks).sort((a, b) => Number(a) - Number(b));
    
    // Get the first week to show by default
    const defaultWeek = sortedWeeks.length > 0 ? sortedWeeks[0] : null;

    // Build tabs - NO "All" button
    let tabsHtml = `
        <div class="fixture-tabs-wrapper">
            <div class="fixture-tabs">
    `;

    for (const wk of sortedWeeks) {
        const isActive = wk === defaultWeek ? 'active' : '';
        tabsHtml += `
            <button class="fixture-tab ${isActive}" data-week="${wk}" onclick="switchFixtureWeek('${wk}')">
                Week ${wk}
            </button>
        `;
    }

    tabsHtml += `
            </div>
        </div>
    `;

    // Build content - show default week
    let contentHtml = `
        <div id="fixture-content" class="fixture-content">
            ${defaultWeek ? buildSingleWeekFixtures(defaultWeek) : '<div class="loading">No fixtures found.</div>'}
        </div>
    `;

    container.innerHTML = tabsHtml + contentHtml;
}

// ============================================================
//  BUILD FIXTURES FOR A SPECIFIC WEEK
// ============================================================
function buildWeekFixtures(week, sortedWeeks) {
    if (week === 'all') {
        // Show all weeks
        let html = '';
        for (const wk of sortedWeeks) {
            html += buildSingleWeekFixtures(wk);
        }
        return html || '<div class="loading">No fixtures found.</div>';
    } else {
        // Show single week
        return buildSingleWeekFixtures(week);
    }
}

// ============================================================
//  BUILD FIXTURES FOR A SINGLE WEEK
// ============================================================
function buildSingleWeekFixtures(week) {
    const data = allMatchweeks[week];
    if (!data) return '';

    const matches = data.matches || [];
    if (matches.length === 0) return '';

    // Determine week status - NO ICONS, just text
    const allPlayed = matches.every(m => m.played);
    const somePlayed = matches.some(m => m.played);
    let statusText = '';
    let statusClass = '';
    if (allPlayed) {
        statusText = 'Completed';
        statusClass = 'completed';
    } else if (somePlayed) {
        statusText = 'Ongoing';
        statusClass = 'live';
    } else {
        statusText = 'Upcoming';
        statusClass = 'upcoming';
    }

    let html = `
        <div class="fixture-week-group">
            <div class="fixture-week-header-compact">
                <div class="fixture-week-title">
                    <span class="week-badge">Matchweek ${week}</span>
                    <span class="week-status-badge ${statusClass}">${statusText}</span>
                </div>
            </div>
            <div class="fixture-list">
    `;

    for (let i = 0; i < matches.length; i++) {
        const m = matches[i];
        const hasReport = m.played && m.report;

        html += `
            <div class="fixture-card-compact">
                <div class="fixture-teams-compact">
                    <span class="team-name-compact">${m.home}</span>
                    <span class="vs-compact">vs</span>
                    <span class="team-name-compact">${m.away}</span>
                </div>
                <div class="fixture-result-compact">
                    <span class="fixture-score-compact ${m.played ? '' : 'unplayed'}">
                        ${m.played ? `${m.homeScore} – ${m.awayScore}` : '– : –'}
                    </span>
                    ${m.played ? `<button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openMatchReport('${week}', ${i})">${hasReport ? '📋 Report' : '📝 Add Report'}</button>` : ''}
                </div>
            </div>
        `;
    }

    html += `
            </div>
        </div>
    `;

    return html;
}

// ============================================================
//  SWITCH FIXTURE WEEK (Tab click handler)
// ============================================================
function switchFixtureWeek(week) {
    // Update tabs
    document.querySelectorAll('.fixture-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.dataset.week === week) {
            tab.classList.add('active');
        }
    });

    // Update content
    const contentContainer = document.getElementById('fixture-content');
    if (contentContainer) {
        const sortedWeeks = Object.keys(allMatchweeks).sort((a, b) => Number(a) - Number(b));
        contentContainer.innerHTML = buildWeekFixtures(week, sortedWeeks);

        // Scroll to content
        contentContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

// ============================================================
//  TEAM MODAL - REDESIGNED
// ============================================================
function openTeamModal(teamName) {
    const modal = document.getElementById('teamModal');
    const content = document.getElementById('modalContent');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    const stats = allStandings.find(s => s.name === teamName);
    if (!stats) {
        content.innerHTML = `<div class="loading">No data found for ${teamName}</div>`;
        return;
    }

    const teamFixtures = [];
    for (const wk in allMatchweeks) {
        const matches = allMatchweeks[wk]?.matches || [];
        for (const m of matches) {
            if (m.home === teamName || m.away === teamName) {
                teamFixtures.push({ ...m, week: wk });
            }
        }
    }
    teamFixtures.sort((a, b) => Number(a.week) - Number(b.week));

    const recentMatches = teamFixtures.filter(m => m.played).slice(-5).reverse();
    const upcomingMatches = teamFixtures.filter(m => !m.played);

    const formDots = stats.form && stats.form.length > 0 ?
        stats.form.map(r => `<span class="modal-form-dot dot-${r.toLowerCase()}">${r}</span>`).join('') :
        '<span class="no-data">No matches yet</span>';

    // Build recent matches HTML
    let recentHtml = '';
    if (recentMatches.length === 0) {
        recentHtml = '<span class="no-data">No recent matches</span>';
    } else {
        recentHtml = recentMatches.map((m) => {
            const isHome = m.home === teamName;
            const opponent = isHome ? m.away : m.home;
            const score = `${m.homeScore} – ${m.awayScore}`;
            const result = isHome ?
                (m.homeScore > m.awayScore ? 'W' : m.homeScore < m.awayScore ? 'L' : 'D') :
                (m.awayScore > m.homeScore ? 'W' : m.awayScore < m.homeScore ? 'L' : 'D');
            const resultColor = result === 'W' ? '#22c55e' : result === 'L' ? '#ef4444' : '#94a3b8';
            const matches = allMatchweeks[m.week]?.matches || [];
            const matchIdx = matches.findIndex(mm => mm.home === m.home && mm.away === m.away);
            const hasReport = m.played && m.report;

            const resultEmoji = result === 'W' ? '✅' : result === 'L' ? '❌' : '➖';

            return `
                <div class="modal-fixture-item">
                    <div class="modal-fixture-left">
                        <span class="modal-fixture-location">${isHome ? '🏠' : '✈️'}</span>
                        <span class="modal-fixture-opponent">${opponent}</span>
                    </div>
                    <div class="modal-fixture-right">
                        <span class="modal-fixture-result" style="color:${resultColor};">
                            ${resultEmoji} ${result}
                        </span>
                        <span class="modal-fixture-score">${score}</span>
                        ${hasReport ? `<span class="modal-fixture-report" onclick="event.stopPropagation();openMatchReport('${m.week}', ${matchIdx})">📋</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    // Build upcoming matches HTML
    let upcomingHtml = '';
    if (upcomingMatches.length === 0) {
        upcomingHtml = '<span class="no-data">No upcoming fixtures</span>';
    } else {
        upcomingHtml = upcomingMatches.slice(0, 5).map(m => {
            const isHome = m.home === teamName;
            const opponent = isHome ? m.away : m.home;
            return `
                <div class="modal-fixture-item">
                    <div class="modal-fixture-left">
                        <span class="modal-fixture-location">${isHome ? '🏠' : '✈️'}</span>
                        <span class="modal-fixture-opponent">${opponent}</span>
                    </div>
                    <div class="modal-fixture-right">
                        <span class="modal-fixture-unplayed">Week ${m.week}</span>
                    </div>
                </div>
            `;
        }).join('');
        if (upcomingMatches.length > 5) {
            upcomingHtml += `<div class="modal-fixture-more">+ ${upcomingMatches.length - 5} more</div>`;
        }
    }

    // Calculate additional stats
    const formPercentage = stats.played > 0 ? Math.round((stats.won / stats.played) * 100) : 0;
    const goalsPerGame = stats.played > 0 ? (stats.gf / stats.played).toFixed(1) : '0.0';

    content.innerHTML = `
        <!-- Team Header -->
        <div class="modal-team-header">
            <div class="modal-team-avatar">${teamName.charAt(0)}</div>
            <div class="modal-team-info">
                <div class="modal-team-name">${teamName}</div>
                <div class="modal-team-sub">Premier League • Season ${new Date().getFullYear()}</div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="modal-stats-grid">
            <div class="modal-stat-card">
                <div class="modal-stat-value">${stats.pts}</div>
                <div class="modal-stat-label">Points</div>
            </div>
            <div class="modal-stat-card">
                <div class="modal-stat-value">${stats.played}</div>
                <div class="modal-stat-label">Played</div>
            </div>
            <div class="modal-stat-card">
                <div class="modal-stat-value">${formPercentage}%</div>
                <div class="modal-stat-label">Win Rate</div>
            </div>
            <div class="modal-stat-card">
                <div class="modal-stat-value">${goalsPerGame}</div>
                <div class="modal-stat-label">Goals/Game</div>
            </div>
        </div>

        <!-- Record Breakdown -->
        <div class="modal-record-breakdown">
            <div class="modal-record-item wins">
                <span class="modal-record-number">${stats.won}</span>
                <span class="modal-record-label">Wins</span>
            </div>
            <div class="modal-record-item draws">
                <span class="modal-record-number">${stats.drawn}</span>
                <span class="modal-record-label">Draws</span>
            </div>
            <div class="modal-record-item losses">
                <span class="modal-record-number">${stats.lost}</span>
                <span class="modal-record-label">Losses</span>
            </div>
            <div class="modal-record-item goals-for">
                <span class="modal-record-number">${stats.gf}</span>
                <span class="modal-record-label">Goals For</span>
            </div>
            <div class="modal-record-item goals-against">
                <span class="modal-record-number">${stats.ga}</span>
                <span class="modal-record-label">Goals Against</span>
            </div>
            <div class="modal-record-item goal-diff">
                <span class="modal-record-number ${stats.gd >= 0 ? 'positive' : 'negative'}">${stats.gd > 0 ? '+' : ''}${stats.gd}</span>
                <span class="modal-record-label">Goal Diff</span>
            </div>
        </div>

        <!-- Recent Form -->
        <div class="modal-section">
            <div class="modal-section-header">
                <span>Recent Form</span>
            </div>
            <div class="modal-form-dots">${formDots}</div>
        </div>

        <!-- Recent Matches -->
        <div class="modal-section">
            <div class="modal-section-header">
                <span> Recent Matches</span>
            </div>
            <div class="modal-fixture-list">${recentHtml}</div>
        </div>

        <!-- Upcoming Fixtures -->
        <div class="modal-section">
            <div class="modal-section-header">
                <span>Upcoming Fixtures</span>
            </div>
            <div class="modal-fixture-list">${upcomingHtml}</div>
        </div>

        <!-- Action Buttons -->
        <div class="modal-actions">
            <button class="modal-btn modal-btn-primary" onclick="closeModal()">Close</button>
            <button class="modal-btn modal-btn-secondary" onclick="switchToFixtures('${teamName}')">📅 View All Fixtures</button>
        </div>
    `;
}

function closeModal() {
    document.getElementById('teamModal').classList.remove('active');
    document.body.style.overflow = '';
}

// ============================================================
//  SWITCH TO FIXTURES (Filtered by Team)
// ============================================================
function switchToFixtures(teamName) {
    closeModal();

    // Switch to fixtures tab
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-tab="fixtures"]').classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-fixtures').classList.add('active');

    // Store the team name in a global variable for filtering
    window._filterTeam = teamName;

    // Render fixtures with filter
    renderFilteredFixtures(teamName);
}

// ============================================================
//  RENDER FILTERED FIXTURES (Only show team's matches)
// ============================================================
function renderFilteredFixtures(teamName) {
    const container = document.getElementById('fixturesContainer');

    if (!allMatchweeks || Object.keys(allMatchweeks).length === 0) {
        container.innerHTML = '<div class="loading">No fixtures generated yet.</div>';
        return;
    }

    const sortedWeeks = Object.keys(allMatchweeks).sort((a, b) => Number(a) - Number(b));

    // Build tabs (only weeks that have this team's fixtures)
    let tabsHtml = `
        <div class="fixture-tabs-wrapper">
            <div class="fixture-tabs">
                <button class="fixture-tab active" data-week="all" onclick="switchFilteredWeek('all', '${teamName}')">
                    All (${teamName})
                </button>
    `;

    for (const wk of sortedWeeks) {
        const data = allMatchweeks[wk];
        const hasTeamMatch = data.matches.some(m => m.home === teamName || m.away === teamName);
        if (!hasTeamMatch) continue;

        tabsHtml += `
            <button class="fixture-tab" data-week="${wk}" onclick="switchFilteredWeek('${wk}', '${teamName}')">
                Week ${wk}
            </button>
        `;
    }

    tabsHtml += `
            </div>
        </div>
    `;

    // Build content (show all filtered weeks by default)
    let contentHtml = `
        <div id="fixture-content" class="fixture-content">
            ${buildFilteredWeekFixtures('all', sortedWeeks, teamName)}
        </div>
    `;

    container.innerHTML = tabsHtml + contentHtml;

    // Add a "Show All Fixtures" button
    const backButton = document.createElement('div');
    backButton.style.cssText = 'text-align: center; margin-top: 1rem;';
    backButton.innerHTML = `
        <button onclick="showAllFixtures()" style="
            background: #e5e7eb;
            border: none;
            border-radius: 30px;
            padding: 0.5rem 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        " onmouseover="this.style.background='#d1d5db'" onmouseout="this.style.background='#e5e7eb'">
            ⬅️ Show All Fixtures
        </button>
    `;
    container.appendChild(backButton);
}

// ============================================================
//  BUILD FILTERED WEEK FIXTURES (Only team's matches)
// ============================================================
function buildFilteredWeekFixtures(week, sortedWeeks, teamName) {
    if (week === 'all') {
        let html = '';
        for (const wk of sortedWeeks) {
            html += buildSingleFilteredWeekFixtures(wk, teamName);
        }
        return html || '<div class="loading">No fixtures found for this team.</div>';
    } else {
        return buildSingleFilteredWeekFixtures(week, teamName);
    }
}

// ============================================================
//  BUILD SINGLE FILTERED WEEK FIXTURES
// ============================================================
function buildSingleFilteredWeekFixtures(week, teamName) {
    const data = allMatchweeks[week];
    if (!data) return '';

    // Filter matches for this specific team
    const teamMatches = data.matches.filter(m => m.home === teamName || m.away === teamName);
    if (teamMatches.length === 0) return '';

    // Determine week status based on filtered matches
    const allPlayed = teamMatches.every(m => m.played);
    const somePlayed = teamMatches.some(m => m.played);
    let statusText = '';
    let statusClass = '';
    if (allPlayed) {
        statusText = 'Completed';
        statusClass = 'completed';
    } else if (somePlayed) {
        statusText = 'Ongoing';
        statusClass = 'live';
    } else {
        statusText = 'Upcoming';
        statusClass = 'upcoming';
    }

    let html = `
        <div class="fixture-week-group" style="border: 2px solid #ffd700; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.15);">
            <div class="fixture-week-header-compact" style="background: #fef9e7;">
                <div class="fixture-week-title">
                    <span class="week-badge">Matchweek ${week}</span>
                    <span class="week-status-badge ${statusClass}">${statusText}</span>
                </div>
            </div>
            <div class="fixture-list">
    `;

    for (let i = 0; i < data.matches.length; i++) {
        const m = data.matches[i];
        const isTeamMatch = (m.home === teamName || m.away === teamName);
        const hasReport = m.played && m.report;

        const highlightStyle = isTeamMatch ?
            'border-left: 4px solid #ffd700; background: #fef9e7;' :
            'border-left: 4px solid #d1d5db; opacity: 0.5;';

        html += `
            <div class="fixture-card-compact" style="${highlightStyle}">
                <div class="fixture-teams-compact">
                    <span class="team-name-compact" style="${m.home === teamName ? 'font-weight:700; color:#37003c;' : ''}">${m.home}</span>
                    <span class="vs-compact">vs</span>
                    <span class="team-name-compact" style="${m.away === teamName ? 'font-weight:700; color:#37003c;' : ''}">${m.away}</span>
                </div>
                <div class="fixture-result-compact">
                    <span class="fixture-score-compact ${m.played ? '' : 'unplayed'}">
                        ${m.played ? `${m.homeScore} – ${m.awayScore}` : '– : –'}
                    </span>
                    ${m.played ? `<button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openMatchReport('${week}', ${data.matches.indexOf(m)})">${hasReport ? '📋 Report' : '📝 Add Report'}</button>` : ''}
                </div>
            </div>
        `;
    }

    html += `
            </div>
        </div>
    `;

    return html;
}

// ============================================================
//  SWITCH FILTERED WEEK (Tab click handler)
// ============================================================
function switchFilteredWeek(week, teamName) {
    // Update tabs
    document.querySelectorAll('.fixture-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.dataset.week === week) {
            tab.classList.add('active');
        }
    });

    // Update content
    const contentContainer = document.getElementById('fixture-content');
    if (contentContainer) {
        const sortedWeeks = Object.keys(allMatchweeks).sort((a, b) => Number(a) - Number(b));
        contentContainer.innerHTML = buildFilteredWeekFixtures(week, sortedWeeks, teamName);

        // Scroll to content
        contentContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

// ============================================================
//  SHOW ALL FIXTURES (Back to normal view)
// ============================================================
function showAllFixtures() {
    window._filterTeam = null;
    renderFixtures();
}

// ============================================================
//  MODAL CLOSE EVENTS
// ============================================================
document.getElementById('teamModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

// ============================================================
//  MAIN LOADER
// ============================================================
function loadLeagueData() {
    const leagueRef = db.ref(`leagues/${LEAGUE_KEY}`);
    leagueRef.on('value', async (snapshot) => {
        const data = snapshot.val() || {};
        allTeams = data.teams || {};
        allMatchweeks = data.matchweeks || {};

        const standings = computeStandings(allMatchweeks, allTeams);
        allStandings = standings;
        document.getElementById('standingsContainer').innerHTML = renderStandings(standings);

        // Always render fixtures
        renderFixtures();
    });
}

loadLeagueData();

    </script>
</body>
</html>
