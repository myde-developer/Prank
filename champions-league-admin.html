    <style>
/* ============================================================
   CHAMPIONS LEAGUE ADMIN – LIGHT THEME
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f7fa;
    color: #1a2a44;
    padding: 1.5rem;
}
.ucl-admin-container { max-width: 1100px; margin: 0 auto; }

.ucl-admin-header {
    background: #fff; border-radius: 24px; padding: 1.2rem 2rem; margin-bottom: 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
}
.header-left { display: flex; align-items: center; gap: 1rem; }
.logo { font-size: 2.8rem; }
.ucl-admin-header h1 { font-size: 1.8rem; font-weight: 800; color: #0b1e3a; }
.subtitle { font-size: 0.85rem; color: #4a5a72; display: block; }
.header-right { display: flex; gap: 0.6rem; }
.btn-back, .btn-view {
    background: #eef1f5; border: none; padding: 0.5rem 1.2rem; border-radius: 30px;
    font-weight: 600; color: #1a2a44; cursor: pointer; transition: 0.2s;
}
.btn-back:hover, .btn-view:hover { background: #dde1e8; }
.btn-view { background: #1d4ed8; color: #fff; }
.btn-view:hover { background: #1a3db8; }

.ucl-admin-tabs {
    display: flex; gap: 0.3rem; margin-bottom: 1.5rem;
    border-bottom: 2px solid #e5e9f0; padding-bottom: 0.3rem;
}
.tab-btn {
    padding: 0.6rem 1.8rem; border: none; border-radius: 40px; background: transparent;
    font-weight: 600; font-size: 0.9rem; color: #6b7a8f; cursor: pointer; transition: 0.3s;
}
.tab-btn:hover { color: #1a2a44; background: #f0f3f8; }
.tab-btn.active { color: #1d4ed8; background: #e8edf9; }
.tab-content { display: none; animation: fadeUp 0.3s; }
.tab-content.active { display: block; }
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.card {
    background: #fff; border-radius: 20px; padding: 1.5rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid #e5e9f0;
    margin-bottom: 1.5rem;
}
.card h2 { font-weight: 600; font-size: 1rem; margin-bottom: 1rem; color: #0b1e3a; }
.input-group {
    display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
}
.input-group > * { flex: 1 1 auto; min-width: 80px; }
.input-group .score-sep { font-weight: 700; color: #6b7a8f; }
.btn-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.btn-group button { flex: 1; }
button {
    padding: 0.5rem 1rem; border: none; border-radius: 30px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s;
}
button.primary { background: #1d4ed8; color: #fff; }
button.primary:hover { background: #1a3db8; }
button.success { background: #16a34a; color: #fff; }
button.success:hover { background: #15803d; }
button.warning { background: #f59e0b; color: #fff; }
button.warning:hover { background: #d97706; }
button.danger { background: #dc2626; color: #fff; }
button.danger:hover { background: #b91c1c; }
button.secondary { background: #eef1f5; color: #1a2a44; }
button.secondary:hover { background: #dde1e8; }
.hidden { display: none !important; }

.status-box {
    background: #f8f9fc; border-radius: 12px; padding: 0.8rem 1rem; margin-top: 0.8rem;
    border: 1px solid #e5e9f0; color: #4a5a72; font-size: 0.9rem;
}
.status-box .green { color: #16a34a; font-weight: 600; }
.status-box .red { color: #dc2626; font-weight: 600; }
.status-box .yellow { color: #f59e0b; font-weight: 600; }
.msg { margin-top: 0.5rem; font-size: 0.9rem; }

@media (max-width: 768px) {
    body { padding: 1rem; }
    .ucl-admin-header { flex-direction: column; align-items: stretch; gap: 0.5rem; }
    .header-right { justify-content: flex-end; }
    .tab-btn { padding: 0.4rem 1rem; font-size: 0.8rem; }
}
    </style>
</head>
<body>

    <script>
// ============================================================
//  FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBmy0tmvaYcw9KsQQRH7RLKcXC8EN6WFqY",
    authDomain: "dls-premier-league.firebaseapp.com",
    projectId: "dls-premier-league",
    storageBucket: "dls-premier-league.firebasestorage.app",
    messagingSenderId: "975087030284",
    appId: "1:975087030284:web:7708718fffd9180c009e29"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============================================================
//  TABS
// ============================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
});

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        container.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;';
        document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.style.cssText = 'background:#1a2a44;color:#fff;padding:12px 20px;border-radius:12px;font-size:0.9rem;box-shadow:0 4px 20px rgba(0,0,0,0.1);animation:slideIn 0.3s ease;';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 2500);
}

// ============================================================
//  LEAGUE PHASE RESULTS
// ============================================================
let currentUCLLeagueMatch = null;
let currentUCLLeagueRound = 1;
let currentUCLLeagueFixtures = [];

async function loadUCLLeagueFixtures() {
    const snap = await db.ref('champions_league').once('value');
    const data = snap.val();
    if (!data || !data.leagueFixtures) {
        showToast('No UCL league phase data found');
        return;
    }
    const fixtures = data.leagueFixtures || [];
    const rounds = [...new Set(fixtures.map(f => f.round))].sort((a, b) => a - b);
    const select = document.getElementById('uclLeagueRoundSelect');
    if (select.options.length <= 1) {
        select.innerHTML = '';
        rounds.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r;
            opt.textContent = `Matchday ${r}`;
            select.appendChild(opt);
        });
    }
    const round = parseInt(document.getElementById('uclLeagueRoundSelect').value);
    if (isNaN(round)) { showToast('Select a matchday'); return; }
    currentUCLLeagueRound = round;
    const roundFixtures = fixtures.filter(f => f.round === round);
    if (!roundFixtures.length) { showToast(`No fixtures for Matchday ${round}`); return; }
    currentUCLLeagueFixtures = roundFixtures;
    const dropdown = document.getElementById('uclLeagueFixtureDropdown');
    dropdown.innerHTML = '<option value="">— Select a match —</option>';
    roundFixtures.forEach((m, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = `${m.home} vs ${m.away}`;
        dropdown.appendChild(opt);
    });
    document.getElementById('uclLeagueFixtureSelect').style.display = 'block';
    document.getElementById('uclLeagueResultInputs').style.display = 'none';
    showToast(`Loaded ${roundFixtures.length} fixtures`);
}

function fillUCLLeagueResult() {
    const idx = parseInt(document.getElementById('uclLeagueFixtureDropdown').value);
    if (isNaN(idx)) { showToast('Select a match'); return; }
    const match = currentUCLLeagueFixtures[idx];
    if (!match) return;
    currentUCLLeagueMatch = match;
    document.getElementById('uclLeagueHomeName').textContent = match.home;
    document.getElementById('uclLeagueAwayName').textContent = match.away;
    document.getElementById('uclLeagueHomeScore').value = match.homeScore !== null ? match.homeScore : '';
    document.getElementById('uclLeagueAwayScore').value = match.awayScore !== null ? match.awayScore : '';
    document.getElementById('uclLeagueResultInputs').style.display = 'block';
    showToast(`Loaded ${match.home} vs ${match.away}`);
}

async function saveUCLLeagueResult() {
    if (!currentUCLLeagueMatch) { showToast('No match loaded'); return; }
    const homeScore = parseInt(document.getElementById('uclLeagueHomeScore').value);
    const awayScore = parseInt(document.getElementById('uclLeagueAwayScore').value);
    if (isNaN(homeScore) || isNaN(awayScore)) { showToast('Enter valid scores'); return; }
    currentUCLLeagueMatch.homeScore = homeScore;
    currentUCLLeagueMatch.awayScore = awayScore;
    currentUCLLeagueMatch.played = true;

    // Update league table
    const snap = await db.ref('champions_league/leagueTable').once('value');
    let leagueTable = snap.val() || [];
    const homeTeam = leagueTable.find(t => t.name === currentUCLLeagueMatch.home);
    const awayTeam = leagueTable.find(t => t.name === currentUCLLeagueMatch.away);
    if (homeTeam && awayTeam) {
        homeTeam.played = (homeTeam.played || 0) + 1;
        homeTeam.gf = (homeTeam.gf || 0) + homeScore;
        homeTeam.ga = (homeTeam.ga || 0) + awayScore;
        if (homeScore > awayScore) { homeTeam.won = (homeTeam.won || 0) + 1; homeTeam.pts = (homeTeam.pts || 0) + 3; }
        else if (homeScore < awayScore) { homeTeam.lost = (homeTeam.lost || 0) + 1; }
        else { homeTeam.drawn = (homeTeam.drawn || 0) + 1; homeTeam.pts = (homeTeam.pts || 0) + 1; }
        homeTeam.gd = homeTeam.gf - homeTeam.ga;

        awayTeam.played = (awayTeam.played || 0) + 1;
        awayTeam.gf = (awayTeam.gf || 0) + awayScore;
        awayTeam.ga = (awayTeam.ga || 0) + homeScore;
        if (awayScore > homeScore) { awayTeam.won = (awayTeam.won || 0) + 1; awayTeam.pts = (awayTeam.pts || 0) + 3; }
        else if (awayScore < homeScore) { awayTeam.lost = (awayTeam.lost || 0) + 1; }
        else { awayTeam.drawn = (awayTeam.drawn || 0) + 1; awayTeam.pts = (awayTeam.pts || 0) + 1; }
        awayTeam.gd = awayTeam.gf - awayTeam.ga;
    }

    const fixturesRef = db.ref('champions_league/leagueFixtures');
    const tableRef = db.ref('champions_league/leagueTable');
    await fixturesRef.set(currentUCLLeagueFixtures);
    await tableRef.set(leagueTable);

    document.getElementById('uclLeagueResultMsg').innerHTML =
        `<span style="color:#16a34a;">✅ Saved! ${currentUCLLeagueMatch.home} ${homeScore}–${awayScore} ${currentUCLLeagueMatch.away}</span>`;
    showToast(`Result saved: ${currentUCLLeagueMatch.home} ${homeScore}–${awayScore} ${currentUCLLeagueMatch.away}`);
    document.getElementById('uclLeagueHomeScore').value = '';
    document.getElementById('uclLeagueAwayScore').value = '';
}

// ============================================================
//  KNOCKOUT RESULTS
// ============================================================
let currentUCLTie = null;
let currentUCLRound = 'roundOf16';
let currentUCLMatches = [];

async function loadUCLFixtures() {
    currentUCLRound = document.getElementById('uclRoundSelect').value;
    const snap = await db.ref('champions_league/knockout').once('value');
    const ko = snap.val();
    if (!ko) { showToast('No knockout data'); return; }
    const matches = ko[currentUCLRound] || [];
    if (!matches.length) { showToast('No matches in this round'); return; }
    currentUCLMatches = matches;
    const dropdown = document.getElementById('uclFixtureDropdown');
    dropdown.innerHTML = '<option value="">— Select a tie —</option>';
    const tieMap = {};
    matches.forEach(m => {
        const id = m.tieId || 0;
        if (!tieMap[id]) tieMap[id] = [];
        tieMap[id].push(m);
    });
    for (const id in tieMap) {
        const legs = tieMap[id];
        const leg1 = legs.find(l => l.leg === 1);
        const label = leg1 ? `${leg1.home} vs ${leg1.away}` : `Tie ${id}`;
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = label;
        dropdown.appendChild(opt);
    }
    document.getElementById('uclFixtureSelect').style.display = 'block';
    document.getElementById('uclResultInputs').style.display = 'none';
}

function fillUCLResult() {
    const tieId = parseInt(document.getElementById('uclFixtureDropdown').value);
    if (isNaN(tieId)) { showToast('Select a tie'); return; }
    const legs = currentUCLMatches.filter(m => m.tieId === tieId);
    if (!legs.length) return;
    const leg1 = legs.find(l => l.leg === 1);
    const leg2 = legs.find(l => l.leg === 2);
    if (!leg1) return;
    currentUCLTie = { tieId, legs, leg1, leg2 };
    document.getElementById('uclHomeName').textContent = leg1.home;
    document.getElementById('uclAwayName').textContent = leg1.away;
    document.getElementById('uclHomeScore').value = leg1.homeScore !== null ? leg1.homeScore : '';
    document.getElementById('uclAwayScore').value = leg1.awayScore !== null ? leg1.awayScore : '';
    if (leg2) {
        document.getElementById('uclLeg2Inputs').classList.remove('hidden');
        document.getElementById('uclHomeScore2').value = leg2.homeScore !== null ? leg2.homeScore : '';
        document.getElementById('uclAwayScore2').value = leg2.awayScore !== null ? leg2.awayScore : '';
    } else {
        document.getElementById('uclLeg2Inputs').classList.add('hidden');
    }
    document.getElementById('uclResultInputs').style.display = 'block';
    showToast(`Loaded ${leg1.home} vs ${leg1.away}`);
}

async function saveUCLResult() {
    if (!currentUCLTie) { showToast('No tie loaded'); return; }
    const { tieId, legs, leg1, leg2 } = currentUCLTie;
    const h1 = parseInt(document.getElementById('uclHomeScore').value);
    const a1 = parseInt(document.getElementById('uclAwayScore').value);
    if (isNaN(h1) || isNaN(a1)) { showToast('Enter valid scores for Leg 1'); return; }
    leg1.homeScore = h1; leg1.awayScore = a1; leg1.played = true;
    if (leg2) {
        const h2 = parseInt(document.getElementById('uclHomeScore2').value);
        const a2 = parseInt(document.getElementById('uclAwayScore2').value);
        if (isNaN(h2) || isNaN(a2)) { showToast('Enter valid scores for Leg 2'); return; }
        leg2.homeScore = h2; leg2.awayScore = a2; leg2.played = true;
    }
    const roundPath = `champions_league/knockout/${currentUCLRound}`;
    await db.ref(roundPath).set(currentUCLMatches);
    // Compute winner and store in a separate field for auto‑advance
    let winner = null;
    if (leg2) {
        const aggHome = (leg1.homeScore || 0) + (leg2.awayScore || 0);
        const aggAway = (leg1.awayScore || 0) + (leg2.homeScore || 0);
        if (aggHome > aggAway) winner = leg1.home;
        else if (aggAway > aggHome) winner = leg1.away;
        else winner = 'Penalties';
        await db.ref(`champions_league/knockout/winner_${tieId}`).set(winner);
    } else {
        // Single leg (Final)
        if (leg1.homeScore > leg1.awayScore) winner = leg1.home;
        else if (leg1.awayScore > leg1.homeScore) winner = leg1.away;
        else winner = 'Draw';
        if (winner && winner !== 'Draw') {
            await db.ref('champions_league/knockout/champion').set(winner);
        }
    }
    document.getElementById('uclResultMsg').innerHTML = `<span style="color:#16a34a;">✅ Result saved! Winner: ${winner || '—'}</span>`;
    showToast(`Result saved! Winner: ${winner || '—'}`);
}

// ============================================================
//  GENERATE FUNCTIONS (from previous admin)
// ============================================================
function computeStandingsLocal(matchweeks, teamNames) {
    const stats = {};
    for (const t of teamNames) stats[t] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0 };
    for (const wk in matchweeks) {
        const matches = matchweeks[wk]?.matches || [];
        for (const m of matches) {
            if (!m.played) continue;
            const h = m.home, a = m.away, hs = m.homeScore, as = m.awayScore;
            if (!stats[h]) stats[h] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0 };
            if (!stats[a]) stats[a] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0 };
            stats[h].played++; stats[a].played++;
            stats[h].gf += hs; stats[h].ga += as; stats[a].gf += as; stats[a].ga += hs;
            if (hs > as) { stats[h].won++; stats[h].pts += 3; stats[a].lost++; }
            else if (hs < as) { stats[a].won++; stats[a].pts += 3; stats[h].lost++; }
            else { stats[h].drawn++; stats[h].pts += 1; stats[a].drawn++; stats[a].pts += 1; }
        }
    }
    return Object.entries(stats).map(([name, s]) => ({ name, ...s, gd: s.gf - s.ga })).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

function generateSingleRoundRobin(teamNames) {
    let teams = [...teamNames];
    if (teams.length % 2 !== 0) teams.push("BYE");
    const m = teams.length, half = m / 2;
    const rounds = [];
    for (let round = 0; round < m - 1; round++) {
        const roundFixtures = [];
        for (let i = 0; i < half; i++) {
            const home = teams[i], away = teams[m - 1 - i];
            if (home !== "BYE" && away !== "BYE") {
                roundFixtures.push(round % 2 === 0 ? { home, away } : { home: away, away: home });
            }
        }
        rounds.push(roundFixtures);
        const last = teams.pop();
        teams.splice(1, 0, last);
    }
    return rounds;
}

async function generateChampionsLeague() {
    if (!confirm('Generate Champions League from top 10 teams from Premier League and La Liga?')) return;
    try {
        const plSnap = await db.ref('leagues/premier/matchweeks').once('value');
        const plMW = plSnap.val() || {};
        const plTeamsSnap = await db.ref('leagues/premier/teams').once('value');
        const plTeams = Object.values(plTeamsSnap.val() || {});
        const plStandings = computeStandingsLocal(plMW, plTeams);
        const plTop10 = plStandings.slice(0,10).map(s => s.name);

        const llSnap = await db.ref('leagues/laliga/matchweeks').once('value');
        const llMW = llSnap.val() || {};
        const llTeamsSnap = await db.ref('leagues/laliga/teams').once('value');
        const llTeams = Object.values(llTeamsSnap.val() || {});
        const llStandings = computeStandingsLocal(llMW, llTeams);
        const llTop10 = llStandings.slice(0,10).map(s => s.name);

        const allTeams = [...plTop10, ...llTop10];
        if (allTeams.length < 20) { showToast('Need at least 20 teams'); return; }
        const leagueTable = allTeams.map(name => ({ name, played:0, won:0, drawn:0, lost:0, gf:0, ga:0, gd:0, pts:0 }));
        const singleRounds = generateSingleRoundRobin(allTeams);
        const leagueFixtures = [];
        singleRounds.forEach((roundFixtures, idx) => {
            const roundNum = idx + 1;
            roundFixtures.forEach(match => {
                leagueFixtures.push({ round: roundNum, home: match.home, away: match.away, homeScore: null, awayScore: null, played: false });
            });
        });
        await db.ref('champions_league').set({
            phase: 'league',
            leagueTable,
            leagueFixtures,
            knockout: { roundOf16: [], quarterFinals: [], semiFinals: [], final: null, champion: null }
        });
        document.getElementById('uclStatus').innerHTML = `<span class="green">✅ Champions League created! ${allTeams.length} teams, ${leagueFixtures.length} matches</span>`;
        showToast('✅ Champions League generated!');
    } catch (err) { showToast('❌ Error: ' + err.message); }
}

async function generateKnockout() {
    if (!confirm('Generate knockout from league standings?')) return;
    try {
        const snap = await db.ref('champions_league').once('value');
        const data = snap.val();
        if (!data) { showToast('No UCL data'); return; }
        const table = data.leagueTable || [];
        if (table.length < 16) { showToast('Not enough teams'); return; }
        const sorted = [...table].sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
        const seedings = sorted.slice(0,16).map(t => t.name);
        const pairs = [];
        for (let i = 0; i < 8; i++) pairs.push([seedings[i], seedings[15 - i]]);
        const roundOf16 = [];
        pairs.forEach((pair, idx) => {
            roundOf16.push({ home: pair[0], away: pair[1], homeScore: null, awayScore: null, played: false, leg: 1, tieId: idx+1 });
            roundOf16.push({ home: pair[1], away: pair[0], homeScore: null, awayScore: null, played: false, leg: 2, tieId: idx+1 });
        });
        await db.ref('champions_league/knockout').set({ roundOf16, quarterFinals: [], semiFinals: [], final: null, champion: null });
        await db.ref('champions_league/phase').set('knockout');
        document.getElementById('uclStatus').innerHTML = `<span class="green">✅ Knockout generated! Round of 16 set.</span>`;
        showToast('✅ Knockout generated!');
    } catch (err) { showToast('❌ Error: ' + err.message); }
}

async function clearChampionsLeague() {
    if (!confirm('Clear all UCL data?')) return;
    await db.ref('champions_league').remove();
    document.getElementById('uclStatus').innerHTML = `<span class="yellow">⚠️ Champions League cleared</span>`;
    showToast('UCL cleared');
}

    </script>
