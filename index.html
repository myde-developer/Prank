<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Premier League Tournament</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen pb-12">

    <!-- Header Section -->
    <header class="bg-gradient-to-r from-purple-900 to-indigo-900 py-6 px-4 shadow-lg text-center border-b border-indigo-500/30">
        <h1 class="text-3xl font-extrabold tracking-wider uppercase text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-200">
            DLS Premier League
        </h1>
        <p class="text-xs text-indigo-200 mt-1 uppercase tracking-widest">Group Tournament Dashboard</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8 space-y-8">
        
        <!-- Setup Section (Hidden after generation) -->
        <section id="setup-section" class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
            <h2 class="text-xl font-bold mb-4 text-indigo-400 flex items-center gap-2">
                <span>🏆</span> Tournament Setup
            </h2>
            <p class="text-sm text-gray-400 mb-4">Enter team/manager names separated by commas to generate your league schedule.</p>
            <textarea id="manager-names" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-sm focus:outline-none focus:border-indigo-500 transition h-24 placeholder-gray-600" placeholder="e.g. Alex, Jordan, Sarah, Chris, Tunde, Elena"></textarea>
            <button onclick="initializeTournament()" class="w-full mt-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 font-bold py-3 rounded-xl transition shadow-md active:scale-[0.99]">
                Generate League & Fixtures
            </button>
        </section>

        <!-- Main Dashboard (Hidden until initialized) -->
        <section id="dashboard-section" class="hidden space-y-8">
            
            <!-- League Table Card -->
            <div class="bg-gray-900 rounded-2xl border border-gray-800 shadow-xl overflow-hidden">
                <div class="p-5 border-b border-gray-800 bg-gray-900/50">
                    <h2 class="text-xl font-bold text-yellow-400 flex items-center gap-2">
                        <span>📊</span> Standings
                    </h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-gray-950 text-gray-400 uppercase text-xs tracking-wider border-b border-gray-800">
                                <th class="py-3 px-4 text-center w-12">Pos</th>
                                <th class="py-3 px-4">Team / Manager</th>
                                <th class="py-3 px-3 text-center">MP</th>
                                <th class="py-3 px-2 text-center text-green-400">W</th>
                                <th class="py-3 px-2 text-center text-gray-400">D</th>
                                <th class="py-3 px-2 text-center text-red-400">L</th>
                                <th class="py-3 px-2 text-center">GF</th>
                                <th class="py-3 px-2 text-center">GA</th>
                                <th class="py-3 px-2 text-center">GD</th>
                                <th class="py-3 px-4 text-center text-indigo-400 font-bold">PTS</th>
                            </tr>
                        </thead>
                        <tbody id="league-table-body">
                            <!-- Injected by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Fixtures / Results Section -->
            <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl">
                <h2 class="text-xl font-bold text-indigo-400 mb-4 flex items-center gap-2">
                    <span>⚽</span> Fixtures & Record Results
                </h2>
                <div id="fixtures-container" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    <!-- Injected by JavaScript -->
                </div>
            </div>

            <!-- Danger Zone / Reset Button -->
            <div class="text-center">
                <button onclick="resetTournament()" class="text-xs text-red-500 hover:text-red-400 underline transition cursor-pointer">
                    Reset Tournament & Start Over
                </button>
            </div>
        </section>
    </main>

    <script>
        // --- STATE MANAGEMENT ---
        let teams = {};
        let fixtures = [];

        // Save data to localStorage so it doesn't disappear on refresh
        function saveToStorage() {
            localStorage.setItem('dls_teams', JSON.stringify(teams));
            localStorage.setItem('dls_fixtures', JSON.stringify(fixtures));
        }

        function loadFromStorage() {
            const storedTeams = localStorage.getItem('dls_teams');
            const storedFixtures = localStorage.getItem('dls_fixtures');
            if (storedTeams && storedFixtures) {
                teams = JSON.parse(storedTeams);
                fixtures = JSON.parse(storedFixtures);
                renderDashboard();
            }
        }

        // --- TOURNAMENT INITIALIZATION (Round Robin Engine) ---
        function initializeTournament() {
            const input = document.getElementById('manager-names').value;
            let list = input.split(',').map(name => name.trim()).filter(name => name !== "");

            if (list.length < 2) {
                alert("Please enter at least 2 managers!");
                return;
            }

            // If odd number of teams, add a 'BYE' or we just proceed for even logic
            if (list.length % 2 !== 0) {
                list.push("BYE"); 
            }

            // Initialize teams stats object
            teams = {};
            list.forEach(name => {
                if(name !== "BYE") {
                    teams[name] = { name, mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
                }
            });

            // Generate Fixtures using Berger Tables / Round Robin algorithm
            fixtures = [];
            const numTeams = list.length;
            const rounds = numTeams - 1;
            const matchesPerRound = numTeams / 2;

            for (let round = 0; round < rounds; round++) {
                for (let match = 0; match < matchesPerRound; match++) {
                    const homeIdx = (round + match) % (numTeams - 1);
                    let awayIdx = (numTeams - 1 - match + round) % (numTeams - 1);

                    if (match === 0) {
                        awayIdx = numTeams - 1;
                    }

                    const home = list[homeIdx];
                    const away = list[awayIdx];

                    // Skip matches involving the dummy "BYE" team
                    if (home !== "BYE" && away !== "BYE") {
                        fixtures.push({
                            id: fixtures.length,
                            round: round + 1,
                            home: home,
                            away: away,
                            homeScore: null,
                            awayScore: null,
                            played: false
                        });
                    }
                }
            }

            renderDashboard();
            saveToStorage();
        }

        // --- CALCULATION LOGIC ---
        function updateTableCalculations() {
            // Reset statistics
            for (let t in teams) {
                teams[t] = { name: t, mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
            }

            // Calculate from completed fixtures
            fixtures.forEach(f => {
                if (f.played) {
                    const h = f.home;
                    const a = f.away;
                    const hScore = parseInt(f.homeScore);
                    const aScore = parseInt(f.awayScore);

                    teams[h].mp++;
                    teams[a].mp++;
                    teams[h].gf += hScore;
                    teams[h].ga += aScore;
                    teams[a].gf += aScore;
                    teams[a].ga += hScore;

                    if (hScore > aScore) {
                        teams[h].w++;
                        teams[h].pts += 3;
                        teams[a].l++;
                    } else if (hScore < aScore) {
                        teams[a].w++;
                        teams[a].pts += 3;
                        teams[h].l++;
                    } else {
                        teams[h].d++;
                        teams[h].pts += 1;
                        teams[a].d++;
                        teams[a].pts += 1;
                    }

                    teams[h].gd = teams[h].gf - teams[h].ga;
                    teams[a].gd = teams[a].gf - teams[a].ga;
                }
            });
        }

        // --- RENDER SCREEN ---
        function renderDashboard() {
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');

            updateTableCalculations();
            renderTable();
            renderFixtures();
        }

        function renderTable() {
            // Convert to array and sort by Points, then Goal Difference, then Goals For
            let sortedTeams = Object.values(teams).sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });

            const tbody = document.getElementById('league-table-body');
            tbody.innerHTML = "";

            sortedTeams.forEach((team, index) => {
                const pos = index + 1;
                
                // Styling zones (Top 1 is champion/leader, bottom rows can be colored differently)
                let rowBg = "hover:bg-gray-800/40 transition border-b border-gray-800/60";
                let posColor = "text-gray-400 font-medium";
                
                if (pos === 1) { rowBg += " bg-amber-500/5"; posColor = "text-yellow-400 font-bold"; }
                if (pos === 2 || pos === 3) { rowBg += " bg-indigo-500/5"; }

                tbody.innerHTML += `
                    <tr class="${rowBg}">
                        <td class="py-3 px-4 text-center ${posColor}">${pos}</td>
                        <td class="py-3 px-4 font-semibold text-gray-200">${team.name}</td>
                        <td class="py-3 px-3 text-center text-gray-400">${team.mp}</td>
                        <td class="py-3 px-2 text-center text-green-400 font-medium">${team.w}</td>
                        <td class="py-3 px-2 text-center text-gray-400">${team.d}</td>
                        <td class="py-3 px-2 text-center text-red-400 font-medium">${team.l}</td>
                        <td class="py-3 px-2 text-center text-gray-400">${team.gf}</td>
                        <td class="py-3 px-2 text-center text-gray-400">${team.ga}</td>
                        <td class="py-3 px-2 text-center font-medium ${team.gd >= 0 ? 'text-green-500' : 'text-red-500'}">${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                        <td class="py-3 px-4 text-center text-indigo-400 font-bold text-base">${team.pts}</td>
                    </tr>
                `;
            });
        }

        function renderFixtures() {
            const container = document.getElementById('fixtures-container');
            container.innerHTML = "";

            let currentRound = 0;

            fixtures.forEach(f => {
                // Add Round Headers visually separating gameweeks
                if (f.round !== currentRound) {
                    currentRound = f.round;
                    container.innerHTML += `
                        <div class="text-xs font-bold text-gray-500 tracking-wider uppercase mt-4 mb-2 border-b border-gray-800 pb-1">
                            Gameweek ${currentRound}
                        </div>
                    `;
                }

                const isPlayed = f.played;
                const hVal = isPlayed ? f.homeScore : "";
                const aVal = isPlayed ? f.awayScore : "";

                container.innerHTML += `
                    <div class="flex items-center justify-between bg-gray-950 p-3 rounded-xl border border-gray-800/80 gap-4">
                        <div class="w-2/5 text-right font-medium text-sm text-gray-300 truncate">${f.home}</div>
                        
                        <!-- Score Box Inputs -->
                        <div class="flex items-center gap-1 bg-gray-900 px-2 py-1 rounded-lg border border-gray-800">
                            <input type="number" id="home-score-${f.id}" value="${hVal}" min="0" placeholder="-" 
                                class="w-8 text-center bg-transparent font-bold text-indigo-400 focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                            <span class="text-gray-600 font-bold text-xs">:</span>
                            <input type="number" id="away-score-${f.id}" value="${aVal}" min="0" placeholder="-" 
                                class="w-8 text-center bg-transparent font-bold text-indigo-400 focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                        </div>

                        <div class="w-2/5 text-left font-medium text-sm text-gray-300 truncate">${f.away}</div>
                        
                        <div>
                            <button onclick="saveResult(${f.id})" class="px-3 py-1.5 text-xs font-bold uppercase rounded-lg transition tracking-wide ${isPlayed ? 'bg-gray-800 text-gray-400 hover:bg-gray-700' : 'bg-indigo-600 hover:bg-indigo-500 text-white shadow-sm'}">
                                ${isPlayed ? 'Update' : 'Save'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // --- INTERACTION ACTIONS ---
        function saveResult(fixtureId) {
            const hInput = document.getElementById(`home-score-${fixtureId}`).value;
            const aInput = document.getElementById(`away-score-${fixtureId}`).value;

            if (hInput === "" || aInput === "") {
                alert("Please enter scores for both teams before saving.");
                return;
            }

            const fixture = fixtures.find(f => f.id === fixtureId);
            fixture.homeScore = parseInt(hInput);
            fixture.awayScore = parseInt(aInput);
            fixture.played = true;

            renderDashboard();
            saveToStorage();
        }

        function resetTournament() {
            if (confirm("Are you sure you want to completely wipe out the data and restart? All results will be lost.")) {
                localStorage.removeItem('dls_teams');
                localStorage.removeItem('dls_fixtures');
                teams = {};
                fixtures = [];
                document.getElementById('manager-names').value = "";
                document.getElementById('dashboard-section').classList.add('hidden');
                document.getElementById('setup-section').classList.remove('hidden');
            }
        }

        // Check for existing tournament data when page loads
        window.onload = loadFromStorage;
    </script>
</body>
</html>
