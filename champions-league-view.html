<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champions League</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* ===== CUSTOM STYLES ===== */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
        }

        /* Glassmorphism cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Tabs */
        .tab-btn {
            padding: 0.6rem 1.8rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            background: transparent;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 60%;
            height: 3px;
            background: #667eea;
            border-radius: 4px;
            transition: transform 0.3s ease;
        }
        .tab-btn:hover {
            color: rgba(255,255,255,0.8);
        }
        .tab-btn.active {
            color: #fff;
            background: rgba(102, 126, 234, 0.15);
        }
        .tab-btn.active::after {
            transform: translateX(-50%) scaleX(1);
        }

        .tab-content {
            display: none;
            animation: fadeUp 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Group tables */
        .group-table th {
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.5rem 0.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .group-table td {
            padding: 0.5rem 0.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.9);
        }
        .group-table tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        .group-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
        }

        /* Fixture cards */
        .fixture-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            border-left: 3px solid rgba(102, 126, 234, 0.4);
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .fixture-card:hover {
            background: rgba(255,255,255,0.08);
            border-left-color: #667eea;
        }
        .fixture-card .teams {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }
        .fixture-card .score {
            font-weight: 700;
            font-size: 1rem;
            color: #a5b4fc;
        }
        .fixture-card .score.unplayed {
            color: rgba(255,255,255,0.3);
        }

        /* Knockout bracket (creative) */
        .bracket {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .bracket-round {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .bracket-round-title {
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 0.3rem;
        }
        .bracket-match {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #667eea;
            transition: 0.2s;
        }
        .bracket-match:hover {
            background: rgba(255,255,255,0.08);
        }
        .bracket-match .teams {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }
        .bracket-match .score {
            font-weight: 700;
            color: #a5b4fc;
        }
        .bracket-match .vs {
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
        }
        .bracket-match .winner {
            color: #4ade80;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .bracket-connector {
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.1);
            font-size: 0.8rem;
            padding: 0.2rem 0;
        }

        /* Report button */
        .report-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 30px;
            padding: 0.15rem 0.7rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.6rem;
            transition: all 0.2s;
            font-weight: 600;
        }
        .report-btn:hover {
            background: #667eea;
            color: #fff;
        }
        .report-btn.has-report {
            background: #667eea;
            color: #fff;
        }
        .report-btn.has-report:hover {
            background: #764ba2;
        }

        /* Stats cards */
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
            transition: 0.2s;
        }
        .stat-card:hover {
            background: rgba(255,255,255,0.08);
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 800;
            color: #a5b4fc;
        }
        .stat-card .label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.2rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover { color: #fff; }
        .modal-section-title {
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 1rem 0 0.5rem;
        }
        .report-goal {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .report-goal .minute {
            color: #667eea;
            font-weight: 700;
            min-width: 40px;
        }
        .report-card {
            display: inline-block;
            padding: 0.1rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-right: 0.3rem;
        }
        .report-card.yellow { background: #ffd700; color: #1a1a2e; }
        .report-card.red { background: #ef4444; color: #fff; }

        /* Scrollbar */
        .modal-content::-webkit-scrollbar { width: 4px; }
        .modal-content::-webkit-scrollbar-track { background: transparent; }
        .modal-content::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }

        @media (max-width: 640px) {
            .tab-btn { padding: 0.4rem 1rem; font-size: 0.75rem; }
            .modal-content { padding: 1.5rem; }
            .bracket-match { flex-wrap: wrap; gap: 0.3rem; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- ===== HEADER ===== -->
        <div class="glass-card p-6 mb-6 flex flex-wrap items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold text-white flex items-center gap-2">
                    🏆 Champions League
                </h1>
                <p class="text-white/50 text-sm">Group Stage • Season 2025/26</p>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.href='index.html'" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl font-bold transition text-sm backdrop-blur-sm">
                    ⬅️ Back
                </button>
                <div id="admin-controls" class="hidden">
                    <button onclick="window.location.href='admin.html'" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl font-bold transition text-sm">
                        ⚙️ Admin
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== TABS ===== -->
        <div class="flex flex-wrap gap-2 mb-6 border-b border-white/10 pb-2">
            <button class="tab-btn active" data-tab="groups">Groups</button>
            <button class="tab-btn" data-tab="fixtures">Fixtures</button>
            <button class="tab-btn" data-tab="knockout">Knockout</button>
        </div>

        <!-- ===== TAB CONTENT ===== -->
        <div id="tab-groups" class="tab-content active">
            <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card p-6">
                    <div class="group-header text-white rounded-xl p-3 mb-4">
                        <h4 class="text-xl font-bold">Group A</h4>
                    </div>
                    <div id="group-A" class="group-table">Loading...</div>
                </div>
                <div class="glass-card p-6">
                    <div class="group-header text-white rounded-xl p-3 mb-4">
                        <h4 class="text-xl font-bold">Group B</h4>
                    </div>
                    <div id="group-B" class="group-table">Loading...</div>
                </div>
            </div>
        </div>

        <div id="tab-fixtures" class="tab-content">
            <div id="fixtures-container" class="glass-card p-6">
                <p class="text-white/50">Loading fixtures...</p>
            </div>
        </div>

        <div id="tab-knockout" class="tab-content">
            <div id="knockout-container" class="glass-card p-6">
                <p class="text-white/50">Loading knockout stage...</p>
            </div>
        </div>
    </div>

    <!-- ===== MATCH REPORT MODAL ===== -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeReportModal()">✕</button>
            <div id="reportContent">
                <div class="text-center py-8 text-white/50">Loading report...</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBmy0tmvaYcw9KsQQRH7RLKcXC8EN6WFqY",
            authDomain: "dls-premier-league.firebaseapp.com",
            projectId: "dls-premier-league",
            storageBucket: "dls-premier-league.firebasestorage.app",
            messagingSenderId: "975087030284",
            appId: "1:975087030284:web:7708718fffd9180c009e29"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        //  ADMIN CHECK
        // ============================================================
        const isAdmin = sessionStorage.getItem('championsAdmin') === 'true';
        if (isAdmin) {
            document.getElementById('admin-controls').classList.remove('hidden');
        }

        // ============================================================
        //  TAB SWITCHING
        // ============================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.getElementById(`tab-${tab}`).classList.add('active');
                // Re-render if needed
                if (tab === 'fixtures') renderFixtures();
                if (tab === 'knockout') renderKnockout();
                if (tab === 'stats') renderStats();
            });
        });

        // ============================================================
        //  DATA LOADING
        // ============================================================
        let championsData = null;

        async function loadChampionsLeague() {
            try {
                const snap = await db.ref('champions_league').once('value');
                championsData = snap.val();
                if (!championsData) {
                    document.querySelector('#groups-container').innerHTML = `
                        <div class="glass-card p-8 col-span-2 text-center">
                            <p class="text-white/70 text-xl">🏆 No Champions League data found.</p>
                            <p class="text-white/40 mt-2">The tournament hasn't been created yet.</p>
                            ${isAdmin ? `<button onclick="window.location.href='admin.html'" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition">Create Champions League →</button>` : ''}
                        </div>
                    `;
                    return;
                }
                renderGroups();
                renderFixtures();
                renderKnockout();
                renderStats();
            } catch (error) {
                console.error(error);
                document.querySelector('#groups-container').innerHTML = `
                    <div class="glass-card p-8 col-span-2 text-center text-red-400">
                        Error loading data: ${error.message}
                    </div>
                `;
            }
        }

function renderGroups() {
    ['A', 'B'].forEach(letter => {
        const container = document.getElementById(`group-${letter}`);
        const groupData = championsData.groups?.[letter];
        if (!groupData || groupData.length === 0) {
            container.innerHTML = '<p class="text-white/30 text-sm">No teams</p>';
            return;
        }
        const sorted = [...groupData].sort((a, b) => {
            if (b.pts_cl !== a.pts_cl) return b.pts_cl - a.pts_cl;
            if (b.gd_cl !== a.gd_cl) return b.gd_cl - a.gd_cl;
            return b.gf_cl - a.gf_cl;
        });
        let html = `<table class="w-full text-sm group-table">
            <thead><tr><th class="text-left">Team</th><th class="text-center">P</th><th class="text-center">W</th><th class="text-center">D</th><th class="text-center">L</th><th class="text-center">GF</th><th class="text-center">GA</th><th class="text-center">GD</th><th class="text-center font-bold">Pts</th></tr></thead><tbody>`;
        sorted.forEach((team, i) => {
            const gd = team.gd_cl || 0;
            const gdClass = gd > 0 ? 'text-green-400' : (gd < 0 ? 'text-red-400' : 'text-white/30');
            html += `<tr>
                <td class="flex items-center gap-2">
                    <span class="text-white/30 w-5">${i+1}</span>
                    ${team.name}
                </td>
                <td class="text-center">${team.mp || 0}</td>
                <td class="text-center">${team.w || 0}</td>
                <td class="text-center">${team.d || 0}</td>
                <td class="text-center">${team.l || 0}</td>
                <td class="text-center">${team.gf_cl || 0}</td>
                <td class="text-center">${team.ga_cl || 0}</td>
                <td class="text-center ${gdClass}">${gd > 0 ? '+' : ''}${gd}</td>
                <td class="text-center font-bold text-indigo-400">${team.pts_cl || 0}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    });
}

        // ============================================================
        //  RENDER FIXTURES
        // ============================================================
        function renderFixtures() {
            const container = document.getElementById('fixtures-container');
            if (!championsData || !championsData.fixtures) {
                container.innerHTML = '<p class="text-white/50">No fixtures available.</p>';
                return;
            }
            let html = '';
            ['A', 'B'].forEach(letter => {
                const fixtures = championsData.fixtures[letter];
                if (!fixtures || fixtures.length === 0) return;
                html += `<div class="mb-6"><h4 class="text-white/60 text-sm font-bold mb-2">Group ${letter}</h4>`;
                const byRound = {};
                fixtures.forEach(f => {
                    if (!byRound[f.round]) byRound[f.round] = [];
                    byRound[f.round].push(f);
                });
                const rounds = Object.keys(byRound).sort((a,b) => Number(a)-Number(b));
                rounds.forEach(round => {
                    html += `<div class="mb-3"><p class="text-white/30 text-xs font-semibold mb-1">Matchday ${round}</p>`;
                    byRound[round].forEach((f, idx) => {
                        const hasReport = f.played && f.report;
                        html += `
                            <div class="fixture-card">
                                <div class="teams">
                                    <span>${f.home}</span>
                                    <span class="text-white/20">vs</span>
                                    <span>${f.away}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    ${f.played ? `
                                        <span class="score">${f.homeScore} – ${f.awayScore}</span>
                                        <button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openMatchReport('${letter}', ${round}, ${idx})">
                                            ${hasReport ? '📋 Report' : '📝 Add'}
                                        </button>
                                    ` : `
                                        <span class="score unplayed">– : –</span>
                                    `}
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                });
                html += `</div>`;
            });
            container.innerHTML = html || '<p class="text-white/50">No fixtures scheduled.</p>';
        }

        // ============================================================
        //  RENDER KNOCKOUT
        // ============================================================
        function renderKnockout() {
            const container = document.getElementById('knockout-container');
            if (!championsData || !championsData.knockout) {
                container.innerHTML = '<p class="text-white/50">Knockout stage not yet generated.</p>';
                return;
            }
            const ko = championsData.knockout;
            const quarters = ko.quarterFinals || [];
            const semis = ko.semiFixtures || [];
            const final = ko.finalFixture;
            let html = '<div class="bracket">';

            // Quarter-finals
            if (quarters.length) {
                html += `<div class="bracket-round">
                    <div class="bracket-round-title">⚔️ Quarter-Finals</div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                quarters.forEach((f, i) => {
                    const hasReport = f.played && f.report;
                    html += `
                        <div class="bracket-match">
                            <div class="teams">
                                <span>${f.home}</span>
                                <span class="vs">vs</span>
                                <span>${f.away}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                ${f.played ? `
                                    <span class="score">${f.homeScore} – ${f.awayScore}</span>
                                    <button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openKnockoutReport('quarter', ${i})">
                                        ${hasReport ? '📋' : '📝'}
                                    </button>
                                ` : `<span class="text-white/30 text-sm">⏳</span>`}
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                html += `<div class="bracket-connector">⬇️</div>`;
            }

            // Semi-finals
            if (semis.length) {
                html += `<div class="bracket-round">
                    <div class="bracket-round-title">⚔️ Semi-Finals (Two Legs)</div>`;
                const ties = {};
                semis.forEach(f => {
                    if (!ties[f.tieId]) ties[f.tieId] = [];
                    ties[f.tieId].push(f);
                });
                for (const tieId in ties) {
                    const legs = ties[tieId].sort((a,b) => a.leg - b.leg);
                    const leg1 = legs.find(l => l.leg === 1);
                    const leg2 = legs.find(l => l.leg === 2);
                    if (!leg1 || !leg2) continue;
                    let agg = '', winner = '';
                    if (leg1.played && leg2.played) {
                        const aggHome = (leg1.homeScore || 0) + (leg2.awayScore || 0);
                        const aggAway = (leg1.awayScore || 0) + (leg2.homeScore || 0);
                        agg = `Agg: ${aggHome}–${aggAway}`;
                        winner = aggHome > aggAway ? leg1.home : (aggAway > aggHome ? leg1.away : 'Penalties');
                    }
                    html += `
                        <div class="glass-card p-3 mb-3">
                            <div class="text-white/40 text-xs font-semibold mb-2">Tie ${tieId}</div>
                            <div class="space-y-2">
                                <div class="bracket-match" style="border-left-color: #667eea;">
                                    <span class="text-sm">Leg 1: ${leg1.home} vs ${leg1.away}</span>
                                    ${leg1.played ? `<span class="score">${leg1.homeScore}–${leg1.awayScore} ${leg1.report ? `<button class="report-btn has-report" onclick="openKnockoutReport('semi', ${semis.indexOf(leg1)})">📋</button>` : ''}</span>` : `<span class="text-white/30 text-sm">⏳</span>`}
                                </div>
                                <div class="bracket-match" style="border-left-color: #764ba2;">
                                    <span class="text-sm">Leg 2: ${leg2.home} vs ${leg2.away}</span>
                                    ${leg2.played ? `<span class="score">${leg2.homeScore}–${leg2.awayScore} ${leg2.report ? `<button class="report-btn has-report" onclick="openKnockoutReport('semi', ${semis.indexOf(leg2)})">📋</button>` : ''}</span>` : `<span class="text-white/30 text-sm">⏳</span>`}
                                </div>
                                ${winner ? `<div class="text-green-400 text-sm font-semibold">🏆 Winner: ${winner}</div>` : ''}
                                ${agg ? `<div class="text-white/30 text-xs">${agg}</div>` : ''}
                            </div>
                        </div>
                    `;
                }
                html += `</div>`;
                html += `<div class="bracket-connector">⬇️</div>`;
            }

            // Final
            if (final) {
                const hasReport = final.played && final.report;
                html += `<div class="bracket-round">
                    <div class="bracket-round-title">🏆 Final</div>
                    <div class="bracket-match" style="border-left-color: #fbbf24; border-left-width: 4px; background: rgba(255,215,0,0.05);">
                        <div class="teams">
                            <span class="font-bold">${final.home || '?'}</span>
                            <span class="vs">vs</span>
                            <span class="font-bold">${final.away || '?'}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${final.played ? `
                                <span class="score text-yellow-400">${final.homeScore} – ${final.awayScore}</span>
                                <button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openKnockoutReport('final', 0)">
                                    ${hasReport ? '📋' : '📝'}
                                </button>
                            ` : `<span class="text-white/30 text-sm">⏳</span>`}
                        </div>
                    </div>
                    ${ko.champion ? `<div class="text-center text-2xl font-bold text-yellow-400 mt-4">🏆 Champion: ${ko.champion}</div>` : ''}
                </div>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        // ============================================================
        //  RENDER STATS (placeholder)
        // ============================================================
        function renderStats() {
            const container = document.getElementById('stats-container');
            // Could compute top scorers from reports, but for now a placeholder
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="stat-card">
                        <div class="number">—</div>
                        <div class="label">Top Scorer</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">—</div>
                        <div class="label">Most Assists</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">—</div>
                        <div class="label">Clean Sheets</div>
                    </div>
                </div>
                <p class="text-white/30 text-sm text-center mt-6">Stats will appear after matches are played.</p>
            `;
        }

        // ============================================================
        //  MATCH REPORT FUNCTIONS
        // ============================================================
        async function openMatchReport(group, round, matchIndex) {
            const data = championsData;
            if (!data) return;
            const matches = data.fixtures?.[group]?.filter(f => f.round == round);
            if (!matches || matchIndex >= matches.length) return;
            const match = matches[matchIndex];
            if (!match || !match.played) return;
            showReportModal(match, `Group ${group} • Matchday ${round}`);
        }

        async function openKnockoutReport(type, index) {
            const data = championsData;
            if (!data || !data.knockout) return;
            const ko = data.knockout;
            let match, title = '';
            if (type === 'quarter') {
                match = ko.quarterFinals?.[index];
                title = 'Quarter-final';
            } else if (type === 'semi') {
                match = ko.semiFixtures?.[index];
                title = 'Semi-final';
            } else if (type === 'final') {
                match = ko.finalFixture;
                title = 'Final';
            }
            if (!match || !match.played) return;
            showReportModal(match, title);
        }

        function showReportModal(match, title) {
            const modal = document.getElementById('reportModal');
            const content = document.getElementById('reportContent');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            const report = match.report || {};
            const fullComment = report.fullComment || report.comment || report.summary || 'No match report available.';

            let goalsHtml = '';
            if (report.goals && report.goals.length > 0) {
                goalsHtml = report.goals.map(g => `
                    <div class="report-goal">
                        <span class="minute">${g.minute}'</span>
                        <span class="text-white">${g.scorer}</span>
                        ${g.assist ? `<span class="text-white/30 text-sm">(assist: ${g.assist})</span>` : ''}
                        <span class="text-white/40 text-sm">${g.team === 'home' ? match.home : match.away}</span>
                    </div>
                `).join('');
            } else {
                goalsHtml = '<span class="text-white/30">No goals recorded</span>';
            }

            let cardsHtml = '';
            if (report.cards && report.cards.length > 0) {
                cardsHtml = report.cards.map(c => `
                    <span class="report-card ${c.type}">${c.type.toUpperCase()}</span>
                    <span class="text-white/60">${c.player} (${c.team === 'home' ? match.home : match.away})</span><br>
                `).join('');
            } else {
                cardsHtml = '<span class="text-white/30">No cards</span>';
            }

            content.innerHTML = `
                <div class="border-b border-white/10 pb-3 mb-4">
                    <div class="flex justify-between items-start flex-wrap gap-3">
                        <div>
                            <div class="text-xl font-bold">${match.home} vs ${match.away}</div>
                            <div class="text-white/40 text-sm">${title} • ${match.homeScore > match.awayScore ? match.home+' won' : match.awayScore > match.homeScore ? match.away+' won' : 'Draw'}</div>
                        </div>
                        <div class="text-3xl font-bold text-indigo-400">${match.homeScore} – ${match.awayScore}</div>
                    </div>
                </div>

                <div class="bg-white/5 rounded-xl p-3 mb-4">
                    <div class="text-white/40 text-xs uppercase tracking-wider">📝 Match Report</div>
                    <div class="text-white/90 text-sm whitespace-pre-wrap leading-relaxed mt-1 max-h-48 overflow-y-auto">${fullComment}</div>
                </div>

                <div class="mb-3">
                    <div class="text-white/40 text-xs uppercase tracking-wider">⚽ Goals</div>
                    <div class="mt-1">${goalsHtml}</div>
                </div>

                <div>
                    <div class="text-white/40 text-xs uppercase tracking-wider">🟨 Cards</div>
                    <div class="mt-1">${cardsHtml}</div>
                </div>

                <button onclick="closeReportModal()" class="mt-5 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-xl font-bold transition">Close</button>
            `;
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('reportModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeReportModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeReportModal();
        });

        // ============================================================
        //  INIT
        // ============================================================
        loadChampionsLeague();
        setInterval(loadChampionsLeague, 30000);
    </script>
</body>
</html>
