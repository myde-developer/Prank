<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champions League</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
/* ============================================================
   CHAMPIONS LEAGUE – UEFA BRACKET STYLE
   ============================================================ */

/* ── Reset & Base ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f7fa;
    color: #1a2a44;
    padding: 1.5rem;
}
.ucl-container { max-width: 1400px; margin: 0 auto; }
.hidden { display: none !important; }

/* ── Header ── */
.ucl-header {
    background: #fff; border-radius: 24px; padding: 1.2rem 2rem; margin-bottom: 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
}
.ucl-header-left { display: flex; align-items: center; gap: 1rem; }
.ucl-trophy { font-size: 2.8rem; }
.ucl-header h1 { font-size: 1.8rem; font-weight: 800; color: #0b1e3a; }
.ucl-subtitle { font-size: 0.85rem; color: #4a5a72; }
.ucl-header-right { display: flex; gap: 0.6rem; }
.btn-back { background: #eef1f5; border: none; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; color: #1a2a44; cursor: pointer; transition: 0.2s; }
.btn-back:hover { background: #dde1e8; }
.btn-admin { background: #0b1e3a; border: none; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; color: #fff; cursor: pointer; transition: 0.2s; }
.btn-admin:hover { background: #1d3557; }

/* ── Tabs ── */
.ucl-tabs {
    display: flex; gap: 0.3rem; margin-bottom: 1.5rem;
    border-bottom: 2px solid #e5e9f0; padding-bottom: 0.3rem;
}
.ucl-tab {
    padding: 0.6rem 1.8rem; border: none; border-radius: 40px; background: transparent;
    font-weight: 600; font-size: 0.9rem; color: #6b7a8f; cursor: pointer; transition: 0.3s;
}
.ucl-tab:hover { color: #1a2a44; background: #f0f3f8; }
.ucl-tab.active { color: #1d4ed8; background: #e8edf9; }
.ucl-tab-content { display: none; animation: fadeUp 0.35s; }
.ucl-tab-content.active { display: block; }
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ── Bracket Wrap ── */
.bracket-wrap {
    background: #fff; border-radius: 24px; padding: 1.5rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04); border: 1px solid #e5e9f0;
    overflow-x: auto; position: relative;
}

/* ── Bracket Grid ── */
.bracket-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    grid-template-rows: repeat(16, minmax(32px, 1fr));
    gap: 0;
    position: relative;
    min-height: 700px;
    min-width: 700px;
}

/* ── SVG Lines ── */
.bracket-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}
.bracket-svg line,
.bracket-svg polyline {
    stroke: #c5cdd8;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
}
.bracket-svg .glow {
    stroke: #1d4ed8;
    stroke-width: 4;
    opacity: 0;
    transition: opacity 0.6s ease;
}
.bracket-svg .glow.active {
    opacity: 0.6;
}

/* ============================================================
   BRACKET MATCH CARD – CLEARER TEAM NAMES
   ============================================================ */
.bracket-match {
    background: #ffffff;
    border-radius: 10px;
    border: 1px solid #e5e9f0;
    padding: 0.5rem 0.7rem;                /* increased padding */
    margin: 0.2rem 0.4rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    font-size: 0.8rem;                     /* increased base font size */
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    z-index: 2;
    cursor: pointer;
    min-height: 48px;                      /* taller for visibility */
    overflow: hidden;
}
.bracket-match:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 20px rgba(29,78,216,0.15);
    border-color: #1d4ed8;
    z-index: 5;
}
.bracket-match .teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.3rem;
}
.bracket-match .teams .team {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-weight: 600;                    /* bolder */
    font-size: 0.85rem;                  /* larger */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 65px;                     /* increased width */
    color: #0b1e3a;                      /* darker */
}
.bracket-match .teams .team .logo {
    font-size: 1.1rem;
    flex-shrink: 0;
}
.bracket-match .teams .vs {
    color: #94a3b8;
    font-size: 0.6rem;
    font-weight: 400;
    flex-shrink: 0;
}
.bracket-match .score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.1rem;
    font-size: 0.7rem;
}
.bracket-match .score-row .score {
    font-weight: 700;
    color: #1d4ed8;
    font-size: 0.85rem;                  /* larger score */
}
.bracket-match .score-row .agg {
    font-weight: 400;
    color: #6b7a8f;
    font-size: 0.6rem;
}
.bracket-match .score-row .status {
    font-size: 0.55rem;
    font-weight: 600;
    padding: 0.05rem 0.4rem;
    border-radius: 12px;
    background: #eef1f5;
    color: #4a5a72;
}
.bracket-match .score-row .status.ft { background: #dcfce7; color: #16a34a; }
.bracket-match .score-row .status.aet { background: #fef3c7; color: #d97706; }
.bracket-match .score-row .status.pen { background: #fee2e2; color: #dc2626; }

/* ── Final Match – even larger ── */
.bracket-match.final-match {
    grid-row: 5 / 13;
    grid-column: 4;
    border: 2px solid #fbbf24;
    background: #fffbeb;
    border-radius: 16px;
    padding: 1rem 1.2rem;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
.bracket-match.final-match .teams .team {
    font-size: 1rem;
    max-width: 90px;
}
.bracket-match.final-match .score-row .score {
    font-size: 1.2rem;
    color: #f59e0b;
}
.bracket-match.final-match .final-badge {
    font-size: 0.7rem;
    font-weight: 700;
    color: #f59e0b;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.bracket-match.final-match .champion-display .trophy {
    font-size: 2.2rem;
}
.bracket-match.final-match .champion-display .name {
    font-size: 1.2rem;
    font-weight: 800;
    color: #f59e0b;
}

/* ── League Table / Fixtures (preserved) ── */
.table-card, .fixtures-card {
    background: #fff; border-radius: 24px; padding: 1.5rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04); border: 1px solid #e5e9f0;
}
.league-table-wrap { overflow-x: auto; }
.league-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
.league-table th {
    text-align: left; padding: 0.7rem 0.4rem; color: #4a5a72; font-weight: 600;
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid #e5e9f0;
}
.league-table td { padding: 0.6rem 0.4rem; border-bottom: 1px solid #f0f2f6; color: #1a2a44; }
.league-table tr:hover td { background: #f8f9fc; }
.league-table .pos { font-weight: 700; min-width: 32px; text-align: center; }
.league-table .club { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
.league-table .club .emblem { font-size: 1.2rem; }
.league-table .stat { text-align: center; }
.league-table .gd-pos { color: #16a34a; font-weight: 600; }
.league-table .gd-neg { color: #dc2626; font-weight: 600; }
.league-table .pts { font-weight: 800; color: #1d4ed8; text-align: center; }
.badge-q { background: #dcfce7; color: #16a34a; padding: 0.05rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }
.badge-e { background: #fee2e2; color: #dc2626; padding: 0.05rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }

.archive-section { margin-top: 2rem; border-top: 2px dashed #e5e9f0; padding-top: 1.5rem; }
.archive-toggle { background: none; border: none; font-weight: 600; color: #1d4ed8; cursor: pointer; font-size: 0.9rem; }
.archive-toggle:hover { text-decoration: underline; }
.archive-content { margin-top: 1rem; background: #f8f9fc; border-radius: 16px; padding: 1.2rem; border: 1px solid #e5e9f0; }
.archive-content.hidden { display: none; }
.archive-note { color: #6b7a8f; font-size: 0.85rem; margin-bottom: 0.8rem; }

/* ── UCL Fixture Tabs ── */
.fixture-tabs-wrapper {
    overflow-x: auto; padding-bottom: 0.5rem; margin-bottom: 1rem;
    -webkit-overflow-scrolling: touch;
}
.fixture-tabs-wrapper::-webkit-scrollbar { height: 4px; }
.fixture-tabs-wrapper::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 10px; }
.fixture-tabs {
    display: flex; gap: 0.5rem; min-width: max-content;
}
.fixture-tab {
    padding: 0.4rem 1.2rem; border: none; border-radius: 30px;
    background: #f0f3f8; color: #6b7a8f; font-weight: 600; font-size: 0.8rem;
    cursor: pointer; transition: 0.3s; white-space: nowrap;
}
.fixture-tab:hover { background: #e5e9f0; color: #1a2a44; }
.fixture-tab.active { background: #1d4ed8; color: #fff; }

.fixtures-controls {
    display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem; flex-wrap: wrap;
}
.fixtures-controls label { font-weight: 600; color: #4a5a72; font-size: 0.85rem; }
.fixtures-controls select {
    padding: 0.4rem 1rem; border-radius: 30px; border: 1px solid #d1d8e0;
    background: #fff; font-weight: 500; outline: none;
}
.fixture-item {
    display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1rem;
    background: #f8f9fc; border-radius: 14px; margin-bottom: 0.5rem; transition: 0.2s; gap: 0.5rem; flex-wrap: wrap;
}

#uclFixturesContainer {
    max-width: 900px;
    margin: 0 auto;
}
.fixture-item {
    max-width: 700px;
    margin: 0 auto 0.5rem auto;
}
.fixture-item:hover { background: #f0f3f8; }
.fixture-item .teams { display: flex; align-items: center; gap: 0.5rem; font-weight: 500; font-size: 0.9rem; }
.fixture-item .teams .vs { color: #94a3b8; font-size: 0.7rem; }
.fixture-item .right { display: flex; align-items: center; gap: 0.6rem; }
.fixture-item .score { font-weight: 700; font-size: 0.95rem; color: #1a2a44; min-width: 44px; text-align: center; }
.fixture-item .score.unplayed { color: #94a3b8; font-weight: 400; }
.report-btn {
    background: transparent; border: 1.5px solid #d1d8e0; border-radius: 30px; padding: 0.1rem 0.7rem;
    color: #6b7a8f; cursor: pointer; font-size: 0.6rem; font-weight: 600; transition: 0.25s;
}
.report-btn:hover { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
.report-btn.has-report { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
.report-btn.has-report:hover { background: #1a3db8; }

/* ── Detail Modal ── */
.modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px); z-index: 1000; justify-content: center; align-items: center; padding: 1.5rem;
}
.modal-overlay.active { display: flex; }
.modal-box {
    background: #fff; border-radius: 24px; max-width: 620px; width: 100%;
    max-height: 90vh; overflow-y: auto; padding: 2rem;
    box-shadow: 0 24px 80px rgba(0,0,0,0.12); animation: modalIn 0.3s ease;
}
@keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-close {
    float: right; background: none; border: none; color: #6b7a8f; font-size: 1.8rem; cursor: pointer;
}
.modal-close:hover { color: #1a2a44; }
.modal-box .detail-header {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
    border-bottom: 2px solid #e5e9f0; padding-bottom: 1rem; margin-bottom: 1rem;
}
.modal-box .detail-header .tie-title { font-size: 1.2rem; font-weight: 700; color: #0b1e3a; }
.modal-box .detail-header .tie-agg { font-size: 1.1rem; font-weight: 800; color: #1d4ed8; }
.modal-box .detail-leg {
    background: #f8f9fc; border-radius: 12px; padding: 0.8rem 1rem; margin-bottom: 0.6rem;
    display: flex; justify-content: space-between; align-items: center;
}
.modal-box .detail-leg .leg-label { font-weight: 600; color: #4a5a72; font-size: 0.8rem; }
.modal-box .detail-leg .leg-score { font-weight: 700; font-size: 1rem; color: #1a2a44; }
.modal-box .detail-leg .leg-info { color: #6b7a8f; font-size: 0.8rem; }
.modal-box .detail-extra {
    margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e9f0;
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
}
.modal-box .detail-extra .extra-item { font-size: 0.85rem; }
.modal-box .detail-extra .extra-item .label { color: #6b7a8f; font-size: 0.7rem; }
.modal-box .detail-extra .extra-item .value { font-weight: 600; }
.modal-box .detail-btn {
    margin-top: 1rem; padding: 0.6rem; background: #1d4ed8; color: #fff;
    border: none; border-radius: 12px; font-weight: 600; width: 100%; cursor: pointer;
}
.modal-box .detail-btn:hover { background: #1a3db8; }
.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 10px; }

.loading-text { color: #6b7a8f; font-style: italic; padding: 2rem 0; text-align: center; }

/* ── Responsive ── */
@media (max-width: 1024px) {
    .bracket-grid { min-width: 900px; }
    .bracket-match .teams .team { max-width: 45px; font-size: 0.65rem; }
}
@media (max-width: 768px) {
    body { padding: 1rem; }
    .ucl-header { padding: 1rem; flex-direction: column; align-items: stretch; gap: 0.5rem; }
    .ucl-header-right { justify-content: flex-end; }
    .ucl-tab { padding: 0.4rem 1rem; font-size: 0.8rem; }
    .bracket-wrap { padding: 0.8rem; }
    .bracket-grid { min-width: 750px; min-height: 550px; }
    .bracket-match { padding: 0.2rem 0.3rem; min-height: 28px; font-size: 0.6rem; }
    .bracket-match .teams .team { max-width: 35px; font-size: 0.55rem; }
    .bracket-match .teams .team .logo { font-size: 0.7rem; }
    .bracket-match .score-row { font-size: 0.55rem; }
    .bracket-match.final-match { padding: 0.5rem; min-height: 50px; }
    .bracket-match.final-match .teams .team { font-size: 0.7rem; max-width: 60px; }
}
@media (max-width: 480px) {
    .ucl-header h1 { font-size: 1.2rem; }
    .ucl-trophy { font-size: 2rem; }
    .bracket-grid { min-width: 600px; min-height: 450px; }
    .bracket-match .teams .team { max-width: 28px; font-size: 0.5rem; }
    .bracket-match .teams .team .logo { font-size: 0.6rem; }
    .bracket-match .score-row { font-size: 0.5rem; }
}
    </style>
</head>
<body>

    <div class="ucl-container">

        <!-- ===== HEADER ===== -->
        <header class="ucl-header">
            <div class="ucl-header-left">
                <span class="ucl-trophy">🏆</span>
                <div>
                    <h1>Champions League</h1>
                    <p class="ucl-subtitle" id="phaseSubtitle">2025/26 • Knockout Stage</p>
                </div>
            </div>
            <div class="ucl-header-right">
                <button onclick="window.location.href='index.html'" class="btn-back">⬅ Back</button>
                <button id="adminBtn" class="btn-admin hidden" onclick="window.location.href='admin.html'">⚙️ Admin</button>
            </div>
        </header>

        <!-- ===== TABS ===== -->
        <nav class="ucl-tabs" id="uclTabs">
            <button class="ucl-tab" data-tab="table">📊 League Table</button>
            <button class="ucl-tab" data-tab="fixtures">📅 Fixtures</button>
<button class="ucl-tab" data-tab="bracket" id="bracketTab">🏆 Bracket</button>
        </nav>

        <!-- ===== BRACKET TAB ===== -->
        <div id="tab-bracket" class="ucl-tab-content active">
            <div id="bracketContainer" class="bracket-wrap">
                <!-- Bracket rendered by JS -->
                <div class="loading-text">Loading bracket...</div>
            </div>
        </div>

        <!-- ===== LEAGUE TABLE TAB ===== -->
        <div id="tab-table" class="ucl-tab-content">
            <div class="table-card">
                <div id="leagueTableContainer"><p class="loading-text">Loading league table...</p></div>
                <div id="archiveContainer" class="archive-section hidden">
                    <button class="archive-toggle" onclick="toggleArchive()">📂 League Phase Archive</button>
                    <div id="archiveContent" class="archive-content hidden">
                        <p class="archive-note">Final standings after all matches.</p>
                        <div id="archiveTable"></div>
                    </div>
                </div>
            </div>
        </div>

<!-- ===== TAB: FIXTURES ===== -->
<div id="tab-fixtures" class="ucl-tab-content">
    <div class="fixtures-card">
        <div class="fixture-tabs-wrapper" id="uclFixtureTabs"></div>
        <div id="uclFixturesContainer"></div>
    </div>
</div>

    </div>

    <!-- ===== MATCH DETAIL MODAL ===== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeDetailModal()">✕</button>
            <div id="detailContent">
                <p class="loading-text">Loading match details...</p>
            </div>
        </div>
    </div>

    <!-- ===== CONFETTI CANVAS ===== -->
    <canvas id="confettiCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none;"></canvas>

    <script>
// ============================================================
//  FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBmy0tmvaYcw9KsQQRH7RLKcXC8EN6WFqY",
    authDomain: "dls-premier-league.firebaseapp.com",
    projectId: "dls-premier-league",
    storageBucket: "dls-premier-league.firebasestorage.app",
    messagingSenderId: "975087030284",
    appId: "1:975087030284:web:7708718fffd9180c009e29"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============================================================
//  GLOBALS
// ============================================================
let uclData = null;
let currentTab = 'bracket';
const isAdmin = sessionStorage.getItem('championsAdmin') === 'true';
if (isAdmin) document.getElementById('adminBtn').classList.remove('hidden');

// ============================================================
//  TABS
// ============================================================
document.querySelectorAll('.ucl-tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.ucl-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        document.querySelectorAll('.ucl-tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${currentTab}`).classList.add('active');
        if (currentTab === 'fixtures') renderFixtures();
        if (currentTab === 'bracket') renderBracket();
        if (currentTab === 'table') renderLeagueTable();
    });
});

// ============================================================
//  MAIN LOADER
// ============================================================
async function loadChampionsLeague() {
    try {
        const snap = await db.ref('champions_league').once('value');
        uclData = snap.val();
        if (!uclData) {
            document.querySelector('.bracket-wrap').innerHTML = `
                <div style="text-align:center; padding:3rem;">
                    <p style="font-size:2rem;">🏆</p>
                    <p style="color:#6b7a8f; font-size:1.1rem;">No Champions League data found.</p>
                    <p style="color:#94a3b8; font-size:0.9rem;">The tournament hasn't been created yet.</p>
                    ${isAdmin ? `<button onclick="window.location.href='admin.html'" style="margin-top:1rem; background:#1d4ed8; color:#fff; border:none; padding:0.6rem 2rem; border-radius:30px; font-weight:600; cursor:pointer;">Create Champions League →</button>` : ''}
                </div>
            `;
            return;
        }
        renderLeagueTable();
        renderFixtures();
        updateBracketVisibility();
        renderBracket();
        checkPhaseCompletion();
        // Auto-update every 15 seconds
        setInterval(() => {
            db.ref('champions_league').once('value').then(snap => {
                uclData = snap.val();
                if (uclData && currentTab === 'bracket') renderBracket();
            });
        }, 15000);
    } catch (err) {
        console.error(err);
        document.querySelector('.bracket-wrap').innerHTML =
            `<div style="color:#dc2626; text-align:center; padding:2rem;">Error: ${err.message}</div>`;
    }
}

// ============================================================
//  RENDER BRACKET (UEFA Style with SVG Lines)
// ============================================================
function renderBracket() {
    const container = document.getElementById('bracketContainer');
    const ko = uclData?.knockout || {};
    const champion = ko.champion || null;

    // ---- Helper: group by tieId ----
    function groupByTie(matches) {
        const map = {};
        (matches || []).forEach(m => {
            const id = m.tieId || 0;
            if (!map[id]) map[id] = [];
            map[id].push(m);
        });
        return map;
    }

    // ---- Compute tie result ----
    function computeTieResult(legs) {
        if (!legs || legs.length === 0) return null;
        const leg1 = legs.find(l => l.leg === 1);
        const leg2 = legs.find(l => l.leg === 2);
        if (!leg1 || !leg2) return null;
        if (!leg1.played || !leg2.played) return { played: false, leg1, leg2 };
        const aggHome = (leg1.homeScore || 0) + (leg2.awayScore || 0);
        const aggAway = (leg1.awayScore || 0) + (leg2.homeScore || 0);
        let winner = null, winnerName = '';
        let status = 'FT';
        if (aggHome > aggAway) { winner = leg1.home; winnerName = leg1.home; }
        else if (aggAway > aggHome) { winner = leg1.away; winnerName = leg1.away; }
        else { winner = 'Penalties'; winnerName = 'Penalties'; status = 'PEN'; }
        return { played: true, aggHome, aggAway, winner, winnerName, leg1, leg2, status };
    }

    // ---- Build round data ----
    function buildRoundData(matches) {
        const ties = groupByTie(matches);
        const result = [];
        for (const id in ties) {
            const legs = ties[id];
            const res = computeTieResult(legs);
            result.push({
                id: parseInt(id),
                leg1: legs.find(l => l.leg === 1),
                leg2: legs.find(l => l.leg === 2),
                result: res
            });
        }
        return result;
    }

    const r16Data = buildRoundData(ko.roundOf16 || []);
    const qfData = buildRoundData(ko.quarterFinals || []);
    const sfData = buildRoundData(ko.semiFinals || []);
    const finalMatch = ko.final || null;
    const finalResult = finalMatch?.played ? {
        played: true,
        aggHome: finalMatch.homeScore,
        aggAway: finalMatch.awayScore,
        winner: finalMatch.homeScore > finalMatch.awayScore ? finalMatch.home :
                finalMatch.awayScore > finalMatch.homeScore ? finalMatch.away : 'Draw',
        winnerName: finalMatch.homeScore > finalMatch.awayScore ? finalMatch.home :
                finalMatch.awayScore > finalMatch.homeScore ? finalMatch.away : 'Draw',
        status: finalMatch.homeScore === finalMatch.awayScore ? 'PEN' : 'FT',
        leg1: finalMatch,
        leg2: null
    } : null;

    // ---- Build bracket grid ----
    // R16: 8 matches, rows 1-2, 3-4, ... 15-16
    // QF: 4 matches, rows 1-4, 5-8, 9-12, 13-16
    // SF: 2 matches, rows 1-8, 9-16
    // Final: rows 1-16

    const r16Rows = [1, 3, 5, 7, 9, 11, 13, 15];
    const qfRows = [1, 5, 9, 13];
    const sfRows = [1, 9];

    // ---- Helper: build match card HTML ----
    function matchCardHTML(data, roundName, index, isFinal = false) {
        const res = data?.result;
        const leg1 = data?.leg1;
        const leg2 = data?.leg2;
        const home = leg1?.home || '?';
        const away = leg1?.away || '?';
        const homeLogo = '';
        const awayLogo = '';
        const played = res?.played || false;

        let scoreDisplay = '– : –';
        let aggDisplay = '';
        let statusText = '';
        let winnerTag = '';

        if (played && leg1 && leg2) {
            // Two legs
            const s1 = `${leg1.homeScore}–${leg1.awayScore}`;
            const s2 = `${leg2.homeScore}–${leg2.awayScore}`;
            scoreDisplay = `${s1} / ${s2}`;
            aggDisplay = `Agg: ${res.aggHome}–${res.aggAway}`;
            statusText = res.status || 'FT';
            if (res.winnerName && res.winnerName !== 'Draw' && res.winnerName !== 'Penalties') {
                winnerTag = `<span class="winner-tag">⬆</span>`;
            }
        } else if (played && leg1 && !leg2) {
            // Single leg (Final)
            const s1 = `${leg1.homeScore}–${leg1.awayScore}`;
            scoreDisplay = s1;
            statusText = res.status || 'FT';
            if (res.winnerName && res.winnerName !== 'Draw' && res.winnerName !== 'Penalties') {
                winnerTag = `<span class="winner-tag">⬆</span>`;
            }
        }

        const statusClass = statusText.toLowerCase();

        // Check if this is the champion
        const isChampion = isFinal && champion && played &&
            ((leg1.home === champion) || (leg1.away === champion));

        let finalExtra = '';
        if (isFinal && champion && played) {
            finalExtra = `
                <div class="champion-display">
                    <span class="trophy">🏆</span>
                    <span class="name">${champion}</span>
                </div>
            `;
        }

        return `
            <div class="bracket-match ${isFinal ? 'final-match' : ''} ${!played ? 'placeholder' : ''}"
                 data-round="${roundName}" data-index="${index}" data-tieid="${data?.id || 0}"
                 onclick="openMatchDetail('${roundName}', ${data?.id || 0})">
                <div class="teams">
                    <span class="team"><span class="logo">${homeLogo}</span> ${home}</span>
                    <span class="vs">vs</span>
                    <span class="team"><span class="logo">${awayLogo}</span> ${away}</span>
                </div>
                <div class="score-row">
                    <span class="score">${scoreDisplay}</span>
                    ${aggDisplay ? `<span class="agg">${aggDisplay}</span>` : ''}
                    ${statusText ? `<span class="status ${statusClass}">${statusText}</span>` : ''}
                    ${winnerTag}
                </div>
                ${finalExtra}
                ${isFinal && !played ? `<div style="font-size:0.6rem;color:#94a3b8;margin-top:0.2rem;">🏆 Final</div>` : ''}
            </div>
        `;
    }

    // ---- Build the grid ----
    let gridHtml = `<div class="bracket-grid" id="bracketGrid">`;

    // R16 - Column 1
    r16Data.forEach((data, i) => {
        gridHtml += `<div style="grid-row: ${r16Rows[i]} / span 2; grid-column: 1; display:flex; align-items:center;">
            ${matchCardHTML(data, 'Round of 16', i)}
        </div>`;
    });

    // QF - Column 2
    qfData.forEach((data, i) => {
        gridHtml += `<div style="grid-row: ${qfRows[i]} / span 4; grid-column: 2; display:flex; align-items:center;">
            ${matchCardHTML(data, 'Quarter-finals', i)}
        </div>`;
    });

    // SF - Column 3
    sfData.forEach((data, i) => {
        gridHtml += `<div style="grid-row: ${sfRows[i]} / span 8; grid-column: 3; display:flex; align-items:center;">
            ${matchCardHTML(data, 'Semi-finals', i)}
        </div>`;
    });

    // Final - Column 4
    const finalData = finalMatch ? { leg1: finalMatch, leg2: null, result: finalResult, id: 0 } : null;
    gridHtml += `<div style="grid-row: 1 / span 16; grid-column: 4; display:flex; align-items:center; justify-content:center;">
        ${finalData ? matchCardHTML(finalData, 'Final', 0, true) : `<div class="bracket-match placeholder" style="grid-row:1/span16;grid-column:4;height:100%;min-height:80px;display:flex;align-items:center;justify-content:center;">Final TBD</div>`}
    </div>`;

    gridHtml += `</div>`;

    // ---- SVG Lines ----
    const svgLines = buildSVGLines(r16Data, qfData, sfData, finalData);

    // ---- Combine ----
    container.innerHTML = gridHtml + svgLines;

    // ---- Trigger glow animations for completed ties ----
    setTimeout(() => {
        document.querySelectorAll('.bracket-match:not(.placeholder)').forEach(el => {
            const rect = el.getBoundingClientRect();
            // Find the corresponding glow line
            const svg = document.querySelector('.bracket-svg');
            if (svg) {
                const glows = svg.querySelectorAll('.glow');
                glows.forEach(g => {
                    // We'll just animate all glows if any match is played
                    if (el.querySelector('.score-row .status')) {
                        g.classList.add('active');
                    }
                });
            }
        });
    }, 500);
}

// ============================================================
//  BUILD SVG LINES
// ============================================================
function buildSVGLines(r16Data, qfData, sfData, finalData) {
    // We need to calculate the positions of each match to draw lines.
    // Since we're using CSS grid, we'll use the grid positions.
    // For simplicity, we'll use a fixed SVG overlay that draws lines based on grid rows.

    // This is a simplified version – in production you'd calculate actual positions.
    // We'll use a predefined set of lines that match the grid layout.

    const rows = 16;
    const cols = 4;
    const rowHeight = 100 / rows;
    const colWidth = 100 / cols;

    // Build paths for each connection
    let paths = [];

    // R16 → QF: each pair of R16 matches connects to one QF match
    // R16 1&2 → QF 1, 3&4 → QF 2, 5&6 → QF 3, 7&8 → QF 4
    const r16ToQF = [
        { r16: [0, 1], qf: 0 },
        { r16: [2, 3], qf: 1 },
        { r16: [4, 5], qf: 2 },
        { r16: [6, 7], qf: 3 }
    ];

    // QF → SF: QF 1&2 → SF 1, QF 3&4 → SF 2
    const qfToSF = [
        { qf: [0, 1], sf: 0 },
        { qf: [2, 3], sf: 1 }
    ];

    // SF → Final: SF 1&2 → Final
    const sfToFinal = [
        { sf: [0, 1], final: 0 }
    ];

    // We'll generate SVG path strings
    // For simplicity, we'll create a fixed SVG that overlays the grid.

    // Since computing exact positions is complex without actual DOM measurements,
    // we'll use a simpler approach: create a fixed SVG with relative positioning.

    // We'll draw lines using percentage-based coordinates.

    return `
        <svg class="bracket-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <!-- R16 → QF lines -->
            <!-- Each R16 match is at row (i*2+1)/16, centered in its 2-row span -->
            <!-- QF is at row (j*4+1)/16, centered in its 4-row span -->
            <!-- Horizontal lines from R16 to QF, vertical connectors -->

            ${r16ToQF.map(({ r16, qf }) => {
                const r16Row1 = (r16[0] * 2 + 1) / rows * 100;
                const r16Row2 = (r16[1] * 2 + 1) / rows * 100;
                const qfRow = (qf * 4 + 1) / rows * 100;
                const x1 = 25; // center of column 1
                const x2 = 50; // center of column 2

                return `
                    <!-- Line from R16 match ${r16[0]} to QF -->
                    <polyline points="${x1+2},${r16Row1} ${x2-2},${r16Row1} ${x2-2},${qfRow}" class="bracket-line" />
                    <!-- Line from R16 match ${r16[1]} to QF -->
                    <polyline points="${x1+2},${r16Row2} ${x2-2},${r16Row2} ${x2-2},${qfRow}" class="bracket-line" />
                    <!-- Glow versions -->
                    <polyline points="${x1+2},${r16Row1} ${x2-2},${r16Row1} ${x2-2},${qfRow}" class="glow" />
                    <polyline points="${x1+2},${r16Row2} ${x2-2},${r16Row2} ${x2-2},${qfRow}" class="glow" />
                `;
            }).join('')}

            <!-- QF → SF lines -->
            ${qfToSF.map(({ qf, sf }) => {
                const qfRow1 = (qf[0] * 4 + 1) / rows * 100;
                const qfRow2 = (qf[1] * 4 + 1) / rows * 100;
                const sfRow = (sf * 8 + 1) / rows * 100;
                const x1 = 50;
                const x2 = 75;

                return `
                    <polyline points="${x1+2},${qfRow1} ${x2-2},${qfRow1} ${x2-2},${sfRow}" class="bracket-line" />
                    <polyline points="${x1+2},${qfRow2} ${x2-2},${qfRow2} ${x2-2},${sfRow}" class="bracket-line" />
                    <polyline points="${x1+2},${qfRow1} ${x2-2},${qfRow1} ${x2-2},${sfRow}" class="glow" />
                    <polyline points="${x1+2},${qfRow2} ${x2-2},${qfRow2} ${x2-2},${sfRow}" class="glow" />
                `;
            }).join('')}

            <!-- SF → Final -->
            ${sfToFinal.map(({ sf, final }) => {
                const sfRow1 = (sf[0] * 8 + 1) / rows * 100;
                const sfRow2 = (sf[1] * 8 + 1) / rows * 100;
                const finalRow = 50;
                const x1 = 75;
                const x2 = 90;

                return `
                    <polyline points="${x1+2},${sfRow1} ${x2-2},${sfRow1} ${x2-2},${finalRow}" class="bracket-line" />
                    <polyline points="${x1+2},${sfRow2} ${x2-2},${sfRow2} ${x2-2},${finalRow}" class="bracket-line" />
                    <polyline points="${x1+2},${sfRow1} ${x2-2},${sfRow1} ${x2-2},${finalRow}" class="glow" />
                    <polyline points="${x1+2},${sfRow2} ${x2-2},${sfRow2} ${x2-2},${finalRow}" class="glow" />
                `;
            }).join('')}

            <style>
                .bracket-line { stroke: #c5cdd8; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
                .glow { stroke: #1d4ed8; stroke-width: 4; opacity: 0; transition: opacity 0.8s ease; fill: none; stroke-linecap: round; stroke-linejoin: round; }
                .glow.active { opacity: 0.5; }
            </style>
        </svg>
    `;
}

function openMatchDetail(roundName, tieId) {
    const ko = uclData?.knockout || {};
    let matches = [];
    let roundLabel = '';

    switch(roundName) {
        case 'Round of 16': matches = ko.roundOf16 || []; roundLabel = 'Round of 16'; break;
        case 'Quarter-finals': matches = ko.quarterFinals || []; roundLabel = 'Quarter-finals'; break;
        case 'Semi-finals': matches = ko.semiFinals || []; roundLabel = 'Semi-finals'; break;
        case 'Final': matches = ko.final ? [ko.final] : []; roundLabel = 'Final'; break;
        default: return;
    }

    const legs = matches.filter(m => m.tieId === tieId || (!m.tieId && matches.length === 1));
    if (!legs.length) return;

    const leg1 = legs.find(l => l.leg === 1) || legs[0];
    const leg2 = legs.find(l => l.leg === 2);

    const modal = document.getElementById('detailModal');
    const content = document.getElementById('detailContent');

    // Compute aggregate
    let aggHome = '-', aggAway = '-', winner = '-', status = '';
    if (leg1?.played && leg2?.played) {
        aggHome = (leg1.homeScore || 0) + (leg2.awayScore || 0);
        aggAway = (leg1.awayScore || 0) + (leg2.homeScore || 0);
        if (aggHome > aggAway) winner = leg1.home;
        else if (aggAway > aggHome) winner = leg1.away;
        else winner = 'Penalties';
        status = 'FT';
    } else if (leg1?.played && !leg2) {
        aggHome = leg1.homeScore;
        aggAway = leg1.awayScore;
        if (aggHome > aggAway) winner = leg1.home;
        else if (aggAway > aggHome) winner = leg1.away;
        else winner = 'Draw';
        status = 'FT';
    } else {
        status = 'Upcoming';
    }

    const isFinal = roundLabel === 'Final';
    const champion = uclData?.knockout?.champion;

    let extraInfo = '';
    if (isFinal && champion) {
        extraInfo = `
            <div style="text-align:center;margin-top:1rem;padding:1rem;background:#fef3c7;border-radius:12px;">
                <span style="font-size:2rem;">🏆</span>
                <div style="font-size:1.2rem;font-weight:800;color:#f59e0b;">${champion}</div>
                <div style="color:#6b7a8f;font-size:0.8rem;">Champion 2025/26</div>
            </div>
        `;
    }

    content.innerHTML = `
        <div class="detail-header">
            <span class="tie-title">${leg1.home} vs ${leg1.away}</span>
            <span class="tie-agg">${aggHome} – ${aggAway}</span>
        </div>

        ${leg1 ? `
            <div class="detail-leg">
                <span class="leg-label">Leg 1</span>
                <span class="leg-score">${leg1.home} ${leg1.played ? leg1.homeScore : '–'} – ${leg1.played ? leg1.awayScore : '–'} ${leg1.away}</span>
                <span class="leg-info">${leg1.played ? 'FT' : 'Upcoming'}</span>
            </div>
        ` : ''}

        ${leg2 ? `
            <div class="detail-leg">
                <span class="leg-label">Leg 2</span>
                <span class="leg-score">${leg2.home} ${leg2.played ? leg2.homeScore : '–'} – ${leg2.played ? leg2.awayScore : '–'} ${leg2.away}</span>
                <span class="leg-info">${leg2.played ? 'FT' : 'Upcoming'}</span>
            </div>
        ` : ''}

        ${(leg1?.played || leg2?.played) ? `
            <div style="margin-top:0.8rem;padding:0.5rem;background:#f8f9fc;border-radius:10px;text-align:center;">
                <strong>Winner:</strong> ${winner}
                ${status ? ` • <span class="status ${status.toLowerCase()}">${status}</span>` : ''}
            </div>
        ` : ''}

        ${extraInfo}

        ${isFinal && champion ? `
            <button onclick="launchConfetti()" style="margin-top:0.8rem;padding:0.4rem 1rem;background:#f59e0b;border:none;border-radius:30px;font-weight:700;color:#fff;cursor:pointer;">🎉 Celebrate</button>
        ` : ''}

        <button class="detail-btn" onclick="closeDetailModal()">Close</button>
    `;

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

// ============================================================
//  CONFETTI CELEBRATION
// ============================================================
function launchConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.display = 'block';

    const particles = [];
    const colors = ['#f59e0b', '#1d4ed8', '#ef4444', '#22c55e', '#8b5cf6', '#ec4899'];

    for (let i = 0; i < 200; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            w: Math.random() * 10 + 4,
            h: Math.random() * 6 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            vx: (Math.random() - 0.5) * 3,
            vy: Math.random() * 4 + 2,
            rotation: Math.random() * 360,
            rv: (Math.random() - 0.5) * 5,
            opacity: 1
        });
    }

    let frame = 0;

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let active = false;

        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;
            p.rotation += p.rv;
            if (p.y < canvas.height + 50) active = true;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate((p.rotation * Math.PI) / 180);
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.restore();
        });

        if (active || frame < 100) {
            frame++;
            requestAnimationFrame(animate);
        } else {
            canvas.style.display = 'none';
        }
    }

    animate();

    setTimeout(() => {
        canvas.style.display = 'none';
    }, 5000);

    // Also trigger confetti from the page
    if (typeof confetti !== 'undefined') {
        confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
    }
}

function renderUCLFixtureWeek(round) {
    const container = document.getElementById('uclFixturesContainer');

    let html = '';
    fixtures.forEach((m, idx) => {

            middleDisplay = `<span class="vs-score">${m.homeScore} – ${m.awayScore}</span>`;

            middleDisplay = `<span class="vs-compact">vs</span>`;
        }
        // Button for played matches
        let buttonHtml = '';
        if (m.played) {
            buttonHtml = `<button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openMatchReport('league', ${idx}, ${round})">${hasReport ? '📋 Report' : '📝 Add Report'}</button>`;
        }
        html += `
            <div class="fixture-item">
                <div class="fixture-teams-compact">
                    <span class="team-name-compact">${m.home}</span>
                    ${middleDisplay}
                    <span class="team-name-compact">${m.away}</span>
                </div>
                ${buttonHtml ? `<div class="fixture-button-wrap">${buttonHtml}</div>` : ''}
            </div>
        `;
    });
    container.innerHTML = html;
}

async function openMatchReport(type, index, round) {
    const match = uclData?.leagueFixtures?.filter(f => f.round === round)?.[index];
    if (!match || !match.played) return;
    showReportModal(match, `Matchday ${round}`);
}
function showReportModal(match, title) {
    const modal = document.getElementById('reportModal') || createReportModal();
    const content = document.getElementById('reportContent');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
    const report = match.report || {};
    const fullComment = report.fullComment || report.comment || report.summary || 'No match report available.';
    let goalsHtml = '', cardsHtml = '';
    if (report.goals && report.goals.length) {
        goalsHtml = report.goals.map(g => `<div class="goal-item"><span class="minute">${g.minute}'</span><span class="scorer">${g.scorer}</span>${g.assist ? `<span class="assist">(assist: ${g.assist})</span>` : ''}<span style="color:#6b7a8f;font-size:0.8rem;">${g.team === 'home' ? match.home : match.away}</span></div>`).join('');
    } else { goalsHtml = '<span style="color:#94a3b8;font-style:italic;">No goals recorded</span>'; }
    if (report.cards && report.cards.length) {
        cardsHtml = report.cards.map(c => `<span class="card-item ${c.type}">${c.type.toUpperCase()}</span><span class="card-text">${c.player} (${c.team === 'home' ? match.home : match.away})</span><br>`).join('');
    } else { cardsHtml = '<span style="color:#94a3b8;font-style:italic;">No cards</span>'; }
    content.innerHTML = `
        <button class="modal-close" onclick="closeReportModal()">✕</button>
        <div class="report-header"><div><div class="teams">${match.home} vs ${match.away}</div><div class="report-meta">${title}</div></div><div class="score">${match.homeScore} – ${match.awayScore}</div></div>
        <div class="report-comment">${fullComment.replace(/\n/g, '<br>')}</div>
        <div class="section-label">⚽ Goals</div><div style="margin-bottom:1rem;">${goalsHtml}</div>
        <div class="section-label">🟨 Cards</div><div style="margin-bottom:1rem;">${cardsHtml}</div>
        <button class="close-btn" onclick="closeReportModal()">Close</button>
    `;
}
function closeReportModal() {
    const modal = document.getElementById('reportModal');
    if (modal) modal.classList.remove('active');
    document.body.style.overflow = '';
}
function createReportModal() {
    const div = document.createElement('div');
    div.id = 'reportModal';
    div.className = 'modal-overlay';
    div.innerHTML = `<div class="modal-box"><button class="modal-close" onclick="closeReportModal()">✕</button><div id="reportContent"></div></div>`;
    document.body.appendChild(div);
    return div;
}

// ============================================================
//  PHASE COMPLETION
// ============================================================
function checkPhaseCompletion() {
    const phase = uclData?.phase;
    const subtitle = document.getElementById('phaseSubtitle');
    if (phase === 'completed' || phase === 'knockout') {
        subtitle.textContent = '2025/26 • Knockout Stage';
        document.querySelector('[data-tab="bracket"]').classList.add('active');
        document.querySelectorAll('.ucl-tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-bracket').classList.add('active');
        currentTab = 'bracket';
    } else {
        subtitle.textContent = '2025/26 • League Phase';
    }
}

//  ARCHIVE TOGGLE
// ============================================================
function toggleArchive() {
    document.getElementById('archiveContent').classList.toggle('hidden');
}
