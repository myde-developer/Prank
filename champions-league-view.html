<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champions League</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; }
        .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .group-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .group-card { border: 1px solid #e5e7eb; transition: all 0.3s; }
        .group-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .admin-badge { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }

        /* Report button styles */
        .report-btn {
            background: #e5e7eb;
            border: none;
            border-radius: 4px;
            padding: 0.15rem 0.5rem;
            color: #6b7280;
            cursor: pointer;
            font-size: 0.6rem;
            transition: all 0.2s;
            font-weight: 600;
        }
        .report-btn:hover {
            background: #667eea;
            color: #fff;
            transform: scale(1.05);
        }
        .report-btn.has-report {
            background: #667eea;
            color: #fff;
        }
        .report-btn.has-report:hover {
            background: #764ba2;
        }

        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal {
            background: #fff;
            border-radius: 20px;
            max-width: 650px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            color: #1a1a2e;
        }
        .modal::-webkit-scrollbar { width: 6px; }
        .modal::-webkit-scrollbar-track { background: #f0f2f5; border-radius: 10px; }
        .modal::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }
        .modal-close:hover { color: #1a1a2e; }

        .modal-section-title {
            font-weight: 600;
            color: #6b7280;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 1rem 0 0.5rem 0;
        }

        .report-goal {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.3rem 0;
            font-size: 0.9rem;
        }
        .report-goal .minute {
            color: #667eea;
            font-weight: 700;
            min-width: 40px;
        }
        .report-goal .scorer { font-weight: 600; }
        .report-goal .assist { color: #6b7280; font-size: 0.8rem; }

        .report-card {
            display: inline-block;
            padding: 0.1rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            margin: 0 0.3rem;
        }
        .report-card.yellow { background: #ffd700; color: #1a1a2e; }
        .report-card.red { background: #ef4444; color: #fff; }
        .report-card-text { color: #6b7280; font-size: 0.85rem; }

        .no-data { color: #6b7280; font-style: italic; font-size: 0.9rem; }

        /* Responsive */
        @media (max-width: 640px) {
            .modal { padding: 1.5rem; }
            .report-score { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <div class="card rounded-2xl shadow-2xl p-8 mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-4xl font-bold text-gray-800 mb-2">🏆 Champions League</h1>
                    <p class="text-gray-600">Group Stage</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="window.location.href='index.html'" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-xl font-bold transition text-sm">
                        ⬅️ Back to Leagues
                    </button>
                    <div id="admin-controls" class="hidden">
                        <button onclick="window.location.href='admin.html'" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold transition">
                            ⚙️ Admin Panel
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="champions-data" class="space-y-6">
            <p class="text-white text-center">Loading Champions League data...</p>
        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal">
            <button class="modal-close" onclick="closeReportModal()">✕</button>
            <div id="reportModalContent">
                <div class="loading text-center py-8 text-gray-500">Loading report...</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmy0tmvaYcw9KsQQRH7RLKcXC8EN6WFqY",
            authDomain: "dls-premier-league.firebaseapp.com",
            projectId: "dls-premier-league",
            storageBucket: "dls-premier-league.firebasestorage.app",
            messagingSenderId: "975087030284",
            appId: "1:975087030284:web:7708718fffd9180c009e29"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Check if user is admin (sessionStorage)
        const isAdmin = sessionStorage.getItem('championsAdmin') === 'true';
        if (isAdmin) {
            document.getElementById('admin-controls').classList.remove('hidden');
        }

        async function loadChampionsLeague() {
            try {
                const snap = await db.ref('champions_league').once('value');
                const data = snap.val();

                if (!data) {
                    document.getElementById('champions-data').innerHTML = `
                        <div class="card rounded-2xl shadow-xl p-8 text-center">
                            <p class="text-gray-600 text-xl">🏆 No Champions League data found.</p>
                            <p class="text-gray-500 mt-2">The tournament hasn't been created yet.</p>
                            ${isAdmin ? `
                                <button onclick="window.location.href='admin.html'" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition">
                                    Create Champions League →
                                </button>
                            ` : ''}
                        </div>
                    `;
                    return;
                }

                let html = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${renderGroup(data, 'A')}
                        ${renderGroup(data, 'B')}
                    </div>
                    <div class="card rounded-2xl shadow-xl p-6 mt-6">
                        <h3 class="text-xl font-bold text-gray-800 mb-4">📋 Match Fixtures</h3>
                        ${renderFixtures(data)}
                    </div>
                `;

                // Knockout stage if exists
                if (data.knockout) {
                    html += renderKnockoutViewer(data.knockout);
                }

                document.getElementById('champions-data').innerHTML = html;

            } catch (error) {
                console.error('Error loading Champions League:', error);
                document.getElementById('champions-data').innerHTML = `
                    <div class="card rounded-2xl shadow-xl p-8 text-center text-red-600">
                        Error loading data: ${error.message}
                    </div>
                `;
            }
        }

        function renderGroup(data, letter) {
            const groupData = data.groups[letter];
            if (!groupData || groupData.length === 0) return '';
            
            const sorted = [...groupData].sort((a, b) => {
                if (b.pts_cl !== a.pts_cl) return b.pts_cl - a.pts_cl;
                if (b.gd_cl !== a.gd_cl) return b.gd_cl - a.gd_cl;
                return b.gf_cl - a.gf_cl;
            });
            
            return `
                <div class="card rounded-2xl shadow-xl p-6 group-card">
                    <div class="group-header text-white rounded-xl p-4 mb-4">
                        <h4 class="text-2xl font-bold flex items-center gap-2">
                            <span>Group ${letter}</span>
                        </h4>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="text-gray-500 border-b-2">
                                    <th class="text-left py-2">Team</th>
                                    <th class="text-center">P</th>
                                    <th class="text-center">W</th>
                                    <th class="text-center">D</th>
                                    <th class="text-center">L</th>
                                    <th class="text-center">GF</th>
                                    <th class="text-center">GA</th>
                                    <th class="text-center">GD</th>
                                    <th class="text-center font-bold">Pts</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sorted.map((team, i) => `
                                    <tr class="${i % 2 === 0 ? 'bg-gray-50' : ''} border-b">
                                        <td class="py-2 font-medium flex items-center gap-2">
                                            <span class="text-sm text-gray-400 w-5">${i + 1}</span>
                                            ${team.name}
                                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded">Pot ${team.pot || 1}</span>
                                        </td>
                                        <td class="text-center">${team.mp || 0}</td>
                                        <td class="text-center">${team.w || 0}</td>
                                        <td class="text-center">${team.d || 0}</td>
                                        <td class="text-center">${team.l || 0}</td>
                                        <td class="text-center">${team.gf_cl || 0}</td>
                                        <td class="text-center">${team.ga_cl || 0}</td>
                                        <td class="text-center ${(team.gd_cl || 0) > 0 ? 'text-green-600' : (team.gd_cl || 0) < 0 ? 'text-red-600' : ''}">${team.gd_cl || 0}</td>
                                        <td class="text-center font-bold text-blue-600">${team.pts_cl || 0}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderFixtures(data) {
            let html = '';
            const groups = ['A', 'B'];
            groups.forEach(letter => {
                const fixtures = data.fixtures?.[letter];
                if (!fixtures || fixtures.length === 0) return;
                
                html += `<div class="mb-8"><h4 class="font-bold text-gray-700 mb-3 text-lg">Group ${letter}</h4>`;
                const fixturesByRound = {};
                fixtures.forEach(f => {
                    if (!fixturesByRound[f.round]) fixturesByRound[f.round] = [];
                    fixturesByRound[f.round].push(f);
                });
                const sortedRounds = Object.keys(fixturesByRound).sort((a, b) => Number(a) - Number(b));
                
                sortedRounds.forEach(round => {
                    const roundFixtures = fixturesByRound[round];
                    html += `
                        <div class="mb-4 bg-gray-50 rounded-lg p-3">
                            <p class="text-sm font-semibold text-gray-600 mb-2">Matchday ${round}</p>
                            <div class="space-y-1">
                                ${roundFixtures.map((f, idx) => {
                                    const hasReport = f.played && f.report;
                                    return `
                                        <div class="flex items-center gap-4 p-2 bg-white rounded-lg shadow-sm">
                                            <span class="font-medium w-32 text-right">${f.home}</span>
                                            <span class="text-gray-400">vs</span>
                                            <span class="font-medium w-32">${f.away}</span>
                                            ${f.played ? `
                                                <span class="ml-auto font-bold text-blue-600">${f.homeScore} - ${f.awayScore}</span>
                                                <button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openMatchReport('${letter}', ${round}, ${idx})">
                                                    ${hasReport ? '📋 Report' : '📝 Add Report'}
                                                </button>
                                            ` : `
                                                <span class="ml-auto text-gray-400 text-sm">⏳ Not played</span>
                                            `}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            });
            return html || '<p class="text-gray-500">No fixtures available</p>';
        }

        function renderKnockoutViewer(koData) {
            const semis = koData.semiFixtures || [];
            const final = koData.finalFixture;
            let html = `<div class="card rounded-2xl shadow-xl p-6 mt-6"><h3 class="text-xl font-bold text-gray-800 mb-4">🏆 Knockout Stage</h3>`;
            
            // Semis
            if (semis.length > 0) {
                html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">`;
                semis.forEach(f => {
                    const hasReport = f.played && f.report;
                    html += `
                        <div class="bg-white p-4 rounded-lg shadow">
                            <p class="font-bold text-gray-600">${f.round || 'Semi-final'}</p>
                            <div class="flex items-center gap-2 flex-wrap">
                                <span>${f.home}</span>
                                <span class="text-gray-400">vs</span>
                                <span>${f.away}</span>
                                ${f.played ? `
                                    <span class="ml-auto font-bold text-blue-600">${f.homeScore} - ${f.awayScore}</span>
                                    <button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openKnockoutReport('semi', ${semis.indexOf(f)})">
                                        ${hasReport ? '📋' : '📝'}
                                    </button>
                                ` : `<span class="ml-auto text-gray-400">⏳</span>`}
                            </div>
                            ${f.played ? `<p class="text-sm text-green-600 mt-1">Winner: ${f.homeScore > f.awayScore ? f.home : f.away}</p>` : ''}
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // Final
            if (final) {
                const hasReport = final.played && final.report;
                html += `
                    <div class="bg-yellow-50 p-4 rounded-lg border-2 border-yellow-400">
                        <p class="font-bold text-gray-700">Final</p>
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-bold">${final.home || '?'}</span>
                            <span class="text-gray-400">vs</span>
                            <span class="font-bold">${final.away || '?'}</span>
                            ${final.played ? `
                                <span class="ml-auto font-bold text-blue-600">${final.homeScore} - ${final.awayScore}</span>
                                <button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openKnockoutReport('final', 0)">
                                    ${hasReport ? '📋' : '📝'}
                                </button>
                            ` : `<span class="ml-auto text-gray-400">⏳</span>`}
                        </div>
                        ${koData.champion ? `<p class="text-xl font-bold text-yellow-800 mt-2">🏆 Champion: ${koData.champion}</p>` : ''}
                    </div>
                `;
            }
            html += `</div>`;
            return html;
        }

        // ===== MATCH REPORT FUNCTIONS =====
        async function openMatchReport(group, round, matchIndex) {
            const snap = await db.ref('champions_league').once('value');
            const data = snap.val();
            if (!data) return;

            const fixture = data.fixtures?.[group]?.find(f => f.round == round);
            if (!fixture) return;

            const matches = data.fixtures[group].filter(f => f.round == round);
            const match = matches[matchIndex];
            if (!match || !match.played) return;

            showReportModal(match, `Group ${group} • Matchday ${round}`);
        }

        async function openKnockoutReport(type, index) {
            const snap = await db.ref('champions_league/knockout').once('value');
            const data = snap.val();
            if (!data) return;

            let match;
            let title = '';
            if (type === 'semi') {
                match = data.semiFixtures?.[index];
                title = 'Semi-final';
            } else {
                match = data.finalFixture;
                title = 'Final';
            }

            if (!match || !match.played) return;
            showReportModal(match, title);
        }

        function showReportModal(match, title) {
            const modal = document.getElementById('reportModal');
            const content = document.getElementById('reportModalContent');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            const report = match.report || {};

            let goalsHtml = '';
            if (report.goals && report.goals.length > 0) {
                goalsHtml = report.goals.map(g => `
                    <div class="report-goal">
                        <span class="minute">${g.minute}'</span>
                        <span class="scorer">${g.scorer}</span>
                        ${g.assist ? `<span class="assist">(assist: ${g.assist})</span>` : ''}
                        ${g.team === 'home' ? '🏠' : '✈️'}
                    </div>
                `).join('');
            } else {
                goalsHtml = '<span class="no-data">No goals recorded</span>';
            }

            let cardsHtml = '';
            if (report.cards && report.cards.length > 0) {
                cardsHtml = report.cards.map(c => `
                    <span class="report-card ${c.type}">${c.type.toUpperCase()}</span>
                    <span class="report-card-text">${c.player} (${c.team === 'home' ? 'Home' : 'Away'})</span>
                    <br>
                `).join('');
            } else {
                cardsHtml = '<span class="no-data">No cards</span>';
            }

            const isHomeWin = match.homeScore > match.awayScore;
            const isAwayWin = match.awayScore > match.homeScore;
            const resultText = isHomeWin ? `${match.home} won` : isAwayWin ? `${match.away} won` : 'Draw';

            content.innerHTML = `
                <div style="border-bottom:2px solid #e5e7eb; padding-bottom:1rem; margin-bottom:1rem;">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
                        <div>
                            <div style="font-size:1.2rem; font-weight:600;">
                                <span>${match.home}</span>
                                <span style="color:#d1d5db; margin:0 0.5rem;">vs</span>
                                <span style="color:#6b7280;">${match.away}</span>
                            </div>
                            <div style="color:#6b7280; font-size:0.85rem;">${title} • ${resultText}</div>
                        </div>
                        <div style="font-size:2.5rem; font-weight:800; color:#667eea;">${match.homeScore} – ${match.awayScore}</div>
                    </div>
                </div>

                ${report.summary ? `<div style="background:#f8f9fa; padding:1rem; border-radius:12px; margin:1rem 0; font-style:italic; border-left:3px solid #667eea;">📝 ${report.summary}</div>` : ''}

                <div class="modal-section-title">⚽ Goals</div>
                <div style="margin-bottom:1rem;">${goalsHtml}</div>

                <div class="modal-section-title">🟨 Cards</div>
                <div style="margin-bottom:1rem;">${cardsHtml}</div>

                <button onclick="closeReportModal()" style="background:#667eea; color:#fff; padding:0.6rem 1.8rem; border-radius:40px; font-weight:700; border:none; cursor:pointer; margin-top:0.5rem;">Close</button>
            `;
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close modal on overlay click
        document.getElementById('reportModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeReportModal();
        });

        // Close modal on ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeReportModal();
        });

        // Auto-load
        loadChampionsLeague();
        setInterval(loadChampionsLeague, 30000);
    </script>
</body>
</html>
