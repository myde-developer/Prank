<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champions League</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
/* ============================================================
   CHAMPIONS LEAGUE – LIGHT PROFESSIONAL THEME
   ============================================================ */

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f7fa;
    color: #1a2a44;
    padding: 1.5rem;
}
.ucl-container { max-width: 1280px; margin: 0 auto; }
.ucl-header {
    background: #fff; border-radius: 24px; padding: 1.2rem 2rem; margin-bottom: 1.5rem;
    display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
}
.ucl-header-left { display: flex; align-items: center; gap: 1rem; }
.ucl-trophy { font-size: 2.8rem; }
.ucl-header h1 { font-size: 1.8rem; font-weight: 800; color: #0b1e3a; }
.ucl-subtitle { font-size: 0.85rem; color: #4a5a72; }
.ucl-header-right { display: flex; gap: 0.6rem; }
.btn-back { background: #eef1f5; border: none; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; color: #1a2a44; cursor: pointer; }
.btn-back:hover { background: #dde1e8; }
.btn-admin { background: #0b1e3a; border: none; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; color: #fff; cursor: pointer; }
.btn-admin:hover { background: #1d3557; }
.hidden { display: none !important; }

.completion-banner {
    background: #e8f0fe; border-left: 5px solid #1d4ed8; padding: 0.8rem 1.5rem;
    border-radius: 12px; margin-bottom: 1.5rem; font-weight: 600; color: #0b1e3a;
}
.completion-banner.hidden { display: none; }

.ucl-tabs {
    display: flex; gap: 0.3rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e9f0; padding-bottom: 0.3rem;
}
.ucl-tab {
    padding: 0.6rem 1.8rem; border: none; border-radius: 40px; background: transparent;
    font-weight: 600; font-size: 0.9rem; color: #6b7a8f; cursor: pointer; transition: 0.3s;
}
.ucl-tab:hover { color: #1a2a44; background: #f0f3f8; }
.ucl-tab.active { color: #1d4ed8; background: #e8edf9; }
.ucl-tab-content { display: none; animation: fadeUp 0.35s; }
.ucl-tab-content.active { display: block; }
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.table-card, .fixtures-card, .bracket-wrap {
    background: #fff; border-radius: 24px; padding: 1.5rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04); border: 1px solid #e5e9f0;
}
.league-table-wrap { overflow-x: auto; }
.league-table {
    width: 100%; border-collapse: collapse; font-size: 0.9rem;
}
.league-table th {
    text-align: left; padding: 0.7rem 0.4rem; color: #4a5a72; font-weight: 600;
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e5e9f0;
}
.league-table td {
    padding: 0.6rem 0.4rem; border-bottom: 1px solid #f0f2f6; color: #1a2a44;
}
.league-table tr:hover td { background: #f8f9fc; }
.league-table .pos { font-weight: 700; min-width: 32px; text-align: center; }
.league-table .club { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
.league-table .club .emblem { font-size: 1.2rem; }
.league-table .stat { text-align: center; }
.league-table .gd-pos { color: #16a34a; font-weight: 600; }
.league-table .gd-neg { color: #dc2626; font-weight: 600; }
.league-table .gd-zero { color: #94a3b8; }
.league-table .pts { font-weight: 800; color: #1d4ed8; text-align: center; }
.badge-q { background: #dcfce7; color: #16a34a; padding: 0.05rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }
.badge-e { background: #fee2e2; color: #dc2626; padding: 0.05rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }

.archive-section { margin-top: 2rem; border-top: 2px dashed #e5e9f0; padding-top: 1.5rem; }
.archive-toggle { background: none; border: none; font-weight: 600; color: #1d4ed8; cursor: pointer; font-size: 0.9rem; }
.archive-toggle:hover { text-decoration: underline; }
.archive-content { margin-top: 1rem; background: #f8f9fc; border-radius: 16px; padding: 1.2rem; border: 1px solid #e5e9f0; }
.archive-content.hidden { display: none; }
.archive-note { color: #6b7a8f; font-size: 0.85rem; margin-bottom: 0.8rem; }

.fixtures-controls {
    display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem; flex-wrap: wrap;
}
.fixtures-controls label { font-weight: 600; color: #4a5a72; font-size: 0.85rem; }
.fixtures-controls select {
    padding: 0.4rem 1rem; border-radius: 30px; border: 1px solid #d1d8e0; background: #fff; font-weight: 500; outline: none;
}
.fixture-item {
    display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1rem;
    background: #f8f9fc; border-radius: 14px; margin-bottom: 0.5rem; transition: 0.2s; gap: 0.5rem; flex-wrap: wrap;
}
.fixture-item:hover { background: #f0f3f8; }
.fixture-item .teams {
    display: flex; align-items: center; gap: 0.5rem; font-weight: 500; font-size: 0.9rem;
}
.fixture-item .teams .vs { color: #94a3b8; font-size: 0.7rem; }
.fixture-item .right { display: flex; align-items: center; gap: 0.6rem; }
.fixture-item .score { font-weight: 700; font-size: 0.95rem; color: #1a2a44; min-width: 44px; text-align: center; }
.fixture-item .score.unplayed { color: #94a3b8; font-weight: 400; }
.report-btn {
    background: transparent; border: 1.5px solid #d1d8e0; border-radius: 30px; padding: 0.1rem 0.7rem;
    color: #6b7a8f; cursor: pointer; font-size: 0.6rem; font-weight: 600; transition: 0.25s;
}
.report-btn:hover { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
.report-btn.has-report { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
.report-btn.has-report:hover { background: #1a3db8; }

.bracket { display: flex; flex-direction: column; gap: 2rem; }
.bracket-round { background: #fafbfc; border-radius: 16px; padding: 1.2rem 1.5rem; border: 1px solid #e5e9f0; }
.bracket-round-title { font-weight: 700; font-size: 0.9rem; color: #0b1e3a; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.6rem; }
.bracket-round-title .badge { font-size: 0.65rem; background: #e8edf9; color: #1d4ed8; padding: 0.1rem 0.7rem; border-radius: 20px; }
.bracket-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
.bracket-match {
    display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.8rem;
    background: #fff; border-radius: 12px; border-left: 4px solid #d1d8e0; transition: 0.2s; gap: 0.4rem; flex-wrap: wrap;
}
.bracket-match:hover { background: #f8f9fc; }
.bracket-match .teams { display: flex; align-items: center; gap: 0.3rem; font-weight: 500; font-size: 0.85rem; }
.bracket-match .teams .vs { color: #94a3b8; font-size: 0.6rem; }
.bracket-match .score { font-weight: 700; color: #1d4ed8; font-size: 0.85rem; }
.bracket-match .unplayed { color: #94a3b8; font-size: 0.75rem; }
.bracket-match .winner-tag { font-size: 0.55rem; font-weight: 600; color: #16a34a; background: #dcfce7; padding: 0.05rem 0.5rem; border-radius: 20px; }
.bracket-connector { text-align: center; color: #d1d8e0; font-size: 0.8rem; padding: 0.2rem 0; }
.bracket-final { background: #fff9e6; border: 2px solid #fbbf24; border-radius: 16px; padding: 1.2rem 1.5rem; }
.bracket-final .final-title { font-weight: 700; font-size: 1rem; color: #0b1e3a; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem; }
.bracket-final .final-match {
    display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 1rem;
    background: #fffbeb; border-radius: 12px; gap: 0.5rem; flex-wrap: wrap;
}
.bracket-final .final-match .teams { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1rem; }
.bracket-final .final-match .teams .vs { color: #94a3b8; font-size: 0.7rem; }
.bracket-final .final-match .score { font-weight: 800; color: #f59e0b; font-size: 1.2rem; }
.bracket-final .champion { text-align: center; font-size: 1.6rem; font-weight: 800; color: #f59e0b; margin-top: 0.8rem; }

.modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px); z-index: 1000; justify-content: center; align-items: center; padding: 1.5rem;
}
.modal-overlay.active { display: flex; }
.modal-box {
    background: #fff; border-radius: 24px; max-width: 620px; width: 100%; max-height: 90vh;
    overflow-y: auto; padding: 2rem; box-shadow: 0 24px 80px rgba(0,0,0,0.12); animation: modalIn 0.3s ease;
}
@keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-close { float: right; background: none; border: none; color: #6b7a8f; font-size: 1.8rem; cursor: pointer; }
.modal-close:hover { color: #1a2a44; }
.modal-box .report-header {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    border-bottom: 2px solid #e5e9f0; padding-bottom: 1rem; margin-bottom: 1rem;
}
.modal-box .report-header .teams { font-size: 1.2rem; font-weight: 700; color: #0b1e3a; }
.modal-box .report-header .score { font-size: 2.2rem; font-weight: 800; color: #1d4ed8; }
.modal-box .report-meta { color: #6b7a8f; font-size: 0.85rem; }
.modal-box .report-comment {
    background: #f8f9fc; border-radius: 12px; padding: 1rem; line-height: 1.8; font-size: 0.95rem;
    max-height: 200px; overflow-y: auto; white-space: pre-wrap; color: #1a2a44; margin-bottom: 1rem;
}
.modal-box .section-label { font-weight: 600; color: #4a5a72; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; margin: 1rem 0 0.4rem 0; }
.modal-box .goal-item {
    display: flex; align-items: center; gap: 0.8rem; padding: 0.25rem 0; font-size: 0.9rem; border-bottom: 1px solid #f0f2f6;
}
.modal-box .goal-item .minute { font-weight: 700; color: #1d4ed8; min-width: 40px; }
.modal-box .goal-item .scorer { font-weight: 600; }
.modal-box .goal-item .assist { color: #6b7a8f; font-size: 0.8rem; }
.modal-box .card-item { display: inline-block; padding: 0.05rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-right: 0.3rem; }
.modal-box .card-item.yellow { background: #fef3c7; color: #92400e; }
.modal-box .card-item.red { background: #fee2e2; color: #991b1b; }
.modal-box .card-text { color: #6b7a8f; font-size: 0.85rem; }
.modal-box .close-btn {
    margin-top: 1.5rem; width: 100%; padding: 0.7rem; background: #1d4ed8; border: none;
    border-radius: 12px; color: #fff; font-weight: 700; font-size: 0.95rem; cursor: pointer;
}
.modal-box .close-btn:hover { background: #1a3db8; }
.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-track { background: transparent; }
.modal-box::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 10px; }

.loading-text { color: #6b7a8f; font-style: italic; padding: 1rem 0; }

@media (max-width: 768px) {
    body { padding: 1rem; }
    .ucl-header { padding: 1rem; flex-direction: column; align-items: stretch; gap: 0.5rem; }
    .ucl-header-right { justify-content: flex-end; }
    .ucl-tab { padding: 0.4rem 1rem; font-size: 0.8rem; }
    .bracket-grid { grid-template-columns: 1fr; }
    .fixture-item { flex-direction: column; align-items: stretch; gap: 0.3rem; }
    .fixture-item .right { justify-content: flex-end; }
    .modal-box { padding: 1.2rem; }
}
    </style>
</head>
<body>

    <div class="ucl-container">

        <!-- Header -->
        <header class="ucl-header">
            <div class="ucl-header-left">
                <span class="ucl-trophy">🏆</span>
                <div>
                    <h1>Champions League</h1>
                    <p class="ucl-subtitle" id="phaseSubtitle">2025/26 • League Phase</p>
                </div>
            </div>
            <div class="ucl-header-right">
                <button onclick="window.location.href='index.html'" class="btn-back">⬅ Back</button>
                <button id="adminBtn" class="btn-admin hidden" onclick="window.location.href='admin.html'">⚙️ Admin</button>
            </div>
        </header>

        <!-- Completion Banner -->
        <div id="completionBanner" class="completion-banner hidden">
            🏆 League Phase Complete • The Top 16 Clubs have qualified for the Knockout Stage.
        </div>

        <!-- Tabs -->
        <nav class="ucl-tabs" id="uclTabs">
            <button class="ucl-tab active" data-tab="table">📊 League Table</button>
            <button class="ucl-tab" data-tab="fixtures">📅 Fixtures</button>
            <button class="ucl-tab" data-tab="bracket">🏆 Bracket</button>
        </nav>

        <!-- Tab: League Table -->
        <div id="tab-table" class="ucl-tab-content active">
            <div class="table-card">
                <div id="leagueTableContainer"><p class="loading-text">Loading league table...</p></div>
                <div id="archiveContainer" class="archive-section hidden">
                    <button class="archive-toggle" onclick="toggleArchive()">📂 League Phase Archive</button>
                    <div id="archiveContent" class="archive-content hidden">
                        <p class="archive-note">Final standings after all matches.</p>
                        <div id="archiveTable"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Fixtures -->
        <div id="tab-fixtures" class="ucl-tab-content">
            <div class="fixtures-card">
                <div class="fixtures-controls">
                    <label>Matchday</label>
                    <select id="roundSelect" onchange="renderFixtures()"></select>
                </div>
                <div id="fixturesContainer"><p class="loading-text">Loading fixtures...</p></div>
            </div>
        </div>

        <!-- Tab: Bracket -->
        <div id="tab-bracket" class="ucl-tab-content">
            <div id="bracketContainer" class="bracket-wrap">
                <p class="loading-text">Loading bracket...</p>
            </div>
        </div>

    </div>

    <!-- Match Report Modal -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeReportModal()">✕</button>
            <div id="reportContent"><p class="loading-text">Loading report...</p></div>
        </div>
    </div>

    <script>
// ============================================================
//  FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBmy0tmvaYcw9KsQQRH7RLKcXC8EN6WFqY",
    authDomain: "dls-premier-league.firebaseapp.com",
    projectId: "dls-premier-league",
    storageBucket: "dls-premier-league.firebasestorage.app",
    messagingSenderId: "975087030284",
    appId: "1:975087030284:web:7708718fffd9180c009e29"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============================================================
//  GLOBALS
// ============================================================
let uclData = null, currentTab = 'table';
const isAdmin = sessionStorage.getItem('championsAdmin') === 'true';
if (isAdmin) document.getElementById('adminBtn').classList.remove('hidden');

// ============================================================
//  TABS
// ============================================================
document.querySelectorAll('.ucl-tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.ucl-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        document.querySelectorAll('.ucl-tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${currentTab}`).classList.add('active');
        if (currentTab === 'fixtures') renderFixtures();
        if (currentTab === 'bracket') renderBracket();
    });
});

// ============================================================
//  MAIN LOADER
// ============================================================
async function loadChampionsLeague() {
    try {
        const snap = await db.ref('champions_league').once('value');
        uclData = snap.val();
        if (!uclData) {
            document.getElementById('leagueTableContainer').innerHTML = `
                <div style="text-align:center; padding:2rem;">
                    <p style="font-size:2rem;">🏆</p>
                    <p style="color:#6b7a8f; font-size:1.1rem;">No Champions League data found.</p>
                    <p style="color:#94a3b8; font-size:0.9rem;">The tournament hasn't been created yet.</p>
                    ${isAdmin ? `<button onclick="window.location.href='admin.html'" style="margin-top:1rem; background:#1d4ed8; color:#fff; border:none; padding:0.6rem 2rem; border-radius:30px; font-weight:600; cursor:pointer;">Create Champions League →</button>` : ''}
                </div>
            `;
            return;
        }
        renderLeagueTable();
        populateRoundSelect();
        renderFixtures();
        renderBracket();
        checkPhaseCompletion();
    } catch (err) {
        console.error(err);
        document.getElementById('leagueTableContainer').innerHTML =
            `<div style="color:#dc2626; text-align:center; padding:2rem;">Error loading data: ${err.message}</div>`;
    }
}

// ============================================================
//  LEAGUE TABLE
// ============================================================
function renderLeagueTable() {
    const container = document.getElementById('leagueTableContainer');
    const table = uclData.leagueTable || [];
    if (!table.length) { container.innerHTML = '<p class="loading-text">No league data available.</p>'; return; }
    const sorted = [...table].sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    const isCompleted = uclData.phase === 'completed' || uclData.phase === 'knockout';
    let html = `<div class="league-table-wrap"><table class="league-table">
        <thead><tr>
            <th>#</th><th>Club</th>
            <th class="stat">P</th><th class="stat">W</th><th class="stat">D</th><th class="stat">L</th>
            <th class="stat">GF</th><th class="stat">GA</th><th class="stat">GD</th>
            <th class="stat">Pts</th>
            ${isCompleted ? '<th class="stat">Status</th>' : ''}
        </tr></thead><tbody>`;
    sorted.forEach((team, i) => {
        const pos = i+1, gd = team.gd || 0;
        let gdClass = 'gd-zero';
        if (gd > 0) gdClass = 'gd-pos'; else if (gd < 0) gdClass = 'gd-neg';
        let badge = '';
        if (isCompleted) badge = pos <= 16 ? `<span class="badge-q">✓ Qualified</span>` : `<span class="badge-e">✗ Eliminated</span>`;
        html += `<tr>
            <td class="pos">${pos}</td>
            <td><span class="club"><span class="emblem">⚽</span> ${team.name}</span></td>
            <td class="stat">${team.played || 0}</td>
            <td class="stat">${team.won || 0}</td>
            <td class="stat">${team.drawn || 0}</td>
            <td class="stat">${team.lost || 0}</td>
            <td class="stat">${team.gf || 0}</td>
            <td class="stat">${team.ga || 0}</td>
            <td class="stat ${gdClass}">${gd > 0 ? '+' : ''}${gd}</td>
            <td class="pts">${team.pts || 0}</td>
            ${isCompleted ? `<td class="stat">${badge}</td>` : ''}
        </tr>`;
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
    if (isCompleted) {
        document.getElementById('archiveContainer').classList.remove('hidden');
        document.getElementById('archiveTable').innerHTML = html;
    } else {
        document.getElementById('archiveContainer').classList.add('hidden');
    }
}

// ============================================================
//  PHASE COMPLETION
// ============================================================
function checkPhaseCompletion() {
    const phase = uclData.phase;
    const banner = document.getElementById('completionBanner');
    const subtitle = document.getElementById('phaseSubtitle');
    if (phase === 'completed' || phase === 'knockout') {
        banner.classList.remove('hidden');
        subtitle.textContent = '2025/26 • Knockout Stage';
        if (currentTab !== 'bracket') {
            document.querySelectorAll('.ucl-tab').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="bracket"]').classList.add('active');
            document.querySelectorAll('.ucl-tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-bracket').classList.add('active');
            currentTab = 'bracket';
            renderBracket();
        }
    } else {
        banner.classList.add('hidden');
        subtitle.textContent = '2025/26 • League Phase';
    }
}

// ============================================================
//  FIXTURES
// ============================================================
function populateRoundSelect() {
    const select = document.getElementById('roundSelect');
    const fixtures = uclData.leagueFixtures || [];
    const maxRound = fixtures.reduce((max, f) => Math.max(max, f.round || 1), 1);
    select.innerHTML = '';
    for (let i = 1; i <= maxRound; i++) {
        const opt = document.createElement('option');
        opt.value = i; opt.textContent = `Matchday ${i}`;
        select.appendChild(opt);
    }
}
function renderFixtures() {
    const container = document.getElementById('fixturesContainer');
    const select = document.getElementById('roundSelect');
    const round = parseInt(select.value) || 1;
    const fixtures = (uclData.leagueFixtures || []).filter(f => f.round === round);
    if (!fixtures.length) { container.innerHTML = '<p class="loading-text">No fixtures for this matchday.</p>'; return; }
    let html = '';
    fixtures.forEach((m, idx) => {
        const hasReport = m.played && m.report;
        html += `
            <div class="fixture-item">
                <div class="teams"><span>${m.home}</span><span class="vs">vs</span><span>${m.away}</span></div>
                <div class="right">
                    ${m.played ? `
                        <span class="score">${m.homeScore} – ${m.awayScore}</span>
                        <button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openMatchReport('league', ${idx}, ${round})">
                            ${hasReport ? '📋 Report' : '📝 Add'}
                        </button>
                    ` : `<span class="score unplayed">– : –</span>`}
                </div>
            </div>
        `;
    });
    container.innerHTML = html;
}

// ============================================================
//  BRACKET
// ============================================================
function renderBracket() {
    const container = document.getElementById('bracketContainer');
    const ko = uclData.knockout || {};
    if (!ko.roundOf16 || !ko.roundOf16.length) {
        container.innerHTML = '<p class="loading-text">Knockout stage not yet generated.</p>';
        return;
    }
    let html = `<div class="bracket">`;
    html += renderKnockoutRound('Round of 16', ko.roundOf16 || [], 'r16');
    html += renderKnockoutRound('Quarter-finals', ko.quarterFinals || [], 'qf');
    html += renderKnockoutRound('Semi-finals', ko.semiFinals || [], 'sf');
    const final = ko.final;
    if (final) {
        html += `<div class="bracket-final">
            <div class="final-title">🏆 Final</div>
            <div class="final-match">
                <div class="teams"><span>${final.home || '?'}</span><span class="vs">vs</span><span>${final.away || '?'}</span></div>
                <div style="display:flex; align-items:center; gap:0.6rem;">
                    ${final.played ? `
                        <span class="score">${final.homeScore} – ${final.awayScore}</span>
                        <button class="report-btn ${final.report ? 'has-report' : ''}" onclick="openKnockoutReport('final')">
                            ${final.report ? '📋' : '📝'}
                        </button>
                    ` : `<span class="unplayed">⏳</span>`}
                </div>
            </div>
            ${ko.champion ? `<div class="champion">🏆 Champion: ${ko.champion}</div>` : ''}
        </div>`;
    }
    html += `</div>`;
    container.innerHTML = html;
}
function renderKnockoutRound(title, matches, type) {
    if (!matches || !matches.length) return '';
    const isTwoLeg = matches.some(m => m.leg && m.leg > 1);
    let html = `<div class="bracket-round">
        <div class="bracket-round-title">⚔️ ${title} <span class="badge">${isTwoLeg ? 'Two Legs' : 'Single Leg'}</span></div>
        <div class="bracket-grid">`;
    matches.forEach((m, idx) => {
        const hasReport = m.played && m.report;
        const scoreDisplay = m.played ? `${m.homeScore} – ${m.awayScore}` : '';
        html += `
            <div class="bracket-match">
                <div class="teams">
                    <span>${m.home}</span><span class="vs">vs</span><span>${m.away}</span>
                    ${m.played && m.homeScore > m.awayScore ? `<span class="winner-tag">⬆</span>` : ''}
                    ${m.played && m.awayScore > m.homeScore ? `<span class="winner-tag">⬆</span>` : ''}
                </div>
                <div style="display:flex; align-items:center; gap:0.4rem;">
                    ${m.played ? `
                        <span class="score">${scoreDisplay}</span>
                        <button class="report-btn ${hasReport ? 'has-report' : ''}" onclick="openKnockoutReport('${type}', ${idx})">
                            ${hasReport ? '📋' : '📝'}
                        </button>
                    ` : `<span class="unplayed">⏳</span>`}
                </div>
            </div>
        `;
    });
    html += `</div></div><div class="bracket-connector">⬇</div>`;
    return html;
}

// ============================================================
//  MATCH REPORTS
// ============================================================
async function openMatchReport(type, index, round) {
    const match = uclData.leagueFixtures?.filter(f => f.round === round)?.[index];
    if (!match || !match.played) return;
    showReportModal(match, `Matchday ${round}`);
}
async function openKnockoutReport(type, index) {
    const ko = uclData.knockout;
    let match, title = '';
    const map = {
        'r16': { arr: ko.roundOf16, label: 'Round of 16' },
        'qf': { arr: ko.quarterFinals, label: 'Quarter-final' },
        'sf': { arr: ko.semiFinals, label: 'Semi-final' },
        'final': { arr: [ko.final], label: 'Final' }
    };
    const entry = map[type];
    if (!entry) return;
    match = entry.arr[index];
    title = entry.label;
    if (!match || !match.played) return;
    showReportModal(match, title);
}
function showReportModal(match, title) {
    const modal = document.getElementById('reportModal');
    const content = document.getElementById('reportContent');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    const report = match.report || {};
    const fullComment = report.fullComment || report.comment || report.summary || 'No match report available.';

    let goalsHtml = '';
    if (report.goals && report.goals.length > 0) {
        goalsHtml = report.goals.map(g => {
            const teamName = g.team === 'home' ? match.home : match.away;
            return `<div class="goal-item"><span class="minute">${g.minute}'</span><span class="scorer">${g.scorer}</span>${g.assist ? `<span class="assist">(assist: ${g.assist})</span>` : ''}<span style="color:#6b7a8f;font-size:0.8rem;">${teamName}</span></div>`;
        }).join('');
    } else {
        goalsHtml = '<span style="color:#94a3b8;font-style:italic;">No goals recorded</span>';
    }

    let cardsHtml = '';
    if (report.cards && report.cards.length > 0) {
        cardsHtml = report.cards.map(c => {
            const teamName = c.team === 'home' ? match.home : match.away;
            return `<span class="card-item ${c.type}">${c.type.toUpperCase()}</span><span class="card-text">${c.player} (${teamName})</span><br>`;
        }).join('');
    } else {
        cardsHtml = '<span style="color:#94a3b8;font-style:italic;">No cards</span>';
    }

    const isHomeWin = match.homeScore > match.awayScore;
    const isAwayWin = match.awayScore > match.homeScore;
    const resultText = isHomeWin ? `${match.home} won` : isAwayWin ? `${match.away} won` : 'Draw';

    content.innerHTML = `
        <button class="modal-close" onclick="closeReportModal()">✕</button>
        <div class="report-header">
            <div><div class="teams">${match.home} vs ${match.away}</div><div class="report-meta">${title} • ${resultText}</div></div>
            <div class="score">${match.homeScore} – ${match.awayScore}</div>
        </div>
        <div class="report-comment">${fullComment.replace(/\n/g, '<br>')}</div>
        <div class="section-label"> Goals</div>
        <div style="margin-bottom:1rem;">${goalsHtml}</div>
        <div class="section-label">Cards</div>
        <div style="margin-bottom:1rem;">${cardsHtml}</div>
        <button class="close-btn" onclick="closeReportModal()">Close</button>
    `;
}
function closeReportModal() {
    document.getElementById('reportModal').classList.remove('active');
    document.body.style.overflow = '';
}
document.getElementById('reportModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeReportModal();
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeReportModal();
});

// ============================================================
//  ARCHIVE
// ============================================================
function toggleArchive() {
    document.getElementById('archiveContent').classList.toggle('hidden');
}

// ============================================================
//  INIT
// ============================================================
loadChampionsLeague();
setInterval(loadChampionsLeague, 30000);

    </script>
