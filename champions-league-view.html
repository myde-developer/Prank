<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champions League</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
/* ============================================================
   CHAMPIONS LEAGUE – LIGHT THEME (Admin + Viewer)
   ============================================================ */

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f7fa;
    color: #1a2a44;
    padding: 1.5rem;
}
.ucl-container { max-width: 1400px; margin: 0 auto; }
.hidden { display: none !important; }

/* ── Header ── */
.ucl-header {
    background: #fff; border-radius: 24px; padding: 1.2rem 2rem; margin-bottom: 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
}
.ucl-header-left { display: flex; align-items: center; gap: 1rem; }
.ucl-trophy { font-size: 2.8rem; }
.ucl-header h1 { font-size: 1.8rem; font-weight: 800; color: #0b1e3a; }
.ucl-subtitle { font-size: 0.85rem; color: #4a5a72; }
.ucl-header-right { display: flex; gap: 0.6rem; }
.btn-back { background: #eef1f5; border: none; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; color: #1a2a44; cursor: pointer; }
.btn-back:hover { background: #dde1e8; }
.btn-admin { background: #0b1e3a; border: none; padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: 600; color: #fff; cursor: pointer; }
.btn-admin:hover { background: #1d3557; }

/* ── Tabs ── */
.ucl-tabs {
    display: flex; gap: 0.3rem; margin-bottom: 1.5rem;
    border-bottom: 2px solid #e5e9f0; padding-bottom: 0.3rem;
}
.ucl-tab {
    padding: 0.6rem 1.8rem; border: none; border-radius: 40px; background: transparent;
    font-weight: 600; font-size: 0.9rem; color: #6b7a8f; cursor: pointer; transition: 0.3s;
}
.ucl-tab:hover { color: #1a2a44; background: #f0f3f8; }
.ucl-tab.active { color: #1d4ed8; background: #e8edf9; }
.ucl-tab-content { display: none; animation: fadeUp 0.35s; }
.ucl-tab-content.active { display: block; }
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ── Cards ── */
.table-card, .fixtures-card, .bracket-wrap {
    background: #fff; border-radius: 24px; padding: 1.5rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04); border: 1px solid #e5e9f0;
}

/* ── League Table ── */
.league-table-wrap { overflow-x: auto; }
.league-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
.league-table th {
    text-align: left; padding: 0.7rem 0.4rem; color: #4a5a72; font-weight: 600;
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid #e5e9f0;
}
.league-table td {
    padding: 0.6rem 0.4rem; border-bottom: 1px solid #f0f2f6; color: #1a2a44;
}
.league-table tr:hover td { background: #f8f9fc; }
.league-table .pos { font-weight: 700; min-width: 32px; text-align: center; }
.league-table .club { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
.league-table .club .emblem { font-size: 1.2rem; }
.league-table .stat { text-align: center; }
.league-table .gd-pos { color: #16a34a; font-weight: 600; }
.league-table .gd-neg { color: #dc2626; font-weight: 600; }
.league-table .gd-zero { color: #94a3b8; }
.league-table .pts { font-weight: 800; color: #1d4ed8; text-align: center; }
.badge-q { background: #dcfce7; color: #16a34a; padding: 0.05rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }
.badge-e { background: #fee2e2; color: #dc2626; padding: 0.05rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }

.archive-section { margin-top: 2rem; border-top: 2px dashed #e5e9f0; padding-top: 1.5rem; }
.archive-toggle { background: none; border: none; font-weight: 600; color: #1d4ed8; cursor: pointer; font-size: 0.9rem; }
.archive-toggle:hover { text-decoration: underline; }
.archive-content { margin-top: 1rem; background: #f8f9fc; border-radius: 16px; padding: 1.2rem; border: 1px solid #e5e9f0; }
.archive-content.hidden { display: none; }
.archive-note { color: #6b7a8f; font-size: 0.85rem; margin-bottom: 0.8rem; }

/* ── Fixture Tabs ── */
.fixture-tabs-wrapper {
    overflow-x: auto; padding-bottom: 0.5rem; margin-bottom: 1rem;
    -webkit-overflow-scrolling: touch;
}
.fixture-tabs-wrapper::-webkit-scrollbar { height: 4px; }
.fixture-tabs-wrapper::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 10px; }
.fixture-tabs {
    display: flex; gap: 0.5rem; min-width: max-content;
}
.fixture-tab {
    padding: 0.4rem 1.2rem; border: none; border-radius: 30px;
    background: #f0f3f8; color: #6b7a8f; font-weight: 600; font-size: 0.8rem;
    cursor: pointer; transition: 0.3s; white-space: nowrap;
}
.fixture-tab:hover { background: #e5e9f0; color: #1a2a44; }
.fixture-tab.active { background: #1d4ed8; color: #fff; }

/* ── Fixture Items ── */
.fixture-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.6rem 1rem; background: #f8f9fc; border-radius: 14px;
    margin-bottom: 0.5rem; transition: 0.2s; gap: 0.5rem; flex-wrap: wrap;
}
.fixture-item:hover { background: #f0f3f8; }
.fixture-item .teams {
    display: flex; align-items: center; gap: 0.5rem; font-weight: 500; font-size: 0.9rem;
}
.fixture-item .teams .vs {
    color: #94a3b8; font-size: 0.7rem; font-weight: 400;
}
.fixture-item .teams .score {
    font-weight: 700; color: #1d4ed8; font-size: 0.95rem;
}
.fixture-item .right {
    display: flex; align-items: center; gap: 0.6rem;
}
.report-btn {
    background: transparent; border: 1.5px solid #d1d8e0; border-radius: 30px;
    padding: 0.1rem 0.7rem; color: #6b7a8f; cursor: pointer; font-size: 0.6rem;
    font-weight: 600; transition: 0.25s;
}
.report-btn:hover { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
.report-btn.has-report { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

/* Admin controls inside fixtures */
.fixture-admin-controls {
    background: #f8f9fc; border-radius: 12px; padding: 0.8rem 1rem;
    margin-bottom: 1.2rem; border: 1px solid #e5e9f0;
}
.input-group {
    display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
}
.input-group > * { flex: 1 1 auto; min-width: 80px; }
button {
    padding: 0.5rem 1rem; border: none; border-radius: 30px;
    font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s;
}
button.primary { background: #1d4ed8; color: #fff; }
button.primary:hover { background: #1a3db8; }
button.success { background: #16a34a; color: #fff; }
button.success:hover { background: #15803d; }
button.warning { background: #f59e0b; color: #fff; }
button.warning:hover { background: #d97706; }
button.danger { background: #dc2626; color: #fff; }
button.danger:hover { background: #b91c1c; }
button.secondary { background: #eef1f5; color: #1a2a44; }
button.secondary:hover { background: #dde1e8; }
.status-box {
    background: #fff; border-radius: 12px; padding: 0.6rem 1rem;
    border: 1px solid #e5e9f0; color: #4a5a72; font-size: 0.85rem;
    margin-top: 0.5rem;
}
.status-box .green { color: #16a34a; font-weight: 600; }
.status-box .red { color: #dc2626; font-weight: 600; }
.status-box .yellow { color: #f59e0b; font-weight: 600; }

/* ── Bracket ── */
/* ── SVG Bracket Lines ── */
.bracket-grid {
    position: relative;
}
.bracket-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}
.bracket-svg .line {
    stroke: #c5cdd8;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
}
.bracket-svg .glow {
    stroke: #1d4ed8;
    stroke-width: 3;
    opacity: 0;
    transition: opacity 0.8s ease;
}
.bracket-svg .glow.active {
    opacity: 0.5;
}
.bracket-wrap { overflow-x: auto; }
.bracket-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    grid-template-rows: repeat(16, minmax(32px, 1fr));
    gap: 0;
    position: relative;
    min-height: 700px;
    min-width: 700px;
}
.bracket-match {
    background: #fff; border-radius: 10px; border: 1px solid #e5e9f0;
    padding: 0.3rem 0.5rem; margin: 0.15rem 0.3rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    font-size: 0.7rem;
    display: flex; flex-direction: column; justify-content: center;
    transition: all 0.3s; position: relative; z-index: 2;
    cursor: pointer; min-height: 36px;
}
.bracket-match:hover {
    transform: scale(1.03); box-shadow: 0 4px 16px rgba(29,78,216,0.12);
    border-color: #1d4ed8; z-index: 5;
}
.bracket-match .teams {
    display: flex; flex-direction: column; align-items: center; gap: 0.05rem;
}
.bracket-match .teams .team {
    display: flex; align-items: center; gap: 0.2rem;
    font-weight: 600; font-size: 0.72rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 75px; color: #0b1e3a;
}
.bracket-match .teams .team .logo { font-size: 0.9rem; flex-shrink: 0; }
.bracket-match .teams .vs {
    color: #94a3b8; font-size: 0.5rem; font-weight: 400; text-transform: uppercase;
}
.bracket-match .teams .vs-score {
    font-weight: 700; font-size: 0.75rem; color: #1d4ed8;
    background: #eef2ff; padding: 0.02rem 0.4rem; border-radius: 4px;
    min-width: 28px; text-align: center;
}
.bracket-match .score-row {
    display: flex; justify-content: center; gap: 0.3rem; margin-top: 0.05rem;
    font-size: 0.55rem;
}
.bracket-match .score-row .agg { color: #6b7a8f; font-size: 0.5rem; }
.bracket-match .score-row .status {
    font-size: 0.45rem; font-weight: 600; padding: 0.02rem 0.3rem;
    border-radius: 10px; background: #eef1f5; color: #4a5a72;
}
.bracket-match .score-row .status.ft { background: #dcfce7; color: #16a34a; }
.bracket-match .score-row .status.aet { background: #fef3c7; color: #d97706; }
.bracket-match .score-row .status.pen { background: #fee2e2; color: #dc2626; }
.bracket-match.placeholder {
    background: #f8f9fc; border-style: dashed; border-color: #d1d8e0;
    color: #6b7a8f; font-style: italic; font-size: 0.55rem;
    text-align: center; justify-content: center; cursor: default;
}
.bracket-match.placeholder:hover { transform: none; box-shadow: none; border-color: #d1d8e0; }
.bracket-match .winner-tag {
    font-size: 0.4rem; font-weight: 600; color: #16a34a;
    background: #dcfce7; padding: 0.02rem 0.3rem; border-radius: 10px;
}
.bracket-match.final-match {
    grid-row: 5 / 13; grid-column: 4; border: 2px solid #fbbf24;
    background: #fffbeb; border-radius: 16px; padding: 0.8rem 1rem;
    min-height: 70px;
}
.bracket-match.final-match .teams .team { font-size: 0.85rem; max-width: 90px; }
.bracket-match.final-match .teams .vs-score { font-size: 0.9rem; color: #f59e0b; background: #fef3c7; }
.bracket-match.final-match .champion-display .trophy { font-size: 2rem; display: block; }
.bracket-match.final-match .champion-display .name { font-size: 1.1rem; font-weight: 800; color: #f59e0b; }

/* ── Modals ── */
.modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px); z-index: 1000; justify-content: center; align-items: center;
    padding: 1.5rem;
}
.modal-overlay.active { display: flex; }
.modal-box {
    background: #fff; border-radius: 24px; max-width: 620px; width: 100%;
    max-height: 90vh; overflow-y: auto; padding: 2rem;
    box-shadow: 0 24px 80px rgba(0,0,0,0.12);
    animation: modalIn 0.3s ease;
}
@keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-close { float: right; background: none; border: none; color: #6b7a8f; font-size: 1.8rem; cursor: pointer; }
.modal-close:hover { color: #1a2a44; }
.modal-box .report-header {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
    border-bottom: 2px solid #e5e9f0; padding-bottom: 1rem; margin-bottom: 1rem;
}
.modal-box .report-header .teams { font-size: 1.2rem; font-weight: 700; color: #0b1e3a; }
.modal-box .report-header .score { font-size: 2.2rem; font-weight: 800; color: #1d4ed8; }
.modal-box .report-meta { color: #6b7a8f; font-size: 0.85rem; }
.modal-box .report-comment {
    background: #f8f9fc; border-radius: 12px; padding: 1rem;
    line-height: 1.8; font-size: 0.95rem; max-height: 200px; overflow-y: auto;
    white-space: pre-wrap; color: #1a2a44; margin-bottom: 1rem;
}
.modal-box .section-label {
    font-weight: 600; color: #4a5a72; font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.5px; margin: 1rem 0 0.4rem 0;
}
.modal-box .goal-item {
    display: flex; align-items: center; gap: 0.8rem; padding: 0.25rem 0;
    font-size: 0.9rem; border-bottom: 1px solid #f0f2f6;
}
.modal-box .goal-item .minute { font-weight: 700; color: #1d4ed8; min-width: 40px; }
.modal-box .goal-item .scorer { font-weight: 600; }
.modal-box .goal-item .assist { color: #6b7a8f; font-size: 0.8rem; }
.modal-box .card-item {
    display: inline-block; padding: 0.05rem 0.6rem; border-radius: 4px;
    font-size: 0.7rem; font-weight: 700; margin-right: 0.3rem;
}
.modal-box .card-item.yellow { background: #fef3c7; color: #92400e; }
.modal-box .card-item.red { background: #fee2e2; color: #991b1b; }
.modal-box .card-text { color: #6b7a8f; font-size: 0.85rem; }
.modal-box .close-btn {
    margin-top: 1.5rem; width: 100%; padding: 0.7rem;
    background: #1d4ed8; border: none; border-radius: 12px;
    color: #fff; font-weight: 700; font-size: 0.95rem; cursor: pointer;
}
.modal-box .close-btn:hover { background: #1a3db8; }
.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 10px; }

.loading-text { color: #6b7a8f; font-style: italic; padding: 1rem 0; text-align: center; }

/* ── Mobile ── */
@media (max-width: 768px) {
    body { padding: 1rem; }
    .ucl-header { padding: 1rem; flex-direction: column; align-items: stretch; gap: 0.5rem; }
    .ucl-header-right { justify-content: flex-end; }
    .ucl-tab { padding: 0.4rem 1rem; font-size: 0.8rem; }
    .bracket-match .teams .team { font-size: 0.6rem; max-width: 45px; }
    .bracket-match .teams .team .logo { font-size: 0.7rem; }
    .bracket-match .teams .vs-score { font-size: 0.6rem; min-width: 20px; }
    .bracket-match.final-match .teams .team { font-size: 0.7rem; max-width: 60px; }
}
@media (max-width: 480px) {
    .bracket-match .teams .team { font-size: 0.5rem; max-width: 35px; }
    .bracket-match .teams .team .logo { font-size: 0.55rem; }
    .bracket-match .teams .vs-score { font-size: 0.5rem; min-width: 16px; }
    .bracket-match { min-height: 28px; padding: 0.2rem 0.3rem; }
    .bracket-match.final-match .teams .team { font-size: 0.6rem; max-width: 50px; }
}

    </style>
</head>
<body>

    <div class="ucl-container">

        <!-- ===== HEADER ===== -->
        <header class="ucl-header">
            <div class="ucl-header-left">
                <span class="ucl-trophy">🏆</span>
                <div>
                    <h1>Champions League</h1>
                    <p class="ucl-subtitle" id="phaseSubtitle">2026/27 • League Phase</p>
                </div>
            </div>
            <div class="ucl-header-right">
                <button onclick="window.location.href='index.html'" class="btn-back">⬅ Back</button>
                <button id="adminToggleBtn" class="btn-admin hidden" onclick="toggleAdminMode()">🔑 Admin Mode</button>
                <button id="adminControlsBtn" class="btn-admin hidden" onclick="showAdminControls()">⚙️ Admin</button>
            </div>
        </header>

        <!-- ===== TABS ===== -->
        <nav class="ucl-tabs" id="uclTabs">
            <button class="ucl-tab active" data-tab="table">📊 League Table</button>
            <button class="ucl-tab" data-tab="fixtures">📅 Fixtures</button>
            <button class="ucl-tab" data-tab="bracket" id="bracketTab">🏆 Bracket</button>
        </nav>

        <!-- ===== TAB: LEAGUE TABLE ===== -->
        <div id="tab-table" class="ucl-tab-content active">
            <div class="table-card">
                <div id="leagueTableContainer"><p class="loading-text">Loading league table...</p></div>
                <div id="archiveContainer" class="archive-section hidden">
                    <button class="archive-toggle" onclick="toggleArchive()">📂 League Phase Archive</button>
                    <div id="archiveContent" class="archive-content hidden">
                        <p class="archive-note">Final standings after all matches.</p>
                        <div id="archiveTable"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== TAB: FIXTURES ===== -->
        <div id="tab-fixtures" class="ucl-tab-content">
            <div class="fixtures-card">
                <!-- Admin controls (hidden for viewers) -->
                <div id="fixtureAdminControls" class="fixture-admin-controls hidden">
                    <div class="input-group">
                        <button onclick="generateChampionsLeague()" class="primary">🎲 Generate UCL</button>
                        <button onclick="generateKnockout()" class="warning">🏆 Gen Knockout</button>
                        <button onclick="clearChampionsLeague()" class="danger">🗑️ Clear UCL</button>
                    </div>
                    <div id="uclStatus" class="status-box">Ready</div>
                </div>
                <div class="fixture-tabs-wrapper" id="uclFixtureTabs"></div>
                <div id="uclFixturesContainer"></div>
                <!-- Admin: Add Report button will appear inside fixture rows -->
            </div>
        </div>

        <!-- ===== TAB: BRACKET ===== -->
        <div id="tab-bracket" class="ucl-tab-content">
            <div id="bracketContainer" class="bracket-wrap">
                <p class="loading-text">Loading bracket...</p>
            </div>
        </div>

    </div>

    <!-- ===== MATCH DETAIL MODAL (for bracket) ===== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeDetailModal()">✕</button>
            <div id="detailContent"><p class="loading-text">Loading match details...</p></div>
        </div>
    </div>

    <!-- ===== MATCH REPORT MODAL (for fixtures) ===== -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeReportModal()">✕</button>
            <div id="reportContent"><p class="loading-text">Loading report...</p></div>
        </div>
    </div>

    <script>
// ============================================================
//  FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBmy0tmvaYcw9KsQQRH7RLKcXC8EN6WFqY",
    authDomain: "dls-premier-league.firebaseapp.com",
    projectId: "dls-premier-league",
    storageBucket: "dls-premier-league.firebasestorage.app",
    messagingSenderId: "975087030284",
    appId: "1:975087030284:web:7708718fffd9180c009e29"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============================================================
//  GLOBALS
// ============================================================
let uclData = null;
let currentTab = 'table';
let currentUCLFixtureWeek = null;
let isAdmin = false;

// Check admin flag from sessionStorage (set by admin panel)
if (sessionStorage.getItem('uclAdmin') === 'true') {
    isAdmin = true;
    document.getElementById('adminToggleBtn')?.classList.remove('hidden');
    document.getElementById('adminControlsBtn')?.classList.remove('hidden');
    document.getElementById('fixtureAdminControls')?.classList.remove('hidden');
}

// ============================================================
//  TABS
// ============================================================
document.querySelectorAll('.ucl-tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.ucl-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        document.querySelectorAll('.ucl-tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${currentTab}`).classList.add('active');
        if (currentTab === 'fixtures') renderFixtures();
        if (currentTab === 'bracket') renderBracket();
        if (currentTab === 'table') renderLeagueTable();
    });
});

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        container.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;';
        document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.style.cssText = 'background:#1a2a44;color:#fff;padding:12px 20px;border-radius:12px;font-size:0.9rem;box-shadow:0 4px 20px rgba(0,0,0,0.1);animation:slideIn 0.3s ease;';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}

// ============================================================
//  HELPERS (from admin)
// ============================================================
function computeStandingsLocal(matchweeks, teamNames) {
    const stats = {};
    for (const t of teamNames) stats[t] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0 };
    for (const wk in matchweeks) {
        const matches = matchweeks[wk]?.matches || [];
        for (const m of matches) {
            if (!m.played) continue;
            const h = m.home, a = m.away, hs = m.homeScore, as = m.awayScore;
            if (!stats[h]) stats[h] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0 };
            if (!stats[a]) stats[a] = { played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, pts: 0 };
            stats[h].played++; stats[a].played++;
            stats[h].gf += hs; stats[h].ga += as; stats[a].gf += as; stats[a].ga += hs;
            if (hs > as) { stats[h].won++; stats[h].pts += 3; stats[a].lost++; }
            else if (hs < as) { stats[a].won++; stats[a].pts += 3; stats[h].lost++; }
            else { stats[h].drawn++; stats[h].pts += 1; stats[a].drawn++; stats[a].pts += 1; }
        }
    }
    return Object.entries(stats).map(([name, s]) => ({ name, ...s, gd: s.gf - s.ga })).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

function generateSingleRoundRobin(teamNames) {
    let teams = [...teamNames];
    if (teams.length % 2 !== 0) teams.push("BYE");
    const m = teams.length, half = m / 2;
    const rounds = [];
    for (let round = 0; round < m - 1; round++) {
        const roundFixtures = [];
        for (let i = 0; i < half; i++) {
            const home = teams[i], away = teams[m - 1 - i];
            if (home !== "BYE" && away !== "BYE") {
                roundFixtures.push(round % 2 === 0 ? { home, away } : { home: away, away: home });
            }
        }
        rounds.push(roundFixtures);
        const last = teams.pop();
        teams.splice(1, 0, last);
    }
    return rounds;
}

function renderLeagueTable() {

    if (!table.length) { container.innerHTML = '<p class="loading-text">No league data available.</p>'; return; }
    const sorted = [...table].sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    const isCompleted = uclData?.phase === 'completed' || uclData?.phase === 'knockout';
    let html = `<div class="league-table-wrap"><table class="league-table">
        <thead><tr>
            <th>#</th><th>Club</th>
            <th class="stat">P</th><th class="stat">W</th><th class="stat">D</th><th class="stat">L</th>
            <th class="stat">GF</th><th class="stat">GA</th><th class="stat">GD</th>
            <th class="stat">Pts</th>
            ${isCompleted ? '<th class="stat">Status</th>' : ''}
        </tr></thead><tbody>`;
    sorted.forEach((team, i) => {
        const pos = i+1, gd = team.gd || 0;
        let gdClass = 'gd-zero';

        let badge = '';
        if (isCompleted) badge = pos <= 16 ? `<span class="badge-q">✓ Qualified</span>` : `<span class="badge-e">✗ Eliminated</span>`;
        html += `<tr>
            <td class="pos">${pos}</td>
            <td><span class="club"><span class="emblem"></span> ${team.name}</span></td>
            <td class="stat">${team.played || 0}</td>
            <td class="stat">${team.won || 0}</td>
            <td class="stat">${team.drawn || 0}</td>
            <td class="stat">${team.lost || 0}</td>
            <td class="stat">${team.gf || 0}</td>
            <td class="stat">${team.ga || 0}</td>
            <td class="stat ${gdClass}">${gd > 0 ? '+' : ''}${gd}</td>
            <td class="pts">${team.pts || 0}</td>
            ${isCompleted ? `<td class="stat">${badge}</td>` : ''}

// Inline save for admin
async function saveUCLFixtureInline(idx, round) {
    if (!isAdmin) return;
    const fixtures = window._currentRoundFixtures;
    if (!fixtures || idx >= fixtures.length) {
        showToast('Match not found');
        return;
    }
    const matchObj = fixtures[idx];
    if (!matchObj) { showToast('Match not found'); return; }
    const homeScore = parseInt(document.getElementById(`uclAdminHome_${idx}`).value);
    const awayScore = parseInt(document.getElementById(`uclAdminAway_${idx}`).value);
    if (isNaN(homeScore) || isNaN(awayScore)) { showToast('Enter valid scores'); return; }

    matchObj.homeScore = homeScore;
    matchObj.awayScore = awayScore;
    matchObj.played = true;

    // Update league table
    const snap = await db.ref('champions_league/leagueTable').once('value');
    let leagueTable = snap.val() || [];
    const homeTeam = leagueTable.find(t => t.name === matchObj.home);
    const awayTeam = leagueTable.find(t => t.name === matchObj.away);
    if (homeTeam && awayTeam) {
        homeTeam.played = (homeTeam.played || 0) + 1;
        homeTeam.gf = (homeTeam.gf || 0) + homeScore;
        homeTeam.ga = (homeTeam.ga || 0) + awayScore;
        if (homeScore > awayScore) { homeTeam.won = (homeTeam.won || 0) + 1; homeTeam.pts = (homeTeam.pts || 0) + 3; }
        else if (homeScore < awayScore) { homeTeam.lost = (homeTeam.lost || 0) + 1; }
        else { homeTeam.drawn = (homeTeam.drawn || 0) + 1; homeTeam.pts = (homeTeam.pts || 0) + 1; }
        homeTeam.gd = homeTeam.gf - homeTeam.ga;

        awayTeam.played = (awayTeam.played || 0) + 1;
        awayTeam.gf = (awayTeam.gf || 0) + awayScore;
        awayTeam.ga = (awayTeam.ga || 0) + homeScore;
        if (awayScore > homeScore) { awayTeam.won = (awayTeam.won || 0) + 1; awayTeam.pts = (awayTeam.pts || 0) + 3; }
        else if (awayScore < homeScore) { awayTeam.lost = (awayTeam.lost || 0) + 1; }
        else { awayTeam.drawn = (awayTeam.drawn || 0) + 1; awayTeam.pts = (awayTeam.pts || 0) + 1; }
        awayTeam.gd = awayTeam.gf - awayTeam.ga;
    }

    // Save fixtures and table
    const allFixtures = uclData.leagueFixtures.map(f => {
        if (f.round === round && f.home === matchObj.home && f.away === matchObj.away) {
            return matchObj;
        }
        return f;
    });
    await db.ref('champions_league/leagueFixtures').set(allFixtures);
    await db.ref('champions_league/leagueTable').set(leagueTable);

    // Update local data and re-render
    uclData.leagueFixtures = allFixtures;
    uclData.leagueTable = leagueTable;
    showToast(`✅ ${matchObj.home} ${homeScore}–${awayScore} ${matchObj.away} saved!`);
    // Re-render the current week
    renderUCLFixtureWeek(round);
    renderLeagueTable();
}

async function generateChampionsLeague() {
    if (!isAdmin) return;
    if (!confirm('Generate Champions League from top 10 teams from Premier League and La Liga?')) return;
    try {
        const plSnap = await db.ref('leagues/premier/matchweeks').once('value');
        const plMW = plSnap.val() || {};
        const plTeamsSnap = await db.ref('leagues/premier/teams').once('value');
        const plTeams = Object.values(plTeamsSnap.val() || {});
        const plStandings = computeStandingsLocal(plMW, plTeams);
        const plTop10 = plStandings.slice(0,10).map(s => s.name);

        const llSnap = await db.ref('leagues/laliga/matchweeks').once('value');
        const llMW = llSnap.val() || {};
        const llTeamsSnap = await db.ref('leagues/laliga/teams').once('value');
        const llTeams = Object.values(llTeamsSnap.val() || {});
        const llStandings = computeStandingsLocal(llMW, llTeams);
        const llTop10 = llStandings.slice(0,10).map(s => s.name);

        const allTeams = [...plTop10, ...llTop10];
        if (allTeams.length < 20) { showToast('Need at least 20 teams (10 from each)'); return; }

        const leagueTable = allTeams.map(name => ({ name, played:0, won:0, drawn:0, lost:0, gf:0, ga:0, gd:0, pts:0 }));
        const singleRounds = generateSingleRoundRobin(allTeams);
        const leagueFixtures = [];
        singleRounds.forEach((roundFixtures, idx) => {
            const roundNum = idx + 1;
            roundFixtures.forEach(match => {
                leagueFixtures.push({ round: roundNum, home: match.home, away: match.away, homeScore: null, awayScore: null, played: false });
            });
        });

        await db.ref('champions_league').set({
            phase: 'league',
            leagueTable,
            leagueFixtures,
            knockout: { roundOf16: [], quarterFinals: [], semiFinals: [], final: null, champion: null }
        });
        document.getElementById('uclStatus').innerHTML = `<span class="green">✅ Champions League created! ${allTeams.length} teams, ${leagueFixtures.length} matches</span>`;
        showToast('✅ Champions League generated!');
        // Reload data
        await refreshData();
    } catch (err) { showToast('❌ Error: ' + err.message); }
}

async function generateKnockout() {
    if (!isAdmin) return;
    if (!confirm('Generate knockout from league standings?')) return;
    try {
        const snap = await db.ref('champions_league').once('value');
        const data = snap.val();
        if (!data) { showToast('No UCL data'); return; }
        const table = data.leagueTable || [];
        if (table.length < 16) { showToast('Not enough teams'); return; }
        const sorted = [...table].sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
        const seedings = sorted.slice(0,16).map(t => t.name);
        const pairs = [];
        for (let i = 0; i < 8; i++) pairs.push([seedings[i], seedings[15 - i]]);
        const roundOf16 = [];
        pairs.forEach((pair, idx) => {
            roundOf16.push({ home: pair[0], away: pair[1], homeScore: null, awayScore: null, played: false, leg: 1, tieId: idx+1 });
            roundOf16.push({ home: pair[1], away: pair[0], homeScore: null, awayScore: null, played: false, leg: 2, tieId: idx+1 });
        });
        await db.ref('champions_league/knockout').set({ roundOf16, quarterFinals: [], semiFinals: [], final: null, champion: null });
        await db.ref('champions_league/phase').set('knockout');
        document.getElementById('uclStatus').innerHTML = `<span class="green">✅ Knockout generated! Round of 16 set.</span>`;
        showToast('✅ Knockout generated!');
        await refreshData();
    } catch (err) { showToast('❌ Error: ' + err.message); }
}

async function clearChampionsLeague() {
    if (!isAdmin) return;

    await db.ref('champions_league').remove();
    document.getElementById('uclStatus').innerHTML = `<span class="yellow">⚠️ Champions League cleared</span>`;

// ============================================================
//  BRACKET (UEFA Style)
// ============================================================
function renderBracket() {
    const container = document.getElementById('bracketContainer');
    const ko = uclData?.knockout || {};
    if (!ko.roundOf16 || !ko.roundOf16.length) {
        container.innerHTML = '<p class="loading-text">Knockout stage not yet generated.</p>';
        return;
    }

    // Helper functions (same as before)
    function groupByTie(matches) {
        const map = {};
        (matches || []).forEach(m => {
            const id = m.tieId || 0;
            if (!map[id]) map[id] = [];
            map[id].push(m);
        });
        return map;
    }
    function computeTieResult(legs) {
        if (!legs || legs.length === 0) return null;
        const leg1 = legs.find(l => l.leg === 1);
        const leg2 = legs.find(l => l.leg === 2);
        if (!leg1 || !leg2) return null;
        if (!leg1.played || !leg2.played) return { played: false, leg1, leg2 };
        const aggHome = (leg1.homeScore || 0) + (leg2.awayScore || 0);
        const aggAway = (leg1.awayScore || 0) + (leg2.homeScore || 0);
        let winner = null, winnerName = '';
        let status = 'FT';
        if (aggHome > aggAway) { winner = leg1.home; winnerName = leg1.home; }
        else if (aggAway > aggHome) { winner = leg1.away; winnerName = leg1.away; }
        else { winner = 'Penalties'; winnerName = 'Penalties'; status = 'PEN'; }
        return { played: true, aggHome, aggAway, winner, winnerName, leg1, leg2, status };
    }

    function buildRoundData(matches) {
        const ties = groupByTie(matches);
        const result = [];
        for (const id in ties) {
            const legs = ties[id];
            const res = computeTieResult(legs);
            result.push({
                id: parseInt(id),
                leg1: legs.find(l => l.leg === 1),
                leg2: legs.find(l => l.leg === 2),
                result: res
            });
        }
        return result;
    }

    const r16Data = buildRoundData(ko.roundOf16 || []);
    const qfData = buildRoundData(ko.quarterFinals || []);
    const sfData = buildRoundData(ko.semiFinals || []);
    const finalMatch = ko.final || null;

    function matchCardHTML(data, roundName, index, isFinal = false) {
        const res = data?.result;
        const leg1 = data?.leg1;
        const leg2 = data?.leg2;
        const home = leg1?.home || '?';
        const away = leg1?.away || '?';
        const played = res?.played || false;

        let middle = '';
        let aggHtml = '';
        let statusHtml = '';
        if (played && leg1 && leg2) {
            middle = `<span class="vs-score">${leg1.homeScore}–${leg1.awayScore}</span>`;
            aggHtml = `<span class="agg">Agg: ${res.aggHome}–${res.aggAway}</span>`;
            statusHtml = `<span class="status ${res.status.toLowerCase()}">${res.status}</span>`;
        } else if (played && leg1 && !leg2) {
            middle = `<span class="vs-score">${leg1.homeScore}–${leg1.awayScore}</span>`;
            statusHtml = `<span class="status ft">FT</span>`;
        } else {
            middle = `<span class="vs">vs</span>`;
        }

        return `
            <div class="bracket-match ${isFinal ? 'final-match' : ''} ${!played ? 'placeholder' : ''}"
                 data-round="${roundName}" data-index="${index}" data-tieid="${data?.id || 0}"
                 onclick="openMatchDetail('${roundName}', ${data?.id || 0})">
                <div class="teams">
                    <span class="team"><span class="logo">⚽</span> ${home}</span>
                    ${middle}
                    <span class="team"><span class="logo">⚽</span> ${away}</span>
                </div>
                ${played ? `<div class="score-row">${aggHtml} ${statusHtml}</div>` : ''}
                ${isFinal && uclData?.knockout?.champion ? `<div class="champion-display"><span class="trophy">🏆</span><span class="name">${uclData.knockout.champion}</span></div>` : ''}
            </div>
        `;
    }

    const r16Rows = [1, 3, 5, 7, 9, 11, 13, 15];
    const qfRows = [1, 5, 9, 13];
    const sfRows = [1, 9];
    const rows = 16;
    const cols = 4;

    // Build grid
    let gridHtml = `<div class="bracket-grid" id="bracketGrid" style="position:relative;">`;
    r16Data.forEach((d, i) => {
        gridHtml += `<div style="grid-row: ${r16Rows[i]} / span 2; grid-column: 1; display:flex; align-items:center;">${matchCardHTML(d, 'Round of 16', i)}</div>`;
    });
    qfData.forEach((d, i) => {
        gridHtml += `<div style="grid-row: ${qfRows[i]} / span 4; grid-column: 2; display:flex; align-items:center;">${matchCardHTML(d, 'Quarter-finals', i)}</div>`;
    });
    sfData.forEach((d, i) => {
        gridHtml += `<div style="grid-row: ${sfRows[i]} / span 8; grid-column: 3; display:flex; align-items:center;">${matchCardHTML(d, 'Semi-finals', i)}</div>`;
    });
    const finalData = finalMatch ? { leg1: finalMatch, leg2: null, result: finalMatch.played ? { played: true, status: finalMatch.homeScore === finalMatch.awayScore ? 'PEN' : 'FT' } : null, id: 0 } : null;
    if (finalData) {
        gridHtml += `<div style="grid-row: 1 / span 16; grid-column: 4; display:flex; align-items:center; justify-content:center;">${matchCardHTML(finalData, 'Final', 0, true)}</div>`;
    } else {
        gridHtml += `<div style="grid-row: 1 / span 16; grid-column: 4; display:flex; align-items:center; justify-content:center;"><div class="bracket-match placeholder" style="grid-row:1/span16;grid-column:4;height:100%;min-height:80px;display:flex;align-items:center;justify-content:center;">Final TBD</div></div>`;
    }
    gridHtml += `</div>`;

    // ---- Build SVG lines ----
    function buildSVGLines() {
        // We'll compute the center coordinates of each match based on grid rows and columns.
        // Using percentage positions inside the grid container.
        const xPos = [12.5, 37.5, 62.5, 87.5]; // centers of columns 1..4
        const yPos = (row) => (row / 16) * 100; // row is 1-indexed, center of the cell

        // We'll generate polylines for each connection: R16 → QF, QF → SF, SF → Final
        const lines = [];

        // Helper: get center y of a match at a given row span start and span length
        function getCenterY(rowStart, span) {
            return ((rowStart - 1) + span / 2) / 16 * 100;
        }

        // R16 → QF: each pair of R16 (rows 1-2, 3-4, ...) connects to one QF (rows 1-4, 5-8, ...)
        const r16ToQF = [
            { r16: [0, 1], qf: 0 },
            { r16: [2, 3], qf: 1 },
            { r16: [4, 5], qf: 2 },
            { r16: [6, 7], qf: 3 }
        ];
        r16ToQF.forEach(({ r16, qf }) => {
            const y1 = getCenterY(r16Rows[r16[0]], 2);
            const y2 = getCenterY(r16Rows[r16[1]], 2);
            const yQf = getCenterY(qfRows[qf], 4);
            const xR16 = xPos[0];
            const xQF = xPos[1];
            // Two separate polylines: from each R16 to the QF (vertical then horizontal)
            lines.push(`<polyline points="${xR16},${y1} ${xQF},${y1} ${xQF},${yQf}" class="line" />`);
            lines.push(`<polyline points="${xR16},${y2} ${xQF},${y2} ${xQF},${yQf}" class="line" />`);
            // Glow versions
            lines.push(`<polyline points="${xR16},${y1} ${xQF},${y1} ${xQF},${yQf}" class="glow" />`);
            lines.push(`<polyline points="${xR16},${y2} ${xQF},${y2} ${xQF},${yQf}" class="glow" />`);
        });

        // QF → SF
        const qfToSF = [
            { qf: [0, 1], sf: 0 },
            { qf: [2, 3], sf: 1 }
        ];
        qfToSF.forEach(({ qf, sf }) => {
            const y1 = getCenterY(qfRows[qf[0]], 4);
            const y2 = getCenterY(qfRows[qf[1]], 4);
            const ySf = getCenterY(sfRows[sf], 8);
            const xQF = xPos[1];
            const xSF = xPos[2];
            lines.push(`<polyline points="${xQF},${y1} ${xSF},${y1} ${xSF},${ySf}" class="line" />`);
            lines.push(`<polyline points="${xQF},${y2} ${xSF},${y2} ${xSF},${ySf}" class="line" />`);
            lines.push(`<polyline points="${xQF},${y1} ${xSF},${y1} ${xSF},${ySf}" class="glow" />`);
            lines.push(`<polyline points="${xQF},${y2} ${xSF},${y2} ${xSF},${ySf}" class="glow" />`);
        });

        // SF → Final
        if (sfData.length === 2) {
            const y1 = getCenterY(sfRows[0], 8);
            const y2 = getCenterY(sfRows[1], 8);
            const yFinal = 50; // center of final (row 8, span 16)
            const xSF = xPos[2];
            const xFinal = xPos[3];
            lines.push(`<polyline points="${xSF},${y1} ${xFinal},${y1} ${xFinal},${yFinal}" class="line" />`);
            lines.push(`<polyline points="${xSF},${y2} ${xFinal},${y2} ${xFinal},${yFinal}" class="line" />`);
            lines.push(`<polyline points="${xSF},${y1} ${xFinal},${y1} ${xFinal},${yFinal}" class="glow" />`);
            lines.push(`<polyline points="${xSF},${y2} ${xFinal},${y2} ${xFinal},${yFinal}" class="glow" />`);
        }

        return `<svg class="bracket-svg" viewBox="0 0 100 100" preserveAspectRatio="none">${lines.join('')}</svg>`;
    }

    // Combine grid and SVG
    container.innerHTML = gridHtml + buildSVGLines();

    // Activate glow lines after a short delay if any match is played
    setTimeout(() => {
        const playedMatches = container.querySelectorAll('.bracket-match:not(.placeholder)');
        if (playedMatches.length > 0) {
            const glows = container.querySelectorAll('.glow');
            glows.forEach(g => g.classList.add('active'));
        }
    }, 500);
}

// ============================================================
//  MODAL FUNCTIONS
// ============================================================
function openMatchReport(type, idx, round) {
    const fixtures = uclData?.leagueFixtures || [];
    // Try to find the match using the current round fixtures
    const roundFixtures = fixtures.filter(f => f.round === round);
    if (idx >= roundFixtures.length) { showToast('Match not found'); return; }
    const match = roundFixtures[idx];
    if (!match || !match.played) { showToast('Match not played'); return; }
    const modal = document.getElementById('reportModal');
    const content = document.getElementById('reportContent');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';

    const report = match.report || {};
    const fullComment = report.fullComment || report.comment || report.summary || 'No match report available.';
    let goalsHtml = '', cardsHtml = '';
    if (report.goals && report.goals.length) {
        goalsHtml = report.goals.map(g => `<div class="goal-item"><span class="minute">${g.minute}'</span><span class="scorer">${g.scorer}</span>${g.assist ? `<span class="assist">(assist: ${g.assist})</span>` : ''}<span style="color:#6b7a8f;font-size:0.8rem;">${g.team === 'home' ? match.home : match.away}</span></div>`).join('');
    } else { goalsHtml = '<span style="color:#94a3b8;font-style:italic;">No goals recorded</span>'; }
    if (report.cards && report.cards.length) {
        cardsHtml = report.cards.map(c => `<span class="card-item ${c.type}">${c.type.toUpperCase()}</span><span class="card-text">${c.player} (${c.team === 'home' ? match.home : match.away})</span><br>`).join('');
    } else { cardsHtml = '<span style="color:#94a3b8;font-style:italic;">No cards</span>'; }
    content.innerHTML = `
        <button class="modal-close" onclick="closeReportModal()">✕</button>
        <div class="report-header"><div><div class="teams">${match.home} vs ${match.away}</div><div class="report-meta">Matchday ${round}</div></div><div class="score">${match.homeScore} – ${match.awayScore}</div></div>
        <div class="report-comment">${fullComment.replace(/\n/g, '<br>')}</div>
        <div class="section-label">⚽ Goals</div><div>${goalsHtml}</div>
        <div class="section-label">🟨 Cards</div><div>${cardsHtml}</div>
        <button class="close-btn" onclick="closeReportModal()">Close</button>
    `;
}

function closeReportModal() {
    document.getElementById('reportModal').classList.remove('active');
    document.body.style.overflow = '';
}

// ============================================================
//  BRACKET DETAIL MODAL
// ============================================================
function openMatchDetail(roundName, tieId) {
    const ko = uclData?.knockout || {};
    let matches = [];
    let roundLabel = '';
    switch(roundName) {
        case 'Round of 16': matches = ko.roundOf16 || []; roundLabel = 'Round of 16'; break;
        case 'Quarter-finals': matches = ko.quarterFinals || []; roundLabel = 'Quarter-finals'; break;
        case 'Semi-finals': matches = ko.semiFinals || []; roundLabel = 'Semi-finals'; break;
        case 'Final': matches = ko.final ? [ko.final] : []; roundLabel = 'Final'; break;
        default: return;
    }
    const legs = matches.filter(m => m.tieId === tieId || (!m.tieId && matches.length === 1));
    if (!legs.length) return;
    const leg1 = legs.find(l => l.leg === 1) || legs[0];
    const leg2 = legs.find(l => l.leg === 2);
    let aggHome = '-', aggAway = '-', winner = '-', status = '';
    if (leg1?.played && leg2?.played) {
        aggHome = (leg1.homeScore || 0) + (leg2.awayScore || 0);
        aggAway = (leg1.awayScore || 0) + (leg2.homeScore || 0);
        if (aggHome > aggAway) winner = leg1.home;
        else if (aggAway > aggHome) winner = leg1.away;
        else winner = 'Penalties';
        status = 'FT';
    } else if (leg1?.played && !leg2) {
        aggHome = leg1.homeScore;
        aggAway = leg1.awayScore;
        if (aggHome > aggAway) winner = leg1.home;
        else if (aggAway > aggHome) winner = leg1.away;
        else winner = 'Draw';
        status = 'FT';
    } else {
        status = 'Upcoming';
    }
    const modal = document.getElementById('detailModal');
    const content = document.getElementById('detailContent');
    content.innerHTML = `
        <div class="detail-header">
            <span class="tie-title">${leg1.home} vs ${leg1.away}</span>
            <span class="tie-agg">${aggHome} – ${aggAway}</span>
        </div>
        ${leg1 ? `<div class="detail-leg"><span class="leg-label">Leg 1</span><span class="leg-score">${leg1.home} ${leg1.played ? leg1.homeScore : '–'} – ${leg1.played ? leg1.awayScore : '–'} ${leg1.away}</span><span class="leg-info">${leg1.played ? 'FT' : 'Upcoming'}</span></div>` : ''}
        ${leg2 ? `<div class="detail-leg"><span class="leg-label">Leg 2</span><span class="leg-score">${leg2.home} ${leg2.played ? leg2.homeScore : '–'} – ${leg2.played ? leg2.awayScore : '–'} ${leg2.away}</span><span class="leg-info">${leg2.played ? 'FT' : 'Upcoming'}</span></div>` : ''}
        ${(leg1?.played || leg2?.played) ? `<div style="margin-top:0.8rem;padding:0.5rem;background:#f8f9fc;border-radius:10px;text-align:center;"><strong>Winner:</strong> ${winner} ${status ? `• <span class="status ${status.toLowerCase()}">${status}</span>` : ''}</div>` : ''}
        <button class="detail-btn" onclick="closeDetailModal()">Close</button>
    `;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('active');
    document.body.style.overflow = '';
}

// ============================================================
//  PHASE / BRACKET VISIBILITY
// ============================================================
function updateBracketVisibility() {
    const bracketTab = document.getElementById('bracketTab');
    const bracketContent = document.getElementById('tab-bracket');
    if (!uclData) return;
    const allPlayed = uclData.leagueFixtures?.every(f => f.played) || false;
    const phase = uclData.phase || 'league';
    const showBracket = (phase === 'knockout' || phase === 'completed' || allPlayed || isAdmin);
    if (showBracket) {
        bracketTab.style.display = '';
        bracketContent.style.display = '';
    } else {
        bracketTab.style.display = 'none';
        bracketContent.style.display = 'none';
        if (currentTab === 'bracket') {
            document.querySelector('[data-tab="table"]').click();
        }
    }
}

function checkPhaseCompletion() {
    const phase = uclData?.phase;
    const subtitle = document.getElementById('phaseSubtitle');
    if (phase === 'completed' || phase === 'knockout') {
        subtitle.textContent = '2025/26 • Knockout Stage';
    } else {
        subtitle.textContent = '2025/26 • League Phase';
    }
}

// ============================================================
//  DATA REFRESH
// ============================================================
async function refreshData() {
    const snap = await db.ref('champions_league').once('value');
    uclData = snap.val();
    if (!uclData) return;
    renderLeagueTable();
    renderFixtures();
    renderBracket();
    updateBracketVisibility();
    checkPhaseCompletion();
}

// ============================================================
//  LIVE LISTENER
// ============================================================
function setupListener() {
    db.ref('champions_league').on('value', (snapshot) => {
        uclData = snapshot.val();
        if (!uclData) {
            return;
        }
        // Re-render current tab
        if (currentTab === 'table') renderLeagueTable();
        else if (currentTab === 'fixtures') {
            if (currentUCLFixtureWeek) {
                renderUCLFixtureWeek(currentUCLFixtureWeek);
            } else {
                renderFixtures();
            }
        }
        else if (currentTab === 'bracket') renderBracket();
        updateBracketVisibility();
        checkPhaseCompletion();
    });
}

// ============================================================
//  ADMIN MODE TOGGLE (for debugging)
// ============================================================
function toggleAdminMode() {
    isAdmin = !isAdmin;
    if (isAdmin) {
        document.getElementById('adminToggleBtn').textContent = '🔓 Viewer Mode';
        document.getElementById('adminControlsBtn')?.classList.remove('hidden');
        document.getElementById('fixtureAdminControls')?.classList.remove('hidden');
        sessionStorage.setItem('uclAdmin', 'true');
        showToast('Admin mode ON');
    } else {
        document.getElementById('adminToggleBtn').textContent = '🔑 Admin Mode';
        document.getElementById('adminControlsBtn')?.classList.add('hidden');
        document.getElementById('fixtureAdminControls')?.classList.add('hidden');
        sessionStorage.removeItem('uclAdmin');
        showToast('Viewer mode ON');
    }
    // Re-render fixtures to show/hide admin controls
    renderFixtures();
}

// ============================================================
//  INIT
// ============================================================
async function init() {
    await refreshData();
    setupListener();
}

init();

window.toggleAdminMode = toggleAdminMode;
window.generateChampionsLeague = generateChampionsLeague;
window.generateKnockout = generateKnockout;
window.clearChampionsLeague = clearChampionsLeague;
window.openMatchDetail = openMatchDetail;
window.closeDetailModal = closeDetailModal;
window.switchUCLFixtureWeek = switchUCLFixtureWeek;
window.renderFixtures = renderFixtures;
window.renderBracket = renderBracket;
window.renderLeagueTable = renderLeagueTable;
window.toggleArchive = function() {
    document.getElementById('archiveContent').classList.toggle('hidden');
};
window.showAdminControls = function() {
    document.getElementById('fixtureAdminControls').scrollIntoView({ behavior: 'smooth' });
};
