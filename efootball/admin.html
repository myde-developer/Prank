<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – eFootball Tournament</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- Firebase Import Map -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"
    }
  }
  </script>
</head>

<body>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast" style="display:none;"></div>

  <!-- ===== AUTH PAGE ===== -->
  <div id="auth-page">
    <div class="auth-box">
      <h2>⚽ Admin</h2>
      
      <!-- Tab Buttons -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="register-tab">Register</button>
        <button class="auth-tab" id="login-tab">Login</button>
      </div>

      <!-- Register Form (visible by default) -->
      <div id="register-form" class="auth-form">
        <input type="email" id="register-email" placeholder="Email" />
        <input type="password" id="register-password" placeholder="Password (min 6 chars)" />
        <input type="password" id="register-confirm" placeholder="Confirm Password" />
        <input type="text" id="register-code" placeholder="Admin Code (if required)" />
        <button class="neon-btn full" id="register-btn">Register</button>
        <p id="register-error" class="auth-error"></p>
        <p id="register-success" class="auth-success" style="display:none;"></p>
      </div>

      <!-- Login Form (hidden by default) -->
      <div id="login-form" class="auth-form" style="display:none;">
        <input type="email" id="login-email" placeholder="Email" />
        <input type="password" id="login-password" placeholder="Password" />
        <button class="neon-btn full" id="login-btn">Login</button>
        <p id="login-error" class="auth-error"></p>
      </div>
    </div>
  </div>

  <!-- ===== DASHBOARD (hidden until logged in) ===== -->
  <div id="admin-dashboard" style="display:none;">
    <header>
      <h1>⚽ Admin Panel</h1>
      <button id="logout-btn" class="neon-btn small">Logout</button>
    </header>

    <div class="dashboard-grid">
      <!-- Teams -->
      <section class="card">
        <h2>Teams</h2>
        <div class="input-group">
          <input type="text" id="team-name-input" placeholder="Team name..." />
          <button id="add-team-btn" class="neon-btn small">Add</button>
        </div>
        <ul id="team-list"></ul>
        <p><span id="active-count">0</span> active teams</p>
      </section>

      <!-- Controls -->
      <section class="card">
        <h2>Controls</h2>
        <button id="generate-btn" class="neon-btn full">Generate Next Round</button>
        <button id="trim-btn" class="neon-btn full danger">Trim Bottom 2</button>
        <div id="status-msg" class="status"></div>
      </section>

      <!-- Settings -->
      <section class="card">
        <h2>Settings</h2>
        <button id="set-code-btn" class="neon-btn full">Set Admin Code</button>
        <p id="current-code-display" style="font-size:0.8rem; margin-top:8px; color:#4a4a6a;"></p>
      </section>

      <!-- Matches -->
      <section class="card full-width">
        <h2>Matches</h2>
        <div id="matches-container"></div>
      </section>
    </div>
  </div>

  <!-- ===== MODAL for Admin Code ===== -->
  <div id="code-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Set Admin Code</h3>
      <p>This code will be required for new admins to register.</p>
      <input type="text" id="admin-code-input" placeholder="Enter code (e.g. 1234)" />
      <div style="display:flex; gap:10px; margin-top:12px;">
        <button id="save-code-btn" class="neon-btn">Save</button>
        <button id="close-code-modal" class="neon-btn danger">Cancel</button>
      </div>
      <p id="code-status" style="margin-top:8px;"></p>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
