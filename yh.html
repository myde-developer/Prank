
<div class="fixed bottom-24 right-5 z-50 flex flex-col-reverse items-end gap-2">
    
    <!-- Chat Button (appears above admin menu) -->
<button id="chat-toggle" onclick="openChatModal()" class="bg-emerald-600/40 hover:bg-emerald-600/80 text-white rounded-full px-4 py-3 shadow-lg transition-all duration-200 flex items-center gap-1 backdrop-blur-sm text-xs sm:text-sm" style="position: relative; overflow: visible;">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.338-3.123C2.493 12.767 2 11.434 2 10c0-4.418 4.03-8 9-8s9 3.582 9 8z" />

    <div id="floating-admin-menu" class="hidden">
        <div class="bg-white rounded-full shadow-lg p-2 flex gap-2 border border-gray-200">
            <button onclick="openChangePasswordModal()" class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-600 hover:bg-indigo-200 transition" title="Change Password">🔑</button>
            <button onclick="resetTournament()" class="w-10 h-10 rounded-full bg-rose-100 text-rose-600 hover:bg-rose-200 transition" title="Wipe Data">⚠️</button>
        </div>
    </div>
